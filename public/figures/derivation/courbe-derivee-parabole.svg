<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe de la fonction derivee f-prime sur [-3 ; 3] : parabole y = x carre moins 4, racines en -2 et 2, minimum f-prime(0) = -4">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 45 px (1 unité x), x de -3 à 3 -->
    <line x1="65"  y1="30" x2="65"  y2="290"/>
    <line x1="110" y1="30" x2="110" y2="290"/>
    <line x1="155" y1="30" x2="155" y2="290"/>
    <line x1="200" y1="30" x2="200" y2="290"/>
    <line x1="245" y1="30" x2="245" y2="290"/>
    <line x1="290" y1="30" x2="290" y2="290"/>
    <line x1="335" y1="30" x2="335" y2="290"/>
    <!-- horizontales tous les 25 px (1 unité y), y de -5 à 6 -->
    <line x1="65" y1="40"  x2="335" y2="40"/>
    <line x1="65" y1="65"  x2="335" y2="65"/>
    <line x1="65" y1="90"  x2="335" y2="90"/>
    <line x1="65" y1="115" x2="335" y2="115"/>
    <line x1="65" y1="140" x2="335" y2="140"/>
    <line x1="65" y1="190" x2="335" y2="190"/>
    <line x1="65" y1="215" x2="335" y2="215"/>
    <line x1="65" y1="240" x2="335" y2="240"/>
    <line x1="65" y1="265" x2="335" y2="265"/>
    <line x1="65" y1="290" x2="335" y2="290"/>
  </g>

  <!-- ── Axes ──
       Origine math (0,0) : x_svg = 200, y_svg = 165 ; 1 unité x = 45 px ; 1 unité y = 25 px -->
  <!-- Axe Ox -->
  <line x1="50" y1="165" x2="355" y2="165" stroke="#334155" stroke-width="1.2"/>
  <polygon points="355,165 349,162 349,168" fill="#334155"/>
  <text x="353" y="180" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="200" y1="300" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="192" y="180" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="65"  y1="162" x2="65"  y2="168"/>
    <text x="65"  y="180" text-anchor="middle">-3</text>
    <line x1="110" y1="162" x2="110" y2="168"/>
    <text x="110" y="180" text-anchor="middle">-2</text>
    <line x1="155" y1="162" x2="155" y2="168"/>
    <text x="155" y="180" text-anchor="middle">-1</text>
    <line x1="245" y1="162" x2="245" y2="168"/>
    <text x="245" y="180" text-anchor="middle">1</text>
    <line x1="290" y1="162" x2="290" y2="168"/>
    <text x="290" y="180" text-anchor="middle">2</text>
    <line x1="335" y1="162" x2="335" y2="168"/>
    <text x="335" y="180" text-anchor="middle">3</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="40"  x2="203" y2="40"/>
    <text x="190" y="44"  text-anchor="end">5</text>
    <line x1="197" y1="65"  x2="203" y2="65"/>
    <text x="190" y="69"  text-anchor="end">4</text>
    <line x1="197" y1="90"  x2="203" y2="90"/>
    <text x="190" y="94"  text-anchor="end">3</text>
    <line x1="197" y1="115" x2="203" y2="115"/>
    <text x="190" y="119" text-anchor="end">2</text>
    <line x1="197" y1="140" x2="203" y2="140"/>
    <text x="190" y="144" text-anchor="end">1</text>
    <line x1="197" y1="190" x2="203" y2="190"/>
    <text x="190" y="194" text-anchor="end">-1</text>
    <line x1="197" y1="215" x2="203" y2="215"/>
    <text x="190" y="219" text-anchor="end">-2</text>
    <line x1="197" y1="240" x2="203" y2="240"/>
    <text x="190" y="244" text-anchor="end">-3</text>
    <line x1="197" y1="265" x2="203" y2="265"/>
    <text x="190" y="269" text-anchor="end">-4</text>
  </g>

  <!-- ── Courbe C_{f'} : parabole y = x^2 - 4 ──
       Valeurs (math) → (svg) :
       x = -3 -> y = 5 -> (65, 40)
       x = -2.5 -> y = 2.25 -> (87.5, 108.75)
       x = -2 -> y = 0 -> (110, 165)
       x = -1.5 -> y = -1.75 -> (132.5, 208.75)
       x = -1 -> y = -3 -> (155, 240)
       x = -0.5 -> y = -3.75 -> (177.5, 258.75)
       x = 0 -> y = -4 -> (200, 265)
       x = 0.5 -> y = -3.75 -> (222.5, 258.75)
       x = 1 -> y = -3 -> (245, 240)
       x = 1.5 -> y = -1.75 -> (267.5, 208.75)
       x = 2 -> y = 0 -> (290, 165)
       x = 2.5 -> y = 2.25 -> (312.5, 108.75)
       x = 3 -> y = 5 -> (335, 40)
  -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="65,40 87.5,108.75 110,165 132.5,208.75 155,240 177.5,258.75 200,265 222.5,258.75 245,240 267.5,208.75 290,165 312.5,108.75 335,40"/>

  <!-- ── Racines marquées (-2, 0) et (2, 0) ── -->
  <circle cx="110" cy="165" r="3" fill="#334155"/>
  <circle cx="290" cy="165" r="3" fill="#334155"/>

  <!-- ── Légende courbe — Attention : courbe de la dérivée f', pas f ! ── -->
  <g font-family="Georgia,serif" fill="#334155">
    <text x="78" y="55" font-size="14" font-style="italic">C</text>
    <text x="90" y="60" font-size="11" font-style="italic">f '</text>
  </g>
</svg>
