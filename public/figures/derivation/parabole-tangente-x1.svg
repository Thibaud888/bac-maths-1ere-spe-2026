<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole f(x)=x^2-4x+3 et sa tangente au point A(1,0)">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 50 px (1 unité x) -->
    <line x1="50"  y1="30" x2="50"  y2="305"/>
    <line x1="100" y1="30" x2="100" y2="305"/>
    <line x1="150" y1="30" x2="150" y2="305"/>
    <line x1="200" y1="30" x2="200" y2="305"/>
    <line x1="250" y1="30" x2="250" y2="305"/>
    <line x1="300" y1="30" x2="300" y2="305"/>
    <line x1="350" y1="30" x2="350" y2="305"/>
    <!-- horizontales tous les 25 px (1 unité y) -->
    <line x1="50" y1="30"  x2="350" y2="30"/>
    <line x1="50" y1="55"  x2="350" y2="55"/>
    <line x1="50" y1="80"  x2="350" y2="80"/>
    <line x1="50" y1="105" x2="350" y2="105"/>
    <line x1="50" y1="130" x2="350" y2="130"/>
    <line x1="50" y1="155" x2="350" y2="155"/>
    <line x1="50" y1="180" x2="350" y2="180"/>
    <line x1="50" y1="205" x2="350" y2="205"/>
    <line x1="50" y1="230" x2="350" y2="230"/>
    <line x1="50" y1="255" x2="350" y2="255"/>
    <line x1="50" y1="280" x2="350" y2="280"/>
    <line x1="50" y1="305" x2="350" y2="305"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y_math = 0 -> y_svg = 255) -->
  <line x1="40" y1="255" x2="360" y2="255" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,255 354,252 354,258" fill="#334155"/>
  <text x="358" y="270" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math = 0 -> x_svg = 100) -->
  <line x1="100" y1="315" x2="100" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="100,20 97,26 103,26" fill="#334155"/>
  <text x="85" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="92" y="270" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="252" x2="50"  y2="258"/>
    <text x="46"  y="270" text-anchor="middle">-1</text>
    <line x1="150" y1="252" x2="150" y2="258"/>
    <text x="150" y="270" text-anchor="middle">1</text>
    <line x1="200" y1="252" x2="200" y2="258"/>
    <text x="200" y="270" text-anchor="middle">2</text>
    <line x1="250" y1="252" x2="250" y2="258"/>
    <text x="250" y="270" text-anchor="middle">3</text>
    <line x1="300" y1="252" x2="300" y2="258"/>
    <text x="300" y="270" text-anchor="middle">4</text>
    <line x1="350" y1="252" x2="350" y2="258"/>
    <text x="350" y="270" text-anchor="middle">5</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="97" y1="280" x2="103" y2="280"/>
    <text x="90" y="284" text-anchor="end">-1</text>
    <line x1="97" y1="230" x2="103" y2="230"/>
    <text x="90" y="234" text-anchor="end">1</text>
    <line x1="97" y1="205" x2="103" y2="205"/>
    <text x="90" y="209" text-anchor="end">2</text>
    <line x1="97" y1="180" x2="103" y2="180"/>
    <text x="90" y="184" text-anchor="end">3</text>
    <line x1="97" y1="155" x2="103" y2="155"/>
    <text x="90" y="159" text-anchor="end">4</text>
    <line x1="97" y1="130" x2="103" y2="130"/>
    <text x="90" y="134" text-anchor="end">5</text>
    <line x1="97" y1="105" x2="103" y2="105"/>
    <text x="90" y="109" text-anchor="end">6</text>
    <line x1="97" y1="80"  x2="103" y2="80"/>
    <text x="90" y="84"  text-anchor="end">7</text>
    <line x1="97" y1="55"  x2="103" y2="55"/>
    <text x="90" y="59"  text-anchor="end">8</text>
  </g>

  <!-- ── Tangente y = -2x + 2 (tracée pour x de -0.2 à 2) ── -->
  <line x1="90" y1="195" x2="200" y2="305" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3"/>
  <text x="70" y="190" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">T</text>

  <!-- ── Courbe de f ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,55 62.5,90.94 75,123.75 87.5,153.44 100,180 112.5,203.44 125,223.75 137.5,240.94 150,255 162.5,265.94 175,273.75 187.5,278.44 200,280 212.5,278.44 225,273.75 237.5,265.94 250,255 262.5,240.94 275,223.75 287.5,203.44 300,180 312.5,153.44 325,123.75 337.5,90.94 350,55"/>

  <!-- ── Point A(1, 0) ── -->
  <circle cx="150" cy="255" r="3" fill="#334155"/>
  <text x="156" y="248" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- ── Légende courbe ── -->
  <text x="320" y="80" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
