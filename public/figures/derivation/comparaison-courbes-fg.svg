<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe Cf, parabole d'equation f(x)=x^2-x-1, et courbe Cg, droite horizontale d'equation g(x)=1, sur l'intervalle [-2;3]. Les deux courbes se croisent aux points (-1;1) et (2;1)">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 50 px (1 unité x), x de -2 à 3 -->
    <line x1="50"  y1="15" x2="50"  y2="245"/>
    <line x1="100" y1="15" x2="100" y2="245"/>
    <line x1="150" y1="15" x2="150" y2="245"/>
    <line x1="200" y1="15" x2="200" y2="245"/>
    <line x1="250" y1="15" x2="250" y2="245"/>
    <line x1="300" y1="15" x2="300" y2="245"/>
    <!-- horizontales tous les 28 px (1 unité y), y de -2 à 5 -->
    <line x1="30" y1="30"  x2="350" y2="30"/>
    <line x1="30" y1="58"  x2="350" y2="58"/>
    <line x1="30" y1="86"  x2="350" y2="86"/>
    <line x1="30" y1="114" x2="350" y2="114"/>
    <line x1="30" y1="142" x2="350" y2="142"/>
    <line x1="30" y1="170" x2="350" y2="170"/>
    <line x1="30" y1="198" x2="350" y2="198"/>
    <line x1="30" y1="226" x2="350" y2="226"/>
  </g>

  <!-- ── Axes ──
       Origine math (0,0) : x_svg = 150, y_svg = 170 ; 1 unité x = 50 px ; 1 unité y = 28 px -->
  <!-- Axe Ox -->
  <line x1="30" y1="170" x2="350" y2="170" stroke="#334155" stroke-width="1.2"/>
  <polygon points="350,170 344,167 344,173" fill="#334155"/>
  <text x="345" y="185" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="150" y1="245" x2="150" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="150,15 147,21 153,21" fill="#334155"/>
  <text x="135" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="137" y="183" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="167" x2="50"  y2="173"/>
    <text x="50"  y="185" text-anchor="middle">-2</text>
    <line x1="100" y1="167" x2="100" y2="173"/>
    <text x="100" y="185" text-anchor="middle">-1</text>
    <line x1="200" y1="167" x2="200" y2="173"/>
    <text x="200" y="185" text-anchor="middle">1</text>
    <line x1="250" y1="167" x2="250" y2="173"/>
    <text x="250" y="185" text-anchor="middle">2</text>
    <line x1="300" y1="167" x2="300" y2="173"/>
    <text x="300" y="185" text-anchor="middle">3</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="147" y1="30"  x2="153" y2="30"/>
    <text x="143" y="34"  text-anchor="end">5</text>
    <line x1="147" y1="58"  x2="153" y2="58"/>
    <text x="143" y="62"  text-anchor="end">4</text>
    <line x1="147" y1="86"  x2="153" y2="86"/>
    <text x="143" y="90"  text-anchor="end">3</text>
    <line x1="147" y1="114" x2="153" y2="114"/>
    <text x="143" y="118" text-anchor="end">2</text>
    <line x1="147" y1="142" x2="153" y2="142"/>
    <text x="143" y="146" text-anchor="end">1</text>
    <line x1="147" y1="198" x2="153" y2="198"/>
    <text x="143" y="202" text-anchor="end">-1</text>
    <line x1="147" y1="226" x2="153" y2="226"/>
    <text x="143" y="230" text-anchor="end">-2</text>
  </g>

  <!-- ── Courbe C_g : droite horizontale g(x) = 1 ── -->
  <line x1="50" y1="142" x2="300" y2="142" stroke="#2563eb" stroke-width="1.8"/>

  <!-- ── Courbe C_f : parabole f(x) = x^2 - x - 1 (21 points, pas 0,25) ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,30 62.5,63.25 75,93 87.5,119.25 100,142 112.5,161.25 125,177 137.5,189.25 150,198 162.5,203.25 175,205 187.5,203.25 200,198 212.5,189.25 225,177 237.5,161.25 250,142 262.5,119.25 275,93 287.5,63.25 300,30"/>

  <!-- ── Points d'intersection marqués ── -->
  <!-- A(-1 ; 1) -->
  <circle cx="100" cy="142" r="3.5" fill="#334155"/>
  <text x="60" y="160" font-size="11" fill="#334155" font-family="Georgia,serif">(-1 ; 1)</text>

  <!-- B(2 ; 1) -->
  <circle cx="250" cy="142" r="3.5" fill="#334155"/>
  <text x="200" y="163" font-size="11" fill="#334155" font-family="Georgia,serif">(2 ; 1)</text>

  <!-- ── Légendes courbes ── -->
  <text x="305" y="28" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
  <text x="305" y="147" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">C_g</text>
</svg>
