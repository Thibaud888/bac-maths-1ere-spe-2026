<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe de la fonction cubique f(x)=x^3-3x avec maximum local en (-1,2) et minimum local en (1,-2)">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 70 px (1 unité x), x de -2 à 2 -->
    <line x1="60"  y1="40" x2="60"  y2="280"/>
    <line x1="130" y1="40" x2="130" y2="280"/>
    <line x1="200" y1="40" x2="200" y2="280"/>
    <line x1="270" y1="40" x2="270" y2="280"/>
    <line x1="340" y1="40" x2="340" y2="280"/>
    <!-- horizontales tous les 48 px (1 unité y), y de -2.5 à 2.5, marquons les entiers -->
    <line x1="60" y1="64"  x2="340" y2="64"/>
    <line x1="60" y1="112" x2="340" y2="112"/>
    <line x1="60" y1="160" x2="340" y2="160"/>
    <line x1="60" y1="208" x2="340" y2="208"/>
    <line x1="60" y1="256" x2="340" y2="256"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y_math = 0 -> y_svg = 160) -->
  <line x1="50" y1="160" x2="360" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,160 354,157 354,163" fill="#334155"/>
  <text x="358" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math = 0 -> x_svg = 200) -->
  <line x1="200" y1="290" x2="200" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,30 197,36 203,36" fill="#334155"/>
  <text x="185" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="192" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="60"  y1="157" x2="60"  y2="163"/>
    <text x="60"  y="175" text-anchor="middle">-2</text>
    <line x1="130" y1="157" x2="130" y2="163"/>
    <text x="130" y="175" text-anchor="middle">-1</text>
    <line x1="270" y1="157" x2="270" y2="163"/>
    <text x="270" y="175" text-anchor="middle">1</text>
    <line x1="340" y1="157" x2="340" y2="163"/>
    <text x="340" y="175" text-anchor="middle">2</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="64"  x2="203" y2="64"/>
    <text x="190" y="68"  text-anchor="end">2</text>
    <line x1="197" y1="112" x2="203" y2="112"/>
    <text x="190" y="116" text-anchor="end">1</text>
    <line x1="197" y1="208" x2="203" y2="208"/>
    <text x="190" y="212" text-anchor="end">-1</text>
    <line x1="197" y1="256" x2="203" y2="256"/>
    <text x="190" y="260" text-anchor="end">-2</text>
  </g>

  <!-- ── Courbe de f (21 points) ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="60,256 74,180.74 88,126.20 102,90.11 116,70.14 130,64 144,69.38 158,83.97 172,105.47 186,131.58 200,160 214,188.42 228,214.53 242,236.03 256,250.62 270,256 284,249.86 298,229.89 312,193.79 326,139.26 340,64"/>

  <!-- ── Extremums marqués ── -->
  <!-- Maximum local M1(-1, 2) -->
  <circle cx="130" cy="64" r="3.5" fill="#334155"/>
  <text x="118" y="56" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">M_1</text>

  <!-- Minimum local M2(1, -2) -->
  <circle cx="270" cy="256" r="3.5" fill="#334155"/>
  <text x="278" y="272" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">M_2</text>

  <!-- ── Légende courbe ── -->
  <text x="345" y="80" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
