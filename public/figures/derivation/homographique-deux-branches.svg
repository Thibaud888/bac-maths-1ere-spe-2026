<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe de la fonction homographique f(x)=(x+1)/(x-2) avec deux branches séparées par la droite verticale d'équation x=2">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 30 px (1 unité x), x de -3 à 7 -->
    <line x1="50"  y1="30" x2="50"  y2="290"/>
    <line x1="80"  y1="30" x2="80"  y2="290"/>
    <line x1="110" y1="30" x2="110" y2="290"/>
    <line x1="140" y1="30" x2="140" y2="290"/>
    <line x1="170" y1="30" x2="170" y2="290"/>
    <line x1="200" y1="30" x2="200" y2="290"/>
    <line x1="230" y1="30" x2="230" y2="290"/>
    <line x1="260" y1="30" x2="260" y2="290"/>
    <line x1="290" y1="30" x2="290" y2="290"/>
    <line x1="320" y1="30" x2="320" y2="290"/>
    <line x1="350" y1="30" x2="350" y2="290"/>
    <!-- horizontales tous les 25 px (1 unité y), y de -4 à 6 -->
    <line x1="50" y1="30"  x2="350" y2="30"/>
    <line x1="50" y1="55"  x2="350" y2="55"/>
    <line x1="50" y1="80"  x2="350" y2="80"/>
    <line x1="50" y1="105" x2="350" y2="105"/>
    <line x1="50" y1="130" x2="350" y2="130"/>
    <line x1="50" y1="155" x2="350" y2="155"/>
    <line x1="50" y1="205" x2="350" y2="205"/>
    <line x1="50" y1="230" x2="350" y2="230"/>
    <line x1="50" y1="255" x2="350" y2="255"/>
    <line x1="50" y1="280" x2="350" y2="280"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y_math = 0 -> y_svg = 180) -->
  <line x1="40" y1="180" x2="360" y2="180" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,180 354,177 354,183" fill="#334155"/>
  <text x="358" y="195" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math = 0 -> x_svg = 140) -->
  <line x1="140" y1="300" x2="140" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="140,20 137,26 143,26" fill="#334155"/>
  <text x="125" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="128" y="195" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="177" x2="50"  y2="183"/>
    <text x="50"  y="195" text-anchor="middle">-3</text>
    <line x1="110" y1="177" x2="110" y2="183"/>
    <text x="110" y="195" text-anchor="middle">-1</text>
    <line x1="170" y1="177" x2="170" y2="183"/>
    <text x="170" y="195" text-anchor="middle">1</text>
    <line x1="200" y1="177" x2="200" y2="183"/>
    <text x="200" y="195" text-anchor="middle">2</text>
    <line x1="230" y1="177" x2="230" y2="183"/>
    <text x="230" y="195" text-anchor="middle">3</text>
    <line x1="290" y1="177" x2="290" y2="183"/>
    <text x="290" y="195" text-anchor="middle">5</text>
    <line x1="350" y1="177" x2="350" y2="183"/>
    <text x="350" y="195" text-anchor="middle">7</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="137" y1="30"  x2="143" y2="30"/>
    <text x="130" y="34"  text-anchor="end">6</text>
    <line x1="137" y1="80"  x2="143" y2="80"/>
    <text x="130" y="84"  text-anchor="end">4</text>
    <line x1="137" y1="130" x2="143" y2="130"/>
    <text x="130" y="134" text-anchor="end">2</text>
    <line x1="137" y1="230" x2="143" y2="230"/>
    <text x="130" y="234" text-anchor="end">-2</text>
    <line x1="137" y1="280" x2="143" y2="280"/>
    <text x="130" y="284" text-anchor="end">-4</text>
  </g>

  <!-- ── Asymptote verticale x = 2 ── -->
  <line x1="200" y1="30" x2="200" y2="290" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="206" y="42" font-size="11" fill="#475569" font-family="Georgia,serif">x = 2</text>

  <!-- ── Branche gauche (x < 2) ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,170 80,173.75 110,180 140,192.5 155,205 170,230 182,280"/>

  <!-- ── Branche droite (x > 2) ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="218,30 221,47.86 230,80 245,105 260,117.5 290,130 320,136.25 350,140"/>

  <!-- ── Légende courbe ── -->
  <text x="55" y="160" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
