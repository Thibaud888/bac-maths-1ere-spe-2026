<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Allure de la courbe d'une fonction rationnelle définie sur R privé de 0, avec deux branches séparées par la droite verticale d'équation x=0">
  <!-- ── Axes (sans graduations numériques détaillées) ── -->
  <line x1="40" y1="160" x2="360" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,160 354,157 354,163" fill="#334155"/>
  <text x="358" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="290" x2="200" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,30 197,36 203,36" fill="#334155"/>
  <text x="185" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="192" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Asymptote verticale x = 0 mise en évidence (l'axe Oy joue ce rôle) ── -->
  <line x1="200" y1="290" x2="200" y2="30" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Branche gauche (x < 0) : forme générique allant de bas-gauche vers bas-droite près de l'asymptote ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="60,245 95,226.67 112.5,218 130,210 147.5,203.33 165,200 175.5,202.57 182.5,210 189.5,232.67 193,264 195,285"/>

  <!-- ── Branche droite (x > 0) : forme générique allant de haut-gauche près de l'asymptote vers haut-droite ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="205,35 207,56 210.5,87.33 217.5,110 224.5,117.43 235,120 252.5,116.67 270,110 287.5,102 305,93.33 340,75"/>

  <!-- ── Légende courbe ── -->
  <text x="55" y="265" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>

  <!-- ── Note explicative ── -->
  <text x="200" y="310" text-anchor="middle" font-size="10" fill="#475569" font-family="Georgia,serif">Allure de la courbe (les coordonnées des points particuliers sont à déterminer)</text>
</svg>
