<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 190" width="250" height="190" role="img" aria-label="Rectangle de largeur x et de hauteur (10 − x), périmètre = 20 cm">
  <!-- ── Rectangle ── -->
  <rect x="40" y="45" width="160" height="100" fill="white" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Width dimension (top) ── -->
  <line x1="40"  y1="30" x2="200" y2="30" stroke="#94a3b8" stroke-width="1"/>
  <line x1="40"  y1="26" x2="40"  y2="34" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="26" x2="200" y2="34" stroke="#94a3b8" stroke-width="1"/>
  <text x="120" y="22" text-anchor="middle" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- ── Height dimension (right) ── -->
  <line x1="215" y1="45"  x2="215" y2="145" stroke="#94a3b8" stroke-width="1"/>
  <line x1="211" y1="45"  x2="219" y2="45"  stroke="#94a3b8" stroke-width="1"/>
  <line x1="211" y1="145" x2="219" y2="145" stroke="#94a3b8" stroke-width="1"/>
  <text x="237" y="99" text-anchor="middle" font-size="13" fill="#334155" font-family="Georgia,serif">10 &#8722; x</text>

  <!-- ── Area label inside ── -->
  <text x="120" y="97" text-anchor="middle" font-size="12" fill="#94a3b8" font-family="Georgia,serif">Aire = x(10 &#8722; x)</text>

  <!-- ── Perimeter annotation ── -->
  <text x="120" y="175" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">Périmètre = 2x + 2(10 &#8722; x) = 20 cm</text>
</svg>
