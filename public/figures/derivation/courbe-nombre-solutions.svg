<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe d'une fonction f sur [-3 ; 4] avec maximum local f(-1)=3 et minimum local f(2)=-1, valeurs entieres aux extremites">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 35 px (1 unité x), x de -3 à 4 -->
    <line x1="50"  y1="30" x2="50"  y2="290"/>
    <line x1="85"  y1="30" x2="85"  y2="290"/>
    <line x1="120" y1="30" x2="120" y2="290"/>
    <line x1="155" y1="30" x2="155" y2="290"/>
    <line x1="190" y1="30" x2="190" y2="290"/>
    <line x1="225" y1="30" x2="225" y2="290"/>
    <line x1="260" y1="30" x2="260" y2="290"/>
    <line x1="295" y1="30" x2="295" y2="290"/>
    <line x1="330" y1="30" x2="330" y2="290"/>
    <!-- horizontales tous les 30 px (1 unité y), y de -4 à 4 -->
    <line x1="50" y1="40"  x2="330" y2="40"/>
    <line x1="50" y1="70"  x2="330" y2="70"/>
    <line x1="50" y1="100" x2="330" y2="100"/>
    <line x1="50" y1="130" x2="330" y2="130"/>
    <line x1="50" y1="160" x2="330" y2="160"/>
    <line x1="50" y1="190" x2="330" y2="190"/>
    <line x1="50" y1="220" x2="330" y2="220"/>
    <line x1="50" y1="250" x2="330" y2="250"/>
    <line x1="50" y1="280" x2="330" y2="280"/>
  </g>

  <!-- ── Axes ──
       Origine math (0,0) : x_svg = 155, y_svg = 160 ; 1 unité x = 35 px ; 1 unité y = 30 px -->
  <!-- Axe Ox -->
  <line x1="40" y1="160" x2="350" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="350,160 344,157 344,163" fill="#334155"/>
  <text x="348" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="155" y1="300" x2="155" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="155,20 152,26 158,26" fill="#334155"/>
  <text x="140" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="142" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="157" x2="50"  y2="163"/>
    <text x="50"  y="175" text-anchor="middle">-3</text>
    <line x1="85"  y1="157" x2="85"  y2="163"/>
    <text x="85"  y="175" text-anchor="middle">-2</text>
    <line x1="120" y1="157" x2="120" y2="163"/>
    <text x="120" y="175" text-anchor="middle">-1</text>
    <line x1="190" y1="157" x2="190" y2="163"/>
    <text x="190" y="175" text-anchor="middle">1</text>
    <line x1="225" y1="157" x2="225" y2="163"/>
    <text x="225" y="175" text-anchor="middle">2</text>
    <line x1="260" y1="157" x2="260" y2="163"/>
    <text x="260" y="175" text-anchor="middle">3</text>
    <line x1="295" y1="157" x2="295" y2="163"/>
    <text x="295" y="175" text-anchor="middle">4</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="152" y1="40"  x2="158" y2="40"/>
    <text x="148" y="44"  text-anchor="end">4</text>
    <line x1="152" y1="70"  x2="158" y2="70"/>
    <text x="148" y="74"  text-anchor="end">3</text>
    <line x1="152" y1="100" x2="158" y2="100"/>
    <text x="148" y="104" text-anchor="end">2</text>
    <line x1="152" y1="130" x2="158" y2="130"/>
    <text x="148" y="134" text-anchor="end">1</text>
    <line x1="152" y1="190" x2="158" y2="190"/>
    <text x="148" y="194" text-anchor="end">-1</text>
    <line x1="152" y1="220" x2="158" y2="220"/>
    <text x="148" y="224" text-anchor="end">-2</text>
    <line x1="152" y1="250" x2="158" y2="250"/>
    <text x="148" y="254" text-anchor="end">-3</text>
    <line x1="152" y1="280" x2="158" y2="280"/>
    <text x="148" y="284" text-anchor="end">-4</text>
  </g>

  <!-- ── Courbe de f ──
       Points clés (math):
         (-3, -3), (-1, 3) max, (2, -1) min, (4, 4)
       Conversion: x_svg = 155 + 35*x ; y_svg = 160 - 30*y
       (-3,-3) -> (50, 250) ; (-2, 1) -> (85, 130) ; (-1, 3) -> (120, 70) ;
       (0, 2.4) -> (155, 88) ; (1, 1) -> (190, 130) ; (2, -1) -> (225, 190) ;
       (3, 1) -> (260, 130) ; (4, 4) -> (295, 40) — note: x=4 ne va que jusqu'à 295.
       En réalité, x=4 correspond à x_svg = 155 + 4*35 = 295.
  -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,250 67.5,225 85,180 102.5,120 120,70 137.5,82 155,105 172.5,130 190,150 207.5,175 225,190 242.5,185 260,160 277.5,110 295,40"/>

  <!-- ── Points marqués : extremums ── -->
  <!-- Maximum local en (-1, 3) -->
  <circle cx="120" cy="70" r="3" fill="#334155"/>
  <text x="100" y="62" font-size="11" fill="#334155" font-family="Georgia,serif">(-1 ; 3)</text>

  <!-- Minimum local en (2, -1) -->
  <circle cx="225" cy="190" r="3" fill="#334155"/>
  <text x="232" y="208" font-size="11" fill="#334155" font-family="Georgia,serif">(2 ; -1)</text>

  <!-- ── Légende courbe ── -->
  <text x="298" y="56" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
