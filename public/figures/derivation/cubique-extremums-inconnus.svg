<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Schéma d'une fonction cubique avec un maximum local et un minimum local à déterminer">
  <!-- ── Axes (sans graduations numériques) ── -->
  <line x1="40" y1="160" x2="360" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,160 354,157 354,163" fill="#334155"/>
  <text x="358" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="290" x2="200" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,30 197,36 203,36" fill="#334155"/>
  <text x="185" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="192" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Courbe d'une cubique générique (allure : monte, descend, monte) ── -->
  <!-- forme "f(x) = (x+2)(x)(x-3)/8 + décalage" en SVG ; uniquement illustrative -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="55,275 70,245 85,215 100,185 115,155 130,128 145,108 160,98 175,100 190,114 205,135 220,160 235,188 250,215 265,238 280,252 295,255 310,243 325,215 340,170 350,135"/>

  <!-- ── Maximum local et minimum local marqués sans valeurs ── -->
  <circle cx="160" cy="98" r="3.5" fill="#334155"/>
  <text x="165" y="92" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">max. local</text>

  <circle cx="295" cy="255" r="3.5" fill="#334155"/>
  <text x="240" y="275" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">min. local</text>

  <!-- ── Tangentes horizontales en pointillés aux extremums ── -->
  <line x1="130" y1="98" x2="190" y2="98" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="265" y1="255" x2="325" y2="255" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Légende courbe ── -->
  <text x="60" y="280" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>

  <!-- ── Note explicative ── -->
  <text x="200" y="310" text-anchor="middle" font-size="10" fill="#475569" font-family="Georgia,serif">Allure de la courbe (les valeurs des extremums sont à déterminer)</text>
</svg>
