<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe de la fonction cubique f(x)=x^3-2x+1 avec le point A d'abscisse 1 marqué sur la courbe">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales tous les 35 px (0.5 unité x), x de -2 à 2 -->
    <line x1="60"  y1="40" x2="60"  y2="290"/>
    <line x1="95"  y1="40" x2="95"  y2="290"/>
    <line x1="130" y1="40" x2="130" y2="290"/>
    <line x1="165" y1="40" x2="165" y2="290"/>
    <line x1="200" y1="40" x2="200" y2="290"/>
    <line x1="235" y1="40" x2="235" y2="290"/>
    <line x1="270" y1="40" x2="270" y2="290"/>
    <line x1="305" y1="40" x2="305" y2="290"/>
    <line x1="340" y1="40" x2="340" y2="290"/>
    <!-- horizontales tous les 30 px (1 unité y), y de -3 à 5 -->
    <line x1="60" y1="40"  x2="340" y2="40"/>
    <line x1="60" y1="70"  x2="340" y2="70"/>
    <line x1="60" y1="100" x2="340" y2="100"/>
    <line x1="60" y1="130" x2="340" y2="130"/>
    <line x1="60" y1="160" x2="340" y2="160"/>
    <line x1="60" y1="190" x2="340" y2="190"/>
    <line x1="60" y1="220" x2="340" y2="220"/>
    <line x1="60" y1="250" x2="340" y2="250"/>
    <line x1="60" y1="280" x2="340" y2="280"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y_math = 0 -> y_svg = 190) -->
  <line x1="50" y1="190" x2="360" y2="190" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,190 354,187 354,193" fill="#334155"/>
  <text x="358" y="205" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math = 0 -> x_svg = 200) -->
  <line x1="200" y1="300" x2="200" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,30 197,36 203,36" fill="#334155"/>
  <text x="185" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="192" y="205" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="60"  y1="187" x2="60"  y2="193"/>
    <text x="60"  y="205" text-anchor="middle">-2</text>
    <line x1="130" y1="187" x2="130" y2="193"/>
    <text x="130" y="205" text-anchor="middle">-1</text>
    <line x1="270" y1="187" x2="270" y2="193"/>
    <text x="270" y="205" text-anchor="middle">1</text>
    <line x1="340" y1="187" x2="340" y2="193"/>
    <text x="340" y="205" text-anchor="middle">2</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="40"  x2="203" y2="40"/>
    <text x="190" y="44"  text-anchor="end">5</text>
    <line x1="197" y1="70"  x2="203" y2="70"/>
    <text x="190" y="74"  text-anchor="end">4</text>
    <line x1="197" y1="100" x2="203" y2="100"/>
    <text x="190" y="104" text-anchor="end">3</text>
    <line x1="197" y1="130" x2="203" y2="130"/>
    <text x="190" y="134" text-anchor="end">2</text>
    <line x1="197" y1="160" x2="203" y2="160"/>
    <text x="190" y="164" text-anchor="end">1</text>
    <line x1="197" y1="220" x2="203" y2="220"/>
    <text x="190" y="224" text-anchor="end">-1</text>
    <line x1="197" y1="250" x2="203" y2="250"/>
    <text x="190" y="254" text-anchor="end">-2</text>
    <line x1="197" y1="280" x2="203" y2="280"/>
    <text x="190" y="284" text-anchor="end">-3</text>
  </g>

  <!-- ── Courbe de f(x) = x^3 - 2x + 1 ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="60,280 77.5,215.78 95,171.25 112.5,143.59 130,130 147.5,127.66 165,133.75 182.5,145.47 200,160 217.5,174.53 235,186.25 252.5,192.34 270,190 287.5,176.41 305,148.75 322.5,104.22 340,40"/>

  <!-- ── Point A(1, 0) ── -->
  <circle cx="270" cy="190" r="3.5" fill="#334155"/>
  <text x="276" y="183" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- ── Légende courbe ── -->
  <text x="345" y="60" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
