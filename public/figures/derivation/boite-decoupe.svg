<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 295" width="280" height="295" role="img" aria-label="Plaque carrée de côté 12 cm avec coins de côté x découpés">
  <!-- ── Outer square ── -->
  <rect x="40" y="50" width="200" height="200" fill="white" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Corner squares (grey = cut out) ── -->
  <rect x="40"  y="50"  width="40" height="40" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
  <rect x="200" y="50"  width="40" height="40" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
  <rect x="40"  y="210" width="40" height="40" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>
  <rect x="200" y="210" width="40" height="40" fill="#e2e8f0" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Dashed fold lines ── -->
  <line x1="80"  y1="50"  x2="80"  y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="200" y1="50"  x2="200" y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="40"  y1="90"  x2="240" y2="90"  stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="40"  y1="210" x2="240" y2="210" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- ── "x" labels inside corner squares ── -->
  <text x="60"  y="73"  text-anchor="middle" font-size="13" font-style="italic" fill="#475569" font-family="Georgia,serif">x</text>
  <text x="220" y="73"  text-anchor="middle" font-size="13" font-style="italic" fill="#475569" font-family="Georgia,serif">x</text>
  <text x="60"  y="233" text-anchor="middle" font-size="13" font-style="italic" fill="#475569" font-family="Georgia,serif">x</text>
  <text x="220" y="233" text-anchor="middle" font-size="13" font-style="italic" fill="#475569" font-family="Georgia,serif">x</text>

  <!-- ── "x" labels for side flaps ── -->
  <text x="60"  y="155" text-anchor="middle" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>
  <text x="220" y="155" text-anchor="middle" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- ── "12 − 2x" labels for top/base/bottom flaps ── -->
  <text x="140" y="75"  text-anchor="middle" font-size="12" fill="#334155" font-family="Georgia,serif">12 &#8722; 2x</text>
  <text x="140" y="155" text-anchor="middle" font-size="12" fill="#334155" font-family="Georgia,serif">12 &#8722; 2x</text>
  <text x="140" y="235" text-anchor="middle" font-size="12" fill="#334155" font-family="Georgia,serif">12 &#8722; 2x</text>

  <!-- ── Dimension rulers at top ── -->
  <!-- x ruler TL -->
  <line x1="40" y1="35" x2="80"  y2="35" stroke="#94a3b8" stroke-width="1"/>
  <line x1="40" y1="31" x2="40"  y2="39" stroke="#94a3b8" stroke-width="1"/>
  <line x1="80" y1="31" x2="80"  y2="39" stroke="#94a3b8" stroke-width="1"/>
  <text x="60"  y="28" text-anchor="middle" font-size="12" font-style="italic" fill="#475569" font-family="Georgia,serif">x</text>

  <!-- 12-2x ruler -->
  <line x1="80"  y1="35" x2="200" y2="35" stroke="#94a3b8" stroke-width="1"/>
  <line x1="80"  y1="31" x2="80"  y2="39" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="31" x2="200" y2="39" stroke="#94a3b8" stroke-width="1"/>
  <text x="140" y="24" text-anchor="middle" font-size="12" fill="#334155" font-family="Georgia,serif">12 &#8722; 2x</text>

  <!-- x ruler TR -->
  <line x1="200" y1="35" x2="240" y2="35" stroke="#94a3b8" stroke-width="1"/>
  <line x1="200" y1="31" x2="200" y2="39" stroke="#94a3b8" stroke-width="1"/>
  <line x1="240" y1="31" x2="240" y2="39" stroke="#94a3b8" stroke-width="1"/>
  <text x="220" y="28" text-anchor="middle" font-size="12" font-style="italic" fill="#475569" font-family="Georgia,serif">x</text>

  <!-- ── Total width ruler at bottom ── -->
  <line x1="40"  y1="265" x2="240" y2="265" stroke="#94a3b8" stroke-width="1"/>
  <line x1="40"  y1="261" x2="40"  y2="269" stroke="#94a3b8" stroke-width="1"/>
  <line x1="240" y1="261" x2="240" y2="269" stroke="#94a3b8" stroke-width="1"/>
  <text x="140" y="283" text-anchor="middle" font-size="14" fill="#334155" font-family="Georgia,serif">12</text>
</svg>
