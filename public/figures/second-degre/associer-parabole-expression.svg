<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole tournée vers le bas, racines x=-2 et x=4, sommet S(1,9), passant par (0,8) ; à associer à l'expression algébrique correspondante">
  <!-- f(x) = -(x+2)(x-4) = -x^2 + 2x + 8 ; racines -2 et 4 ; sommet (1, 9) ; f(0) = 8 -->
  <!-- 1 unité x = 40 px, origine x_math=0 à x_svg=130 -->
  <!-- 1 unité y = 22 px, origine y_math=0 à y_svg=260 -->
  <!-- Plage : x in [-3 ; 5], y in [-3 ; 10] -->
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : x = -3 à 5 -->
    <line x1="10"  y1="30" x2="10"  y2="290"/>
    <line x1="50"  y1="30" x2="50"  y2="290"/>
    <line x1="90"  y1="30" x2="90"  y2="290"/>
    <line x1="130" y1="30" x2="130" y2="290"/>
    <line x1="170" y1="30" x2="170" y2="290"/>
    <line x1="210" y1="30" x2="210" y2="290"/>
    <line x1="250" y1="30" x2="250" y2="290"/>
    <line x1="290" y1="30" x2="290" y2="290"/>
    <line x1="330" y1="30" x2="330" y2="290"/>
    <!-- horizontales : y = -3 à 10 -->
    <line x1="5" y1="40"  x2="345" y2="40"/>
    <line x1="5" y1="62"  x2="345" y2="62"/>
    <line x1="5" y1="84"  x2="345" y2="84"/>
    <line x1="5" y1="106" x2="345" y2="106"/>
    <line x1="5" y1="128" x2="345" y2="128"/>
    <line x1="5" y1="150" x2="345" y2="150"/>
    <line x1="5" y1="172" x2="345" y2="172"/>
    <line x1="5" y1="194" x2="345" y2="194"/>
    <line x1="5" y1="216" x2="345" y2="216"/>
    <line x1="5" y1="238" x2="345" y2="238"/>
    <line x1="5" y1="282" x2="345" y2="282"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y=0 -> y_svg=260) -->
  <line x1="5" y1="260" x2="350" y2="260" stroke="#334155" stroke-width="1.2"/>
  <polygon points="350,260 344,257 344,263" fill="#334155"/>
  <text x="343" y="275" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x=0 -> x_svg=130) -->
  <line x1="130" y1="305" x2="130" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="130,20 127,26 133,26" fill="#334155"/>
  <text x="115" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="118" y="275" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="10"  y1="257" x2="10"  y2="263"/>
    <text x="10"  y="275" text-anchor="middle">-3</text>
    <line x1="50"  y1="257" x2="50"  y2="263"/>
    <text x="50"  y="275" text-anchor="middle">-2</text>
    <line x1="90"  y1="257" x2="90"  y2="263"/>
    <text x="90"  y="275" text-anchor="middle">-1</text>
    <line x1="170" y1="257" x2="170" y2="263"/>
    <text x="170" y="275" text-anchor="middle">1</text>
    <line x1="210" y1="257" x2="210" y2="263"/>
    <text x="210" y="275" text-anchor="middle">2</text>
    <line x1="250" y1="257" x2="250" y2="263"/>
    <text x="250" y="275" text-anchor="middle">3</text>
    <line x1="290" y1="257" x2="290" y2="263"/>
    <text x="290" y="275" text-anchor="middle">4</text>
    <line x1="330" y1="257" x2="330" y2="263"/>
    <text x="330" y="275" text-anchor="middle">5</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="127" y1="282" x2="133" y2="282"/>
    <text x="122" y="286" text-anchor="end">-1</text>
    <line x1="127" y1="238" x2="133" y2="238"/>
    <text x="122" y="242" text-anchor="end">1</text>
    <line x1="127" y1="216" x2="133" y2="216"/>
    <text x="122" y="220" text-anchor="end">2</text>
    <line x1="127" y1="194" x2="133" y2="194"/>
    <text x="122" y="198" text-anchor="end">3</text>
    <line x1="127" y1="172" x2="133" y2="172"/>
    <text x="122" y="176" text-anchor="end">4</text>
    <line x1="127" y1="150" x2="133" y2="150"/>
    <text x="122" y="154" text-anchor="end">5</text>
    <line x1="127" y1="128" x2="133" y2="128"/>
    <text x="122" y="132" text-anchor="end">6</text>
    <line x1="127" y1="106" x2="133" y2="106"/>
    <text x="122" y="110" text-anchor="end">7</text>
    <line x1="127" y1="84"  x2="133" y2="84"/>
    <text x="122" y="88"  text-anchor="end">8</text>
    <line x1="127" y1="62"  x2="133" y2="62"/>
    <text x="122" y="66"  text-anchor="end">9</text>
    <line x1="127" y1="40"  x2="133" y2="40"/>
    <text x="122" y="44"  text-anchor="end">10</text>
  </g>

  <!-- ── Courbe f(x) = -x^2 + 2x + 8 sur [-2.5 ; 4.5] (pas 0.5) ── -->
  <!-- y_svg = 260 - f(x) * 22 -->
  <!-- Points (x ; f) :
       x=-2.5: f=-3.25 ; x=-2: 0 ; x=-1.5: 4.25 ; x=-1: 5 ; x=-0.5: 6.75 -- wait recompute -->
  <!-- f(-2.5) = -6.25 - 5 + 8 = -3.25
       f(-2) = -4 - 4 + 8 = 0
       f(-1.5) = -2.25 - 3 + 8 = 2.75
       f(-1) = -1 - 2 + 8 = 5
       f(-0.5) = -0.25 - 1 + 8 = 6.75
       f(0) = 8
       f(0.5) = -0.25 + 1 + 8 = 8.75
       f(1) = -1 + 2 + 8 = 9
       f(1.5) = -2.25 + 3 + 8 = 8.75
       f(2) = -4 + 4 + 8 = 8
       f(2.5) = -6.25 + 5 + 8 = 6.75
       f(3) = -9 + 6 + 8 = 5
       f(3.5) = -12.25 + 7 + 8 = 2.75
       f(4) = -16 + 8 + 8 = 0
       f(4.5) = -20.25 + 9 + 8 = -3.25 -->
  <!-- y_svg : -3.25 -> 331.5 ; 0 -> 260 ; 2.75 -> 199.5 ; 5 -> 150 ; 6.75 -> 111.5 ; 8 -> 84 ; 8.75 -> 67.5 ; 9 -> 62 -->
  <!-- x_svg : 130 + x*40 -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="30,331.5 50,260 70,199.5 90,150 110,111.5 130,84 150,67.5 170,62 190,67.5 210,84 230,111.5 250,150 270,199.5 290,260 310,331.5"/>

  <!-- ── Racines (-2, 0) et (4, 0) ── -->
  <circle cx="50" cy="260" r="3" fill="#334155"/>
  <text x="38" y="253" font-size="11" fill="#334155" font-family="Georgia,serif">x_1</text>
  <circle cx="290" cy="260" r="3" fill="#334155"/>
  <text x="295" y="253" font-size="11" fill="#334155" font-family="Georgia,serif">x_2</text>

  <!-- ── Sommet S(1, 9) ── -->
  <circle cx="170" cy="62" r="3.5" fill="#334155"/>
  <text x="176" y="58" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">S</text>

  <!-- ── Point (0, 8) sur axe Oy ── -->
  <circle cx="130" cy="84" r="2.5" fill="#334155"/>

  <!-- ── Légende courbe ── -->
  <text x="295" y="130" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
