<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole f(x)=x^2-2x-3 (racines -1 et 3, sommet (1,-4)) avec droite horizontale y=-3 tracée en pointillés ; intersections avec la parabole en x=0 et x=2">
  <!-- f(x) = (x-1)^2 - 4 = x^2 - 2x - 3 ; racines -1, 3 ; sommet (1, -4) -->
  <!-- 1 unité x = 40 px, origine x_math=0 à x_svg=170 -->
  <!-- 1 unité y = 22 px, origine y_math=0 à y_svg=110 -->
  <!-- Plage : x in [-3 ; 5], y in [-5 ; 12] (clip pour grande valeurs) -->
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : x = -3 à 5 -->
    <line x1="50"  y1="30" x2="50"  y2="290"/>
    <line x1="90"  y1="30" x2="90"  y2="290"/>
    <line x1="130" y1="30" x2="130" y2="290"/>
    <line x1="170" y1="30" x2="170" y2="290"/>
    <line x1="210" y1="30" x2="210" y2="290"/>
    <line x1="250" y1="30" x2="250" y2="290"/>
    <line x1="290" y1="30" x2="290" y2="290"/>
    <line x1="330" y1="30" x2="330" y2="290"/>
    <line x1="370" y1="30" x2="370" y2="290"/>
    <!-- horizontales : y = -4 à 8 (pas 1) -->
    <line x1="40" y1="44"  x2="385" y2="44"/>
    <line x1="40" y1="66"  x2="385" y2="66"/>
    <line x1="40" y1="88"  x2="385" y2="88"/>
    <line x1="40" y1="132" x2="385" y2="132"/>
    <line x1="40" y1="154" x2="385" y2="154"/>
    <line x1="40" y1="176" x2="385" y2="176"/>
    <line x1="40" y1="198" x2="385" y2="198"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y=0 -> y_svg=110) -->
  <line x1="40" y1="110" x2="390" y2="110" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,110 384,107 384,113" fill="#334155"/>
  <text x="383" y="105" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x=0 -> x_svg=170) -->
  <line x1="170" y1="305" x2="170" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="170,20 167,26 173,26" fill="#334155"/>
  <text x="155" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="158" y="125" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="107" x2="50"  y2="113"/>
    <text x="50"  y="125" text-anchor="middle">-3</text>
    <line x1="90"  y1="107" x2="90"  y2="113"/>
    <text x="90"  y="125" text-anchor="middle">-2</text>
    <line x1="130" y1="107" x2="130" y2="113"/>
    <text x="130" y="125" text-anchor="middle">-1</text>
    <line x1="210" y1="107" x2="210" y2="113"/>
    <text x="210" y="125" text-anchor="middle">1</text>
    <line x1="250" y1="107" x2="250" y2="113"/>
    <text x="250" y="125" text-anchor="middle">2</text>
    <line x1="290" y1="107" x2="290" y2="113"/>
    <text x="290" y="125" text-anchor="middle">3</text>
    <line x1="330" y1="107" x2="330" y2="113"/>
    <text x="330" y="125" text-anchor="middle">4</text>
    <line x1="370" y1="107" x2="370" y2="113"/>
    <text x="370" y="125" text-anchor="middle">5</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="167" y1="198" x2="173" y2="198"/>
    <text x="162" y="202" text-anchor="end">-4</text>
    <line x1="167" y1="176" x2="173" y2="176"/>
    <text x="162" y="180" text-anchor="end">-3</text>
    <line x1="167" y1="154" x2="173" y2="154"/>
    <text x="162" y="158" text-anchor="end">-2</text>
    <line x1="167" y1="132" x2="173" y2="132"/>
    <text x="162" y="136" text-anchor="end">-1</text>
    <line x1="167" y1="88"  x2="173" y2="88"/>
    <text x="162" y="92"  text-anchor="end">1</text>
    <line x1="167" y1="66"  x2="173" y2="66"/>
    <text x="162" y="70"  text-anchor="end">2</text>
    <line x1="167" y1="44"  x2="173" y2="44"/>
    <text x="162" y="48"  text-anchor="end">3</text>
  </g>

  <!-- ── Droite horizontale y = -3 (pointillés rouge/foncé) ── -->
  <line x1="40" y1="176" x2="385" y2="176" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="320" y="172" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">y = -3</text>

  <!-- ── Courbe f(x) = x^2 - 2x - 3 sur [-2 ; 4] (pas 0.5) ── -->
  <!-- y_svg = 110 - f(x) * 22 -->
  <!-- Points :
       x=-2: f=5 -> y=0 (clip)
       x=-1.5: f=2.25 -> y=60.5
       x=-1: f=0 -> y=110
       x=-0.5: f=-1.75 -> y=148.5
       x=0: f=-3 -> y=176
       x=0.5: f=-3.75 -> y=192.5
       x=1: f=-4 -> y=198
       x=1.5: f=-3.75 -> y=192.5
       x=2: f=-3 -> y=176
       x=2.5: f=-1.75 -> y=148.5
       x=3: f=0 -> y=110
       x=3.5: f=2.25 -> y=60.5
       x=4: f=5 -> y=0 (clip) -->
  <!-- x_svg : 170 + x*40 -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="90,0 110,60.5 130,110 150,148.5 170,176 190,192.5 210,198 230,192.5 250,176 270,148.5 290,110 310,60.5 330,0"/>

  <!-- ── Racines (-1, 0) et (3, 0) ── -->
  <circle cx="130" cy="110" r="3" fill="#334155"/>
  <text x="118" y="103" font-size="11" fill="#334155" font-family="Georgia,serif">x_1</text>
  <circle cx="290" cy="110" r="3" fill="#334155"/>
  <text x="295" y="103" font-size="11" fill="#334155" font-family="Georgia,serif">x_2</text>

  <!-- ── Sommet S(1, -4) ── -->
  <circle cx="210" cy="198" r="3.5" fill="#334155"/>
  <text x="216" y="210" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">S</text>

  <!-- ── Points d'intersection parabole-droite y=-3 : (0, -3) et (2, -3) ── -->
  <circle cx="170" cy="176" r="3" fill="#334155"/>
  <text x="140" y="172" font-size="11" fill="#475569" font-family="Georgia,serif">A</text>
  <circle cx="250" cy="176" r="3" fill="#334155"/>
  <text x="256" y="172" font-size="11" fill="#475569" font-family="Georgia,serif">B</text>

  <!-- ── Légende courbe ── -->
  <text x="340" y="50" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
