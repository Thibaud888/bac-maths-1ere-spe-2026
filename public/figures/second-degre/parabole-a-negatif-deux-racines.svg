<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole tournée vers le bas (a négatif), racines x=-1 et x=3, sommet S(1,4), f(0)=3">
  <!-- f(x) = -(x+1)(x-3) = -x^2 + 2x + 3 ; racines -1, 3 ; sommet (1, 4) -->
  <!-- 1 unité x = 50 px, origine x_math=0 à x_svg=160 -->
  <!-- 1 unité y = 22 px, origine y_math=0 à y_svg=200 -->
  <!-- Plage : x in [-3 ; 5], y in [-7 ; 5] -->
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : x = -3 à 5 (pas 1) -->
    <line x1="10"  y1="30" x2="10"  y2="290"/>
    <line x1="60"  y1="30" x2="60"  y2="290"/>
    <line x1="110" y1="30" x2="110" y2="290"/>
    <line x1="160" y1="30" x2="160" y2="290"/>
    <line x1="210" y1="30" x2="210" y2="290"/>
    <line x1="260" y1="30" x2="260" y2="290"/>
    <line x1="310" y1="30" x2="310" y2="290"/>
    <line x1="360" y1="30" x2="360" y2="290"/>
    <!-- horizontales : y = -7 à 5 (pas 1) -->
    <line x1="10" y1="46"  x2="390" y2="46"/>
    <line x1="10" y1="68"  x2="390" y2="68"/>
    <line x1="10" y1="90"  x2="390" y2="90"/>
    <line x1="10" y1="112" x2="390" y2="112"/>
    <line x1="10" y1="134" x2="390" y2="134"/>
    <line x1="10" y1="156" x2="390" y2="156"/>
    <line x1="10" y1="178" x2="390" y2="178"/>
    <line x1="10" y1="200" x2="390" y2="200"/>
    <line x1="10" y1="222" x2="390" y2="222"/>
    <line x1="10" y1="244" x2="390" y2="244"/>
    <line x1="10" y1="266" x2="390" y2="266"/>
    <line x1="10" y1="288" x2="390" y2="288"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y=0 -> y_svg=200) -->
  <line x1="5" y1="200" x2="395" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="395,200 389,197 389,203" fill="#334155"/>
  <text x="382" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x=0 -> x_svg=160) -->
  <line x1="160" y1="305" x2="160" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="160,20 157,26 163,26" fill="#334155"/>
  <text x="145" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="148" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="10"  y1="197" x2="10"  y2="203"/>
    <text x="10"  y="215" text-anchor="middle">-3</text>
    <line x1="60"  y1="197" x2="60"  y2="203"/>
    <text x="60"  y="215" text-anchor="middle">-2</text>
    <line x1="110" y1="197" x2="110" y2="203"/>
    <text x="110" y="215" text-anchor="middle">-1</text>
    <line x1="210" y1="197" x2="210" y2="203"/>
    <text x="210" y="215" text-anchor="middle">1</text>
    <line x1="260" y1="197" x2="260" y2="203"/>
    <text x="260" y="215" text-anchor="middle">2</text>
    <line x1="310" y1="197" x2="310" y2="203"/>
    <text x="310" y="215" text-anchor="middle">3</text>
    <line x1="360" y1="197" x2="360" y2="203"/>
    <text x="360" y="215" text-anchor="middle">4</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="157" y1="288" x2="163" y2="288"/>
    <text x="152" y="292" text-anchor="end">-4</text>
    <line x1="157" y1="266" x2="163" y2="266"/>
    <text x="152" y="270" text-anchor="end">-3</text>
    <line x1="157" y1="244" x2="163" y2="244"/>
    <text x="152" y="248" text-anchor="end">-2</text>
    <line x1="157" y1="222" x2="163" y2="222"/>
    <text x="152" y="226" text-anchor="end">-1</text>
    <line x1="157" y1="178" x2="163" y2="178"/>
    <text x="152" y="182" text-anchor="end">1</text>
    <line x1="157" y1="156" x2="163" y2="156"/>
    <text x="152" y="160" text-anchor="end">2</text>
    <line x1="157" y1="134" x2="163" y2="134"/>
    <text x="152" y="138" text-anchor="end">3</text>
    <line x1="157" y1="112" x2="163" y2="112"/>
    <text x="152" y="116" text-anchor="end">4</text>
    <line x1="157" y1="90"  x2="163" y2="90"/>
    <text x="152" y="94"  text-anchor="end">5</text>
  </g>

  <!-- ── Courbe f(x) = -x^2 + 2x + 3 sur [-2.5 ; 4.5] (pas 0.5) ── -->
  <!-- y_svg = 200 - f(x) * 22 -->
  <!-- x=-2.5: -6.25 -> 200+137.5=337.5 (hors cadre) ; on commence à x=-2: f=-5 -> y=310 (hors) ; x=-1.8: f=-3.84 -> y=284.5 ; partons de x=-1.6 : f=-2.56 -> y=256.3 -->
  <!-- on prend [-2 ; 4] : x=-2: f=-5 (y=310, hors cadre supérieur) ; clipping nécessaire. Choisissons [-1.8, 3.8] -->
  <!-- Points (x, f(x)) :
       x=-1.8: f=-3.84 ; x=-1.5: f=-2.25 ; x=-1: f=0 ; x=-0.5: f=1.75 ; x=0: f=3 ; x=0.5: f=3.75 ; x=1: f=4 ; x=1.5: f=3.75 ; x=2: f=3 ; x=2.5: f=1.75 ; x=3: f=0 ; x=3.5: f=-2.25 ; x=3.8: f=-3.84 -->
  <!-- x_svg: 160 + x*50 ; y_svg = 200 - f*22 -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="70,284.5 85,249.5 110,200 135,161.5 160,134 185,117.5 210,112 235,117.5 260,134 285,161.5 310,200 335,249.5 350,284.5"/>

  <!-- ── Racines (-1, 0) et (3, 0) ── -->
  <circle cx="110" cy="200" r="3" fill="#334155"/>
  <text x="98" y="193" font-size="11" fill="#334155" font-family="Georgia,serif">x_1</text>
  <circle cx="310" cy="200" r="3" fill="#334155"/>
  <text x="315" y="193" font-size="11" fill="#334155" font-family="Georgia,serif">x_2</text>

  <!-- ── Sommet S(1, 4) ── -->
  <circle cx="210" cy="112" r="3.5" fill="#334155"/>
  <text x="216" y="108" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">S</text>

  <!-- ── Point (0, 3) sur axe Oy ── -->
  <circle cx="160" cy="134" r="2.5" fill="#334155"/>

  <!-- ── Légende courbe ── -->
  <text x="340" y="160" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
