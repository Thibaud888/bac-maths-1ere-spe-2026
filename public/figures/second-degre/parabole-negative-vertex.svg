<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole g(x)=-x^2+4x avec a<0, racines 0 et 4, sommet S(2,4)">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : 1 unité x = 50 px, origine x_math=0 à x_svg=110 -->
    <line x1="60"  y1="30" x2="60"  y2="295"/>
    <line x1="110" y1="30" x2="110" y2="295"/>
    <line x1="160" y1="30" x2="160" y2="295"/>
    <line x1="210" y1="30" x2="210" y2="295"/>
    <line x1="260" y1="30" x2="260" y2="295"/>
    <line x1="310" y1="30" x2="310" y2="295"/>
    <line x1="360" y1="30" x2="360" y2="295"/>
    <!-- horizontales : 1 unité y = 24 px, origine y_math=0 à y_svg=160 -->
    <line x1="50" y1="40"  x2="370" y2="40"/>
    <line x1="50" y1="64"  x2="370" y2="64"/>
    <line x1="50" y1="88"  x2="370" y2="88"/>
    <line x1="50" y1="112" x2="370" y2="112"/>
    <line x1="50" y1="136" x2="370" y2="136"/>
    <line x1="50" y1="160" x2="370" y2="160"/>
    <line x1="50" y1="184" x2="370" y2="184"/>
    <line x1="50" y1="208" x2="370" y2="208"/>
    <line x1="50" y1="232" x2="370" y2="232"/>
    <line x1="50" y1="256" x2="370" y2="256"/>
    <line x1="50" y1="280" x2="370" y2="280"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y=0 -> y_svg=160) -->
  <line x1="40" y1="160" x2="385" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,160 379,157 379,163" fill="#334155"/>
  <text x="383" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x=0 -> x_svg=110) -->
  <line x1="110" y1="305" x2="110" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="110,20 107,26 113,26" fill="#334155"/>
  <text x="95" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="98" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="60"  y1="157" x2="60"  y2="163"/>
    <text x="60"  y="175" text-anchor="middle">-1</text>
    <line x1="160" y1="157" x2="160" y2="163"/>
    <text x="160" y="175" text-anchor="middle">1</text>
    <line x1="210" y1="157" x2="210" y2="163"/>
    <text x="210" y="175" text-anchor="middle">2</text>
    <line x1="260" y1="157" x2="260" y2="163"/>
    <text x="260" y="175" text-anchor="middle">3</text>
    <line x1="310" y1="157" x2="310" y2="163"/>
    <text x="310" y="175" text-anchor="middle">4</text>
    <line x1="360" y1="157" x2="360" y2="163"/>
    <text x="360" y="175" text-anchor="middle">5</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="107" y1="280" x2="113" y2="280"/>
    <text x="102" y="284" text-anchor="end">-5</text>
    <line x1="107" y1="256" x2="113" y2="256"/>
    <text x="102" y="260" text-anchor="end">-4</text>
    <line x1="107" y1="232" x2="113" y2="232"/>
    <text x="102" y="236" text-anchor="end">-3</text>
    <line x1="107" y1="208" x2="113" y2="208"/>
    <text x="102" y="212" text-anchor="end">-2</text>
    <line x1="107" y1="184" x2="113" y2="184"/>
    <text x="102" y="188" text-anchor="end">-1</text>
    <line x1="107" y1="136" x2="113" y2="136"/>
    <text x="102" y="140" text-anchor="end">1</text>
    <line x1="107" y1="112" x2="113" y2="112"/>
    <text x="102" y="116" text-anchor="end">2</text>
    <line x1="107" y1="88"  x2="113" y2="88"/>
    <text x="102" y="92"  text-anchor="end">3</text>
    <line x1="107" y1="64"  x2="113" y2="64"/>
    <text x="102" y="68"  text-anchor="end">4</text>
    <line x1="107" y1="40"  x2="113" y2="40"/>
    <text x="102" y="44"  text-anchor="end">5</text>
  </g>

  <!-- ── Courbe de g(x) = -x^2 + 4x sur [-1, 5] (pas 0.5) ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="60,280 85,214 110,160 135,118 160,88 185,70 210,64 235,70 260,88 285,118 310,160 335,214 360,280"/>

  <!-- ── Racines (0, 0) et (4, 0) ── -->
  <circle cx="110" cy="160" r="3" fill="#334155"/>
  <text x="92" y="153" font-size="11" fill="#334155" font-family="Georgia,serif">x_1</text>
  <circle cx="310" cy="160" r="3" fill="#334155"/>
  <text x="315" y="153" font-size="11" fill="#334155" font-family="Georgia,serif">x_2</text>

  <!-- ── Sommet S(2, 4) ── -->
  <circle cx="210" cy="64" r="3" fill="#334155"/>
  <text x="216" y="60" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">S</text>

  <!-- ── Légende courbe ── -->
  <text x="335" y="110" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_g</text>
</svg>
