<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole h(x)=(x-3)^2-4 avec axe de symétrie x=3, sommet S(3,-4), racines 1 et 5">
  <!-- 1 unité x = 50 px, origine x_math=0 à x_svg=50 ; 1 unité y = 18 px, origine y_math=0 à y_svg=150 -->
  <!-- Plage : x in [0 ; 6], y in [-5 ; 9] -->
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : x = 0 à 6 -->
    <line x1="50"  y1="30" x2="50"  y2="290"/>
    <line x1="100" y1="30" x2="100" y2="290"/>
    <line x1="150" y1="30" x2="150" y2="290"/>
    <line x1="200" y1="30" x2="200" y2="290"/>
    <line x1="250" y1="30" x2="250" y2="290"/>
    <line x1="300" y1="30" x2="300" y2="290"/>
    <line x1="350" y1="30" x2="350" y2="290"/>
    <!-- horizontales : y = -5 à 9 -->
    <line x1="40" y1="42"  x2="360" y2="42"/>
    <line x1="40" y1="60"  x2="360" y2="60"/>
    <line x1="40" y1="78"  x2="360" y2="78"/>
    <line x1="40" y1="96"  x2="360" y2="96"/>
    <line x1="40" y1="114" x2="360" y2="114"/>
    <line x1="40" y1="132" x2="360" y2="132"/>
    <line x1="40" y1="150" x2="360" y2="150"/>
    <line x1="40" y1="168" x2="360" y2="168"/>
    <line x1="40" y1="186" x2="360" y2="186"/>
    <line x1="40" y1="204" x2="360" y2="204"/>
    <line x1="40" y1="222" x2="360" y2="222"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y=0 -> y_svg=150) -->
  <line x1="40" y1="150" x2="375" y2="150" stroke="#334155" stroke-width="1.2"/>
  <polygon points="375,150 369,147 369,153" fill="#334155"/>
  <text x="373" y="165" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x=0 -> x_svg=50) -->
  <line x1="50" y1="305" x2="50" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="50,20 47,26 53,26" fill="#334155"/>
  <text x="35" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="38" y="165" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="100" y1="147" x2="100" y2="153"/>
    <text x="100" y="165" text-anchor="middle">1</text>
    <line x1="150" y1="147" x2="150" y2="153"/>
    <text x="150" y="165" text-anchor="middle">2</text>
    <line x1="200" y1="147" x2="200" y2="153"/>
    <text x="200" y="165" text-anchor="middle">3</text>
    <line x1="250" y1="147" x2="250" y2="153"/>
    <text x="250" y="165" text-anchor="middle">4</text>
    <line x1="300" y1="147" x2="300" y2="153"/>
    <text x="300" y="165" text-anchor="middle">5</text>
    <line x1="350" y1="147" x2="350" y2="153"/>
    <text x="350" y="165" text-anchor="middle">6</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="47" y1="240" x2="53" y2="240"/>
    <text x="42" y="244" text-anchor="end">-5</text>
    <line x1="47" y1="222" x2="53" y2="222"/>
    <text x="42" y="226" text-anchor="end">-4</text>
    <line x1="47" y1="204" x2="53" y2="204"/>
    <text x="42" y="208" text-anchor="end">-3</text>
    <line x1="47" y1="186" x2="53" y2="186"/>
    <text x="42" y="190" text-anchor="end">-2</text>
    <line x1="47" y1="168" x2="53" y2="168"/>
    <text x="42" y="172" text-anchor="end">-1</text>
    <line x1="47" y1="132" x2="53" y2="132"/>
    <text x="42" y="136" text-anchor="end">1</text>
    <line x1="47" y1="114" x2="53" y2="114"/>
    <text x="42" y="118" text-anchor="end">2</text>
    <line x1="47" y1="96"  x2="53" y2="96"/>
    <text x="42" y="100" text-anchor="end">3</text>
    <line x1="47" y1="78"  x2="53" y2="78"/>
    <text x="42" y="82"  text-anchor="end">4</text>
    <line x1="47" y1="60"  x2="53" y2="60"/>
    <text x="42" y="64"  text-anchor="end">5</text>
    <line x1="47" y1="42"  x2="53" y2="42"/>
    <text x="42" y="46"  text-anchor="end">6</text>
  </g>

  <!-- ── Axe de symétrie x = 3 (en pointillés) ── -->
  <line x1="200" y1="30" x2="200" y2="290" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="205" y="42" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">x = 3</text>

  <!-- ── Courbe de h(x) = (x-3)^2 - 4 sur [0 ; 6] (pas 0.5) ── -->
  <!-- x=0: h=5 ; x=0.5: 2.25 ; x=1: 0 ; x=1.5: -1.75 ; x=2: -3 ; x=2.5: -3.75 ; x=3: -4 ; x=3.5: -3.75 ; x=4: -3 ; x=4.5: -1.75 ; x=5: 0 ; x=5.5: 2.25 ; x=6: 5 -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,60 75,109.5 100,150 125,181.5 150,204 175,217.5 200,222 225,217.5 250,204 275,181.5 300,150 325,109.5 350,60"/>

  <!-- ── Racines x=1 et x=5 ── -->
  <circle cx="100" cy="150" r="3" fill="#334155"/>
  <circle cx="300" cy="150" r="3" fill="#334155"/>

  <!-- ── Sommet S(3 ; -4) ── -->
  <circle cx="200" cy="222" r="3.5" fill="#334155"/>
  <text x="208" y="237" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">S(α ; β) = (3 ; -4)</text>

  <!-- ── Légende courbe ── -->
  <text x="320" y="80" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_h</text>
</svg>
