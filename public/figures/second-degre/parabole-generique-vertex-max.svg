<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole générique tournée vers le bas, sommet S de coordonnées (alpha, beta) en maximum, axe de symétrie x = alpha en pointillés">
  <!-- ── Axes ── -->
  <line x1="40" y1="240" x2="380" y2="240" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,240 374,237 374,243" fill="#334155"/>
  <text x="378" y="255" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="305" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="188" y="255" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Axe de symétrie (en pointillés) ── -->
  <line x1="220" y1="40" x2="220" y2="280" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="225" y="280" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">x = α</text>

  <!-- ── Pointillés vers les axes pour repérer (alpha, beta) ── -->
  <line x1="220" y1="80" x2="200" y2="80" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="220" y1="80" x2="220" y2="240" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Marques sur les axes -->
  <text x="195" y="84" font-size="11" font-style="italic" text-anchor="end" fill="#475569" font-family="Georgia,serif">β</text>
  <text x="220" y="255" font-size="11" font-style="italic" text-anchor="middle" fill="#475569" font-family="Georgia,serif">α</text>

  <!-- ── Courbe : parabole tournée vers le bas, sommet S(220, 80) ── -->
  <path d="M 90,240 Q 220,-80 350,240" fill="none" stroke="#334155" stroke-width="1.8"/>

  <!-- ── Sommet S ── -->
  <circle cx="220" cy="80" r="4" fill="#334155"/>
  <text x="228" y="80" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">S(α ; β)</text>

  <!-- ── Légende courbe ── -->
  <text x="335" y="200" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
