<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Enclos rectangulaire de côtés x et 20 moins x, périmètre total 40 mètres">
  <!-- ── Cadre du champ (décoratif, en pointillés clairs) ── -->
  <rect x="30" y="40" width="340" height="240" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="38" y="58" font-size="11" font-style="italic" fill="#94a3b8" font-family="Georgia,serif">champ</text>

  <!-- ── Rectangle enclos ── -->
  <rect x="90" y="100" width="220" height="130" fill="#e0e7ef" stroke="#334155" stroke-width="2"/>

  <!-- ── Étiquette x (côté horizontal — bas) ── -->
  <line x1="90" y1="255" x2="310" y2="255" stroke="#475569" stroke-width="1"/>
  <line x1="90" y1="250" x2="90" y2="260" stroke="#475569" stroke-width="1"/>
  <line x1="310" y1="250" x2="310" y2="260" stroke="#475569" stroke-width="1"/>
  <text x="200" y="275" font-size="14" font-style="italic" text-anchor="middle" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- ── Étiquette 20 - x (côté vertical — droit) ── -->
  <line x1="335" y1="100" x2="335" y2="230" stroke="#475569" stroke-width="1"/>
  <line x1="330" y1="100" x2="340" y2="100" stroke="#475569" stroke-width="1"/>
  <line x1="330" y1="230" x2="340" y2="230" stroke="#475569" stroke-width="1"/>
  <text x="352" y="170" font-size="14" font-style="italic" text-anchor="middle" fill="#334155" font-family="Georgia,serif">20 − x</text>

  <!-- ── Légende centrale ── -->
  <text x="200" y="170" font-size="13" font-style="italic" text-anchor="middle" fill="#475569" font-family="Georgia,serif">enclos</text>
  <text x="200" y="190" font-size="12" text-anchor="middle" fill="#475569" font-family="Georgia,serif">aire 𝒜(x)</text>

  <!-- ── Note périmètre ── -->
  <text x="200" y="305" font-size="11" text-anchor="middle" fill="#475569" font-family="Georgia,serif">périmètre = 40 m</text>
</svg>
