<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Trajectoire parabolique d'un objet lancé verticalement, hauteur en fonction du temps, allure générale sans valeurs">
  <!-- ── Axe horizontal (temps t) ── -->
  <line x1="50" y1="270" x2="380" y2="270" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,270 374,267 374,273" fill="#334155"/>
  <text x="370" y="290" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">t (s)</text>

  <!-- ── Axe vertical (hauteur h) ── -->
  <line x1="60" y1="290" x2="60" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="60,30 57,36 63,36" fill="#334155"/>
  <text x="35" y="40" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">h (m)</text>

  <!-- ── Origine ── -->
  <text x="48" y="285" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Trajectoire (parabole tournée vers le bas), démarre en (60,270), sommet vers (220,80), revient en (380,270) -->
  <!-- Bezier quadratique : M 60,270 Q 220,-110 380,270 — sommet en t=0.5 : (220, 80) -->
  <path d="M 60,270 Q 220,-110 380,270" fill="none" stroke="#334155" stroke-width="2"/>

  <!-- ── Point de départ (lancement, au sol) ── -->
  <circle cx="60" cy="270" r="3.5" fill="#334155"/>
  <text x="70" y="285" font-size="11" fill="#334155" font-family="Georgia,serif">lancement</text>

  <!-- ── Sommet (hauteur max) — schématique, sans coordonnées révélées ── -->
  <circle cx="220" cy="80" r="3.5" fill="#334155"/>
  <text x="228" y="75" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">hauteur max</text>

  <!-- ── Point d'arrivée (chute au sol) ── -->
  <circle cx="380" cy="270" r="3.5" fill="#334155"/>
  <text x="305" y="285" font-size="11" fill="#334155" font-family="Georgia,serif">retour au sol</text>

  <!-- ── Légende ── -->
  <text x="280" y="160" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">h(t)</text>
</svg>
