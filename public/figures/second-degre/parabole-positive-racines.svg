<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole f(x)=x^2-2x-3 avec a>0, racines -1 et 3, sommet S(1,-4)">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : 1 unité x = 40 px, origine x_math=0 à x_svg=170 -->
    <line x1="50"  y1="40" x2="50"  y2="290"/>
    <line x1="90"  y1="40" x2="90"  y2="290"/>
    <line x1="130" y1="40" x2="130" y2="290"/>
    <line x1="170" y1="40" x2="170" y2="290"/>
    <line x1="210" y1="40" x2="210" y2="290"/>
    <line x1="250" y1="40" x2="250" y2="290"/>
    <line x1="290" y1="40" x2="290" y2="290"/>
    <line x1="330" y1="40" x2="330" y2="290"/>
    <line x1="370" y1="40" x2="370" y2="290"/>
    <!-- horizontales : 1 unité y = 13 px, origine y_math=0 à y_svg=215 -->
    <line x1="50" y1="59"  x2="370" y2="59"/>
    <line x1="50" y1="72"  x2="370" y2="72"/>
    <line x1="50" y1="85"  x2="370" y2="85"/>
    <line x1="50" y1="98"  x2="370" y2="98"/>
    <line x1="50" y1="111" x2="370" y2="111"/>
    <line x1="50" y1="124" x2="370" y2="124"/>
    <line x1="50" y1="137" x2="370" y2="137"/>
    <line x1="50" y1="150" x2="370" y2="150"/>
    <line x1="50" y1="163" x2="370" y2="163"/>
    <line x1="50" y1="176" x2="370" y2="176"/>
    <line x1="50" y1="189" x2="370" y2="189"/>
    <line x1="50" y1="202" x2="370" y2="202"/>
    <line x1="50" y1="215" x2="370" y2="215"/>
    <line x1="50" y1="228" x2="370" y2="228"/>
    <line x1="50" y1="241" x2="370" y2="241"/>
    <line x1="50" y1="254" x2="370" y2="254"/>
    <line x1="50" y1="267" x2="370" y2="267"/>
    <line x1="50" y1="280" x2="370" y2="280"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y_math = 0 -> y_svg = 215) -->
  <line x1="40" y1="215" x2="385" y2="215" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,215 379,212 379,218" fill="#334155"/>
  <text x="383" y="230" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math = 0 -> x_svg = 170) -->
  <line x1="170" y1="305" x2="170" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="170,30 167,36 173,36" fill="#334155"/>
  <text x="155" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="158" y="230" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox (entiers) ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="212" x2="50"  y2="218"/>
    <text x="50"  y="230" text-anchor="middle">-3</text>
    <line x1="90"  y1="212" x2="90"  y2="218"/>
    <text x="90"  y="230" text-anchor="middle">-2</text>
    <line x1="130" y1="212" x2="130" y2="218"/>
    <text x="130" y="230" text-anchor="middle">-1</text>
    <line x1="210" y1="212" x2="210" y2="218"/>
    <text x="210" y="230" text-anchor="middle">1</text>
    <line x1="250" y1="212" x2="250" y2="218"/>
    <text x="250" y="230" text-anchor="middle">2</text>
    <line x1="290" y1="212" x2="290" y2="218"/>
    <text x="290" y="230" text-anchor="middle">3</text>
    <line x1="330" y1="212" x2="330" y2="218"/>
    <text x="330" y="230" text-anchor="middle">4</text>
    <line x1="370" y1="212" x2="370" y2="218"/>
    <text x="370" y="230" text-anchor="middle">5</text>
  </g>

  <!-- ── Graduations Oy (entiers) ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="167" y1="267" x2="173" y2="267"/>
    <text x="162" y="271" text-anchor="end">-4</text>
    <line x1="167" y1="254" x2="173" y2="254"/>
    <text x="162" y="258" text-anchor="end">-3</text>
    <line x1="167" y1="241" x2="173" y2="241"/>
    <text x="162" y="245" text-anchor="end">-2</text>
    <line x1="167" y1="228" x2="173" y2="228"/>
    <text x="162" y="232" text-anchor="end">-1</text>
    <line x1="167" y1="202" x2="173" y2="202"/>
    <text x="162" y="206" text-anchor="end">1</text>
    <line x1="167" y1="189" x2="173" y2="189"/>
    <text x="162" y="193" text-anchor="end">2</text>
    <line x1="167" y1="163" x2="173" y2="163"/>
    <text x="162" y="167" text-anchor="end">4</text>
    <line x1="167" y1="124" x2="173" y2="124"/>
    <text x="162" y="128" text-anchor="end">7</text>
    <line x1="167" y1="85"  x2="173" y2="85"/>
    <text x="162" y="89"  text-anchor="end">10</text>
    <line x1="167" y1="59"  x2="173" y2="59"/>
    <text x="162" y="63"  text-anchor="end">12</text>
  </g>

  <!-- ── Courbe de f(x) = x^2 - 2x - 3 sur [-3, 5] (pas 0.5) ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,59 70,107.75 90,150 110,185.75 130,215 150,237.75 170,254 190,263.75 210,267 230,263.75 250,254 270,237.75 290,215 310,185.75 330,150 350,107.75 370,59"/>

  <!-- ── Racines (-1, 0) et (3, 0) ── -->
  <circle cx="130" cy="215" r="3" fill="#334155"/>
  <text x="118" y="208" font-size="11" fill="#334155" font-family="Georgia,serif">x_1</text>
  <circle cx="290" cy="215" r="3" fill="#334155"/>
  <text x="295" y="208" font-size="11" fill="#334155" font-family="Georgia,serif">x_2</text>

  <!-- ── Sommet S(1, -4) ── -->
  <circle cx="210" cy="267" r="3" fill="#334155"/>
  <text x="216" y="280" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">S</text>

  <!-- ── Légende courbe ── -->
  <text x="345" y="80" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
