<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Parabole f(x)=(x-2)^2 tangente à l'axe Ox au point (2,0), discriminant nul">
  <!-- 1 unité x = 75 px, origine x_math=0 à x_svg=50 ; 1 unité y = 25 px, origine y_math=0 à y_svg=265 -->
  <!-- Plage : x in [0 ; 4], y in [0 ; 9] -->
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales : x = 0 à 4 -->
    <line x1="50"  y1="30" x2="50"  y2="290"/>
    <line x1="125" y1="30" x2="125" y2="290"/>
    <line x1="200" y1="30" x2="200" y2="290"/>
    <line x1="275" y1="30" x2="275" y2="290"/>
    <line x1="350" y1="30" x2="350" y2="290"/>
    <!-- horizontales : y = 0 à 9 -->
    <line x1="40" y1="40"  x2="360" y2="40"/>
    <line x1="40" y1="65"  x2="360" y2="65"/>
    <line x1="40" y1="90"  x2="360" y2="90"/>
    <line x1="40" y1="115" x2="360" y2="115"/>
    <line x1="40" y1="140" x2="360" y2="140"/>
    <line x1="40" y1="165" x2="360" y2="165"/>
    <line x1="40" y1="190" x2="360" y2="190"/>
    <line x1="40" y1="215" x2="360" y2="215"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Axe Ox (y=0 -> y_svg=265) -->
  <line x1="40" y1="265" x2="375" y2="265" stroke="#334155" stroke-width="1.2"/>
  <polygon points="375,265 369,262 369,268" fill="#334155"/>
  <text x="373" y="280" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x=0 -> x_svg=50) -->
  <line x1="50" y1="305" x2="50" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="50,20 47,26 53,26" fill="#334155"/>
  <text x="35" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="38" y="280" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="125" y1="262" x2="125" y2="268"/>
    <text x="125" y="280" text-anchor="middle">1</text>
    <line x1="200" y1="262" x2="200" y2="268"/>
    <text x="200" y="280" text-anchor="middle">2</text>
    <line x1="275" y1="262" x2="275" y2="268"/>
    <text x="275" y="280" text-anchor="middle">3</text>
    <line x1="350" y1="262" x2="350" y2="268"/>
    <text x="350" y="280" text-anchor="middle">4</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="47" y1="240" x2="53" y2="240"/>
    <text x="42" y="244" text-anchor="end">1</text>
    <line x1="47" y1="215" x2="53" y2="215"/>
    <text x="42" y="219" text-anchor="end">2</text>
    <line x1="47" y1="190" x2="53" y2="190"/>
    <text x="42" y="194" text-anchor="end">3</text>
    <line x1="47" y1="165" x2="53" y2="165"/>
    <text x="42" y="169" text-anchor="end">4</text>
    <line x1="47" y1="140" x2="53" y2="140"/>
    <text x="42" y="144" text-anchor="end">5</text>
    <line x1="47" y1="115" x2="53" y2="115"/>
    <text x="42" y="119" text-anchor="end">6</text>
    <line x1="47" y1="90"  x2="53" y2="90"/>
    <text x="42" y="94"  text-anchor="end">7</text>
    <line x1="47" y1="65"  x2="53" y2="65"/>
    <text x="42" y="69"  text-anchor="end">8</text>
    <line x1="47" y1="40"  x2="53" y2="40"/>
    <text x="42" y="44"  text-anchor="end">9</text>
  </g>

  <!-- ── Courbe de f(x) = (x-2)^2 sur [0 ; 4] (pas 0.5) ── -->
  <!-- x=0: f=4 ; x=0.5: 2.25 ; x=1: 1 ; x=1.5: 0.25 ; x=2: 0 ; x=2.5: 0.25 ; x=3: 1 ; x=3.5: 2.25 ; x=4: 4 -->
  <!-- y_svg = 265 - f * 25 -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,165 87.5,208.75 125,240 162.5,258.75 200,265 237.5,258.75 275,240 312.5,208.75 350,165"/>

  <!-- ── Point de tangence à l'axe Ox : (2, 0) ── -->
  <circle cx="200" cy="265" r="3.5" fill="#334155"/>
  <text x="208" y="280" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">x_0 = 2</text>

  <!-- ── Légende courbe ── -->
  <text x="320" y="80" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C_f</text>
</svg>
