<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec une droite tracée passant par deux points A et B aux coordonnées entières">
  <!-- Grille légère : pas de 30 px = 1 unité, origine à (190, 200) -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="290"/>
    <line x1="70"  y1="20" x2="70"  y2="290"/>
    <line x1="100" y1="20" x2="100" y2="290"/>
    <line x1="130" y1="20" x2="130" y2="290"/>
    <line x1="160" y1="20" x2="160" y2="290"/>
    <line x1="220" y1="20" x2="220" y2="290"/>
    <line x1="250" y1="20" x2="250" y2="290"/>
    <line x1="280" y1="20" x2="280" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="340" y1="20" x2="340" y2="290"/>
    <line x1="370" y1="20" x2="370" y2="290"/>

    <line x1="30" y1="20"  x2="380" y2="20"/>
    <line x1="30" y1="50"  x2="380" y2="50"/>
    <line x1="30" y1="80"  x2="380" y2="80"/>
    <line x1="30" y1="110" x2="380" y2="110"/>
    <line x1="30" y1="140" x2="380" y2="140"/>
    <line x1="30" y1="170" x2="380" y2="170"/>
    <line x1="30" y1="230" x2="380" y2="230"/>
    <line x1="30" y1="260" x2="380" y2="260"/>
    <line x1="30" y1="290" x2="380" y2="290"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="200" x2="390" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,200 384,197 384,203" fill="#334155"/>
  <text x="385" y="216" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="190" y1="305" x2="190" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="190,10 187,16 193,16" fill="#334155"/>
  <text x="175" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="180" y="216" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox (origine SVG = 190, pas = 30) -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="40"  y1="197" x2="40"  y2="203"/><text x="40"  y="216" text-anchor="middle">-5</text>
    <line x1="70"  y1="197" x2="70"  y2="203"/><text x="70"  y="216" text-anchor="middle">-4</text>
    <line x1="100" y1="197" x2="100" y2="203"/><text x="100" y="216" text-anchor="middle">-3</text>
    <line x1="130" y1="197" x2="130" y2="203"/><text x="130" y="216" text-anchor="middle">-2</text>
    <line x1="160" y1="197" x2="160" y2="203"/><text x="160" y="216" text-anchor="middle">-1</text>
    <line x1="220" y1="197" x2="220" y2="203"/><text x="220" y="216" text-anchor="middle">1</text>
    <line x1="250" y1="197" x2="250" y2="203"/><text x="250" y="216" text-anchor="middle">2</text>
    <line x1="280" y1="197" x2="280" y2="203"/><text x="280" y="216" text-anchor="middle">3</text>
    <line x1="310" y1="197" x2="310" y2="203"/><text x="310" y="216" text-anchor="middle">4</text>
    <line x1="340" y1="197" x2="340" y2="203"/><text x="340" y="216" text-anchor="middle">5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="187" y1="20"  x2="193" y2="20"/><text x="184" y="24" text-anchor="end">6</text>
    <line x1="187" y1="50"  x2="193" y2="50"/><text x="184" y="54" text-anchor="end">5</text>
    <line x1="187" y1="80"  x2="193" y2="80"/><text x="184" y="84" text-anchor="end">4</text>
    <line x1="187" y1="110" x2="193" y2="110"/><text x="184" y="114" text-anchor="end">3</text>
    <line x1="187" y1="140" x2="193" y2="140"/><text x="184" y="144" text-anchor="end">2</text>
    <line x1="187" y1="170" x2="193" y2="170"/><text x="184" y="174" text-anchor="end">1</text>
    <line x1="187" y1="230" x2="193" y2="230"/><text x="184" y="234" text-anchor="end">-1</text>
    <line x1="187" y1="260" x2="193" y2="260"/><text x="184" y="264" text-anchor="end">-2</text>
    <line x1="187" y1="290" x2="193" y2="290"/><text x="184" y="294" text-anchor="end">-3</text>
  </g>

  <!-- Droite passant par A(-1, 2) et B(3, 4) : y = x/2 + 5/2 ; tracée de x = -5 à x = 5 -->
  <!-- Points en SVG :
       x=-5: y_math = 0, svg (40, 200)
       x=5:  y_math = 5, svg (340, 50)
  -->
  <line x1="40" y1="200" x2="340" y2="50" stroke="#334155" stroke-width="1.5"/>
  <text x="335" y="40" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">d</text>

  <!-- Point A(-1, 2) -> svg (160, 140) -->
  <circle cx="160" cy="140" r="3.5" fill="#334155"/>
  <text x="142" y="136" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- Point B(3, 4) -> svg (280, 80) -->
  <circle cx="280" cy="80" r="3.5" fill="#334155"/>
  <text x="286" y="76" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
</svg>
