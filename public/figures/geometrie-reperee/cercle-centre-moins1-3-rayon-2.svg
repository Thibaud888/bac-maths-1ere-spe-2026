<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle de centre Omega(-1 ; 3) et rayon 2, avec deux points A(1;3) et B(-1;5) sur le cercle, et un point C(1;1) extérieur">
  <!-- Repère : 1 unité = 35 px ; origine (220, 200) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="45"  y1="20" x2="45"  y2="290"/>
    <line x1="80"  y1="20" x2="80"  y2="290"/>
    <line x1="115" y1="20" x2="115" y2="290"/>
    <line x1="150" y1="20" x2="150" y2="290"/>
    <line x1="185" y1="20" x2="185" y2="290"/>
    <line x1="255" y1="20" x2="255" y2="290"/>
    <line x1="290" y1="20" x2="290" y2="290"/>
    <line x1="325" y1="20" x2="325" y2="290"/>
    <line x1="360" y1="20" x2="360" y2="290"/>
    <line x1="35" y1="30"  x2="380" y2="30"/>
    <line x1="35" y1="65"  x2="380" y2="65"/>
    <line x1="35" y1="100" x2="380" y2="100"/>
    <line x1="35" y1="135" x2="380" y2="135"/>
    <line x1="35" y1="170" x2="380" y2="170"/>
    <line x1="35" y1="235" x2="380" y2="235"/>
    <line x1="35" y1="270" x2="380" y2="270"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="200" x2="390" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,200 384,197 384,203" fill="#334155"/>
  <text x="388" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="220" y1="305" x2="220" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="220,15 217,21 223,21" fill="#334155"/>
  <text x="205" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="206" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="255" y1="197" x2="255" y2="203"/>
    <text x="255" y="215" text-anchor="middle">1</text>
    <line x1="290" y1="197" x2="290" y2="203"/>
    <text x="290" y="215" text-anchor="middle">2</text>
    <line x1="185" y1="197" x2="185" y2="203"/>
    <text x="185" y="215" text-anchor="middle">-1</text>
    <line x1="150" y1="197" x2="150" y2="203"/>
    <text x="150" y="215" text-anchor="middle">-2</text>
    <line x1="115" y1="197" x2="115" y2="203"/>
    <text x="115" y="215" text-anchor="middle">-3</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="217" y1="170" x2="223" y2="170"/>
    <text x="212" y="174" text-anchor="end">1</text>
    <line x1="217" y1="135" x2="223" y2="135"/>
    <text x="212" y="139" text-anchor="end">2</text>
    <line x1="217" y1="100" x2="223" y2="100"/>
    <text x="212" y="104" text-anchor="end">3</text>
    <line x1="217" y1="65" x2="223" y2="65"/>
    <text x="212" y="69" text-anchor="end">4</text>
    <line x1="217" y1="30" x2="223" y2="30"/>
    <text x="212" y="34" text-anchor="end">5</text>
    <line x1="217" y1="235" x2="223" y2="235"/>
    <text x="212" y="239" text-anchor="end">-1</text>
  </g>

  <!-- Cercle centre Omega(-1;3) → (185, 100) ; rayon 2 → 70 px -->
  <circle cx="185" cy="100" r="70" fill="none" stroke="#2563eb" stroke-width="1.8"/>

  <!-- Centre Omega -->
  <circle cx="185" cy="100" r="3" fill="#2563eb"/>
  <text x="160" y="95" font-size="11" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω(-1;3)</text>

  <!-- Point A(1;3) sur le cercle → (255, 100) -->
  <circle cx="255" cy="100" r="3.5" fill="#059669"/>
  <text x="260" y="96" font-size="11" font-style="italic" fill="#059669" font-family="Georgia,serif">A</text>

  <!-- Point B(-1;5) sur le cercle → (185, 30) -->
  <circle cx="185" cy="30" r="3.5" fill="#059669"/>
  <text x="190" y="28" font-size="11" font-style="italic" fill="#059669" font-family="Georgia,serif">B</text>

  <!-- Point C(1;1) extérieur → (255, 170) -->
  <circle cx="255" cy="170" r="3.5" fill="#dc2626"/>
  <text x="260" y="174" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">C</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle 𝒞 de centre Ω(−1 ; 3), rayon 2. A et B sur 𝒞 ; C extérieur.</text>
</svg>
