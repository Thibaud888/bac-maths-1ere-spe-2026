<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec une droite d d'équation 3x - 5y + 2 = 0 et un vecteur normal n de coordonnées (3 ; -5) représenté en rouge à partir d'un point de la droite">
  <!-- Repère : 1 unité = 30 px ; origine (200, 160) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="300"/>
    <line x1="80"  y1="20" x2="80"  y2="300"/>
    <line x1="110" y1="20" x2="110" y2="300"/>
    <line x1="140" y1="20" x2="140" y2="300"/>
    <line x1="170" y1="20" x2="170" y2="300"/>
    <line x1="230" y1="20" x2="230" y2="300"/>
    <line x1="260" y1="20" x2="260" y2="300"/>
    <line x1="290" y1="20" x2="290" y2="300"/>
    <line x1="320" y1="20" x2="320" y2="300"/>
    <line x1="350" y1="20" x2="350" y2="300"/>
    <line x1="40" y1="40"  x2="380" y2="40"/>
    <line x1="40" y1="70"  x2="380" y2="70"/>
    <line x1="40" y1="100" x2="380" y2="100"/>
    <line x1="40" y1="130" x2="380" y2="130"/>
    <line x1="40" y1="190" x2="380" y2="190"/>
    <line x1="40" y1="220" x2="380" y2="220"/>
    <line x1="40" y1="250" x2="380" y2="250"/>
    <line x1="40" y1="280" x2="380" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="160" x2="390" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,160 384,157 384,163" fill="#334155"/>
  <text x="388" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="200" y1="310" x2="200" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,15 197,21 203,21" fill="#334155"/>
  <text x="185" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="186" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="230" y1="157" x2="230" y2="163"/>
    <text x="230" y="175" text-anchor="middle">1</text>
    <line x1="260" y1="157" x2="260" y2="163"/>
    <text x="260" y="175" text-anchor="middle">2</text>
    <line x1="290" y1="157" x2="290" y2="163"/>
    <text x="290" y="175" text-anchor="middle">3</text>
    <line x1="170" y1="157" x2="170" y2="163"/>
    <text x="170" y="175" text-anchor="middle">-1</text>
    <line x1="140" y1="157" x2="140" y2="163"/>
    <text x="140" y="175" text-anchor="middle">-2</text>
    <line x1="110" y1="157" x2="110" y2="163"/>
    <text x="110" y="175" text-anchor="middle">-3</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="130" x2="203" y2="130"/>
    <text x="192" y="134" text-anchor="end">1</text>
    <line x1="197" y1="100" x2="203" y2="100"/>
    <text x="192" y="104" text-anchor="end">2</text>
    <line x1="197" y1="190" x2="203" y2="190"/>
    <text x="192" y="194" text-anchor="end">-1</text>
    <line x1="197" y1="220" x2="203" y2="220"/>
    <text x="192" y="224" text-anchor="end">-2</text>
  </g>

  <!-- Droite d : 3x - 5y + 2 = 0, soit y = (3x+2)/5 -->
  <!-- Points : x = -4 → y = -2 → (svg : 80, 220) ; x = 6 → y = 4 → (svg : 380, 40) -->
  <line x1="80" y1="220" x2="380" y2="40" stroke="#334155" stroke-width="1.8"/>
  <text x="335" y="55" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">d</text>

  <!-- Point A sur la droite : on prend x=1, y=1 → (230, 130) -->
  <circle cx="230" cy="130" r="3" fill="#334155"/>
  <text x="218" y="125" font-size="11" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- Vecteur normal n = (3 ; -5) en rouge, depuis A(1;1) vers (4;-4) → (svg : 230,130 → 320,280) -->
  <line x1="230" y1="130" x2="320" y2="280" stroke="#dc2626" stroke-width="1.8"/>
  <polygon points="320,280 313,275 316,283" fill="#dc2626"/>
  <text x="325" y="280" font-size="12" font-style="italic" fill="#dc2626" font-family="Georgia,serif">n</text>

  <!-- Caption interne -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Droite d : 3x − 5y + 2 = 0 et un vecteur normal n.</text>
</svg>
