<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec une droite tracée passant par deux points P et Q sur les axes">
  <!-- Origine SVG (140, 200), pas 30 px -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="290"/>
    <line x1="80"  y1="20" x2="80"  y2="290"/>
    <line x1="110" y1="20" x2="110" y2="290"/>
    <line x1="170" y1="20" x2="170" y2="290"/>
    <line x1="200" y1="20" x2="200" y2="290"/>
    <line x1="230" y1="20" x2="230" y2="290"/>
    <line x1="260" y1="20" x2="260" y2="290"/>
    <line x1="290" y1="20" x2="290" y2="290"/>
    <line x1="320" y1="20" x2="320" y2="290"/>
    <line x1="350" y1="20" x2="350" y2="290"/>

    <line x1="40" y1="20"  x2="370" y2="20"/>
    <line x1="40" y1="50"  x2="370" y2="50"/>
    <line x1="40" y1="80"  x2="370" y2="80"/>
    <line x1="40" y1="110" x2="370" y2="110"/>
    <line x1="40" y1="140" x2="370" y2="140"/>
    <line x1="40" y1="170" x2="370" y2="170"/>
    <line x1="40" y1="230" x2="370" y2="230"/>
    <line x1="40" y1="260" x2="370" y2="260"/>
    <line x1="40" y1="290" x2="370" y2="290"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="200" x2="380" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,200 374,197 374,203" fill="#334155"/>
  <text x="375" y="216" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="140" y1="305" x2="140" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="140,10 137,16 143,16" fill="#334155"/>
  <text x="125" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="128" y="216" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox (origine SVG = 140) -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="197" x2="50"  y2="203"/><text x="50"  y="216" text-anchor="middle">-3</text>
    <line x1="80"  y1="197" x2="80"  y2="203"/><text x="80"  y="216" text-anchor="middle">-2</text>
    <line x1="110" y1="197" x2="110" y2="203"/><text x="110" y="216" text-anchor="middle">-1</text>
    <line x1="170" y1="197" x2="170" y2="203"/><text x="170" y="216" text-anchor="middle">1</text>
    <line x1="200" y1="197" x2="200" y2="203"/><text x="200" y="216" text-anchor="middle">2</text>
    <line x1="230" y1="197" x2="230" y2="203"/><text x="230" y="216" text-anchor="middle">3</text>
    <line x1="260" y1="197" x2="260" y2="203"/><text x="260" y="216" text-anchor="middle">4</text>
    <line x1="290" y1="197" x2="290" y2="203"/><text x="290" y="216" text-anchor="middle">5</text>
    <line x1="320" y1="197" x2="320" y2="203"/><text x="320" y="216" text-anchor="middle">6</text>
    <line x1="350" y1="197" x2="350" y2="203"/><text x="350" y="216" text-anchor="middle">7</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="137" y1="20"  x2="143" y2="20"/><text x="134" y="24" text-anchor="end">6</text>
    <line x1="137" y1="50"  x2="143" y2="50"/><text x="134" y="54" text-anchor="end">5</text>
    <line x1="137" y1="80"  x2="143" y2="80"/><text x="134" y="84" text-anchor="end">4</text>
    <line x1="137" y1="110" x2="143" y2="110"/><text x="134" y="114" text-anchor="end">3</text>
    <line x1="137" y1="140" x2="143" y2="140"/><text x="134" y="144" text-anchor="end">2</text>
    <line x1="137" y1="170" x2="143" y2="170"/><text x="134" y="174" text-anchor="end">1</text>
    <line x1="137" y1="230" x2="143" y2="230"/><text x="134" y="234" text-anchor="end">-1</text>
    <line x1="137" y1="260" x2="143" y2="260"/><text x="134" y="264" text-anchor="end">-2</text>
    <line x1="137" y1="290" x2="143" y2="290"/><text x="134" y="294" text-anchor="end">-3</text>
  </g>

  <!-- Droite : passe par P(0, 2) et Q(4, 0), équation x + 2y - 4 = 0
       Trace de x=-3 à x=7
       x=-3: y_math = 7/2 = 3.5, svg (50, 95)  — limité à y=6 max, fitting
       x=7:  y_math = -3/2 = -1.5, svg (350, 245)
  -->
  <line x1="50" y1="95" x2="350" y2="245" stroke="#334155" stroke-width="1.5"/>
  <text x="55" y="90" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">d</text>

  <!-- Point P(0, 2) -> SVG (140, 140) -->
  <circle cx="140" cy="140" r="3.5" fill="#334155"/>
  <text x="120" y="136" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">P</text>

  <!-- Point Q(4, 0) -> SVG (260, 200) -->
  <circle cx="260" cy="200" r="3.5" fill="#334155"/>
  <text x="262" y="220" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">Q</text>
</svg>
