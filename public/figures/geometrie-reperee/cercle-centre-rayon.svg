<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec un cercle tracé, son centre Omega marqué et quatre points cardinaux visibles sur le cercle">
  <!-- Origine SVG (190, 150), pas 30 px -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="290"/>
    <line x1="70"  y1="20" x2="70"  y2="290"/>
    <line x1="100" y1="20" x2="100" y2="290"/>
    <line x1="130" y1="20" x2="130" y2="290"/>
    <line x1="160" y1="20" x2="160" y2="290"/>
    <line x1="220" y1="20" x2="220" y2="290"/>
    <line x1="250" y1="20" x2="250" y2="290"/>
    <line x1="280" y1="20" x2="280" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="340" y1="20" x2="340" y2="290"/>
    <line x1="370" y1="20" x2="370" y2="290"/>

    <line x1="30" y1="20"  x2="380" y2="20"/>
    <line x1="30" y1="50"  x2="380" y2="50"/>
    <line x1="30" y1="80"  x2="380" y2="80"/>
    <line x1="30" y1="110" x2="380" y2="110"/>
    <line x1="30" y1="180" x2="380" y2="180"/>
    <line x1="30" y1="210" x2="380" y2="210"/>
    <line x1="30" y1="240" x2="380" y2="240"/>
    <line x1="30" y1="270" x2="380" y2="270"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="150" x2="390" y2="150" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,150 384,147 384,153" fill="#334155"/>
  <text x="385" y="166" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="190" y1="305" x2="190" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="190,10 187,16 193,16" fill="#334155"/>
  <text x="175" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="180" y="166" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="40"  y1="147" x2="40"  y2="153"/><text x="40"  y="166" text-anchor="middle">-5</text>
    <line x1="70"  y1="147" x2="70"  y2="153"/><text x="70"  y="166" text-anchor="middle">-4</text>
    <line x1="100" y1="147" x2="100" y2="153"/><text x="100" y="166" text-anchor="middle">-3</text>
    <line x1="130" y1="147" x2="130" y2="153"/><text x="130" y="166" text-anchor="middle">-2</text>
    <line x1="160" y1="147" x2="160" y2="153"/><text x="160" y="166" text-anchor="middle">-1</text>
    <line x1="220" y1="147" x2="220" y2="153"/><text x="220" y="166" text-anchor="middle">1</text>
    <line x1="250" y1="147" x2="250" y2="153"/><text x="250" y="166" text-anchor="middle">2</text>
    <line x1="280" y1="147" x2="280" y2="153"/><text x="280" y="166" text-anchor="middle">3</text>
    <line x1="310" y1="147" x2="310" y2="153"/><text x="310" y="166" text-anchor="middle">4</text>
    <line x1="340" y1="147" x2="340" y2="153"/><text x="340" y="166" text-anchor="middle">5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="187" y1="30"  x2="193" y2="30"/><text x="184" y="34" text-anchor="end">4</text>
    <line x1="187" y1="60"  x2="193" y2="60"/><text x="184" y="64" text-anchor="end">3</text>
    <line x1="187" y1="90"  x2="193" y2="90"/><text x="184" y="94" text-anchor="end">2</text>
    <line x1="187" y1="120" x2="193" y2="120"/><text x="184" y="124" text-anchor="end">1</text>
    <line x1="187" y1="180" x2="193" y2="180"/><text x="184" y="184" text-anchor="end">-1</text>
    <line x1="187" y1="210" x2="193" y2="210"/><text x="184" y="214" text-anchor="end">-2</text>
    <line x1="187" y1="240" x2="193" y2="240"/><text x="184" y="244" text-anchor="end">-3</text>
    <line x1="187" y1="270" x2="193" y2="270"/><text x="184" y="274" text-anchor="end">-4</text>
  </g>

  <!-- Cercle : centre Ω(2, -1) -> SVG (250, 180), rayon 3 -> 90 px -->
  <circle cx="250" cy="180" r="90" fill="none" stroke="#334155" stroke-width="1.8"/>

  <!-- Centre Ω -->
  <circle cx="250" cy="180" r="2.5" fill="#334155"/>
  <text x="256" y="195" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">Ω</text>

  <!-- Points cardinaux marqués sans noms : (5,-1), (-1,-1), (2,2), (2,-4) -->
  <circle cx="340" cy="180" r="2.5" fill="#475569"/>
  <circle cx="160" cy="180" r="2.5" fill="#475569"/>
  <circle cx="250" cy="90"  r="2.5" fill="#475569"/>
  <circle cx="250" cy="270" r="2.5" fill="#475569"/>
</svg>
