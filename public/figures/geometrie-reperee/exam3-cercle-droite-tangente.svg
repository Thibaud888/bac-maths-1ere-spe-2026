<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle de centre Omega(1;2) rayon 3, droite d : y=2x-3 sécante en P(1;-1) et Q(17/5;19/5), tangente y=-1 au point P">
  <!-- Repère : 1 unité = 30 px ; origine (170, 170) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="290"/>
    <line x1="80"  y1="20" x2="80"  y2="290"/>
    <line x1="110" y1="20" x2="110" y2="290"/>
    <line x1="140" y1="20" x2="140" y2="290"/>
    <line x1="200" y1="20" x2="200" y2="290"/>
    <line x1="230" y1="20" x2="230" y2="290"/>
    <line x1="260" y1="20" x2="260" y2="290"/>
    <line x1="290" y1="20" x2="290" y2="290"/>
    <line x1="320" y1="20" x2="320" y2="290"/>
    <line x1="350" y1="20" x2="350" y2="290"/>
    <line x1="40" y1="50"  x2="385" y2="50"/>
    <line x1="40" y1="80"  x2="385" y2="80"/>
    <line x1="40" y1="110" x2="385" y2="110"/>
    <line x1="40" y1="140" x2="385" y2="140"/>
    <line x1="40" y1="200" x2="385" y2="200"/>
    <line x1="40" y1="230" x2="385" y2="230"/>
    <line x1="40" y1="260" x2="385" y2="260"/>
  </g>

  <!-- Axe Ox -->
  <line x1="35" y1="170" x2="390" y2="170" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,170 384,167 384,173" fill="#334155"/>
  <text x="388" y="185" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="170" y1="305" x2="170" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="170,15 167,21 173,21" fill="#334155"/>
  <text x="155" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="156" y="185" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="200" y1="167" x2="200" y2="173"/>
    <text x="200" y="185" text-anchor="middle">1</text>
    <line x1="230" y1="167" x2="230" y2="173"/>
    <text x="230" y="185" text-anchor="middle">2</text>
    <line x1="260" y1="167" x2="260" y2="173"/>
    <text x="260" y="185" text-anchor="middle">3</text>
    <line x1="290" y1="167" x2="290" y2="173"/>
    <text x="290" y="185" text-anchor="middle">4</text>
    <line x1="320" y1="167" x2="320" y2="173"/>
    <text x="320" y="185" text-anchor="middle">5</text>
    <line x1="140" y1="167" x2="140" y2="173"/>
    <text x="140" y="185" text-anchor="middle">-1</text>
    <line x1="110" y1="167" x2="110" y2="173"/>
    <text x="110" y="185" text-anchor="middle">-2</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="167" y1="140" x2="173" y2="140"/>
    <text x="162" y="144" text-anchor="end">1</text>
    <line x1="167" y1="110" x2="173" y2="110"/>
    <text x="162" y="114" text-anchor="end">2</text>
    <line x1="167" y1="80" x2="173" y2="80"/>
    <text x="162" y="84" text-anchor="end">3</text>
    <line x1="167" y1="50" x2="173" y2="50"/>
    <text x="162" y="54" text-anchor="end">4</text>
    <line x1="167" y1="200" x2="173" y2="200"/>
    <text x="162" y="204" text-anchor="end">-1</text>
  </g>

  <!-- Cercle centre Omega(1;2) → (200, 110), rayon 3 → 90 px -->
  <circle cx="200" cy="110" r="90" fill="none" stroke="#2563eb" stroke-width="1.8"/>
  <circle cx="200" cy="110" r="3" fill="#2563eb"/>
  <text x="206" y="106" font-size="11" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω</text>

  <!-- T(4;2) sur le cercle → (290, 110) -->
  <circle cx="290" cy="110" r="3.5" fill="#059669"/>
  <text x="295" y="106" font-size="11" font-style="italic" fill="#059669" font-family="Georgia,serif">T</text>

  <!-- Droite d : y = 2x - 3 ; x=-1→y=-5 hors ; x=0→y=-3 (170,260) ; x=4→y=5 (290, 20) ; trace -->
  <line x1="155" y1="290" x2="305" y2="-10" stroke="#dc2626" stroke-width="1.8"/>
  <text x="288" y="0" font-size="12" font-style="italic" fill="#dc2626" font-family="Georgia,serif">d</text>

  <!-- Intersections P(1;-1) → (200, 200) -->
  <circle cx="200" cy="200" r="3.5" fill="#7c3aed"/>
  <text x="205" y="215" font-size="11" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">P(1;-1)</text>

  <!-- Q(17/5;19/5) = (3.4;3.8) → (272, 56) -->
  <circle cx="272" cy="56" r="3.5" fill="#7c3aed"/>
  <text x="278" y="55" font-size="11" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">Q</text>

  <!-- Tangente en P : y = -1 (horizontale) -->
  <line x1="40" y1="200" x2="385" y2="200" stroke="#d97706" stroke-width="1.6" stroke-dasharray="5,3"/>
  <text x="50" y="218" font-size="11" font-style="italic" fill="#d97706" font-family="Georgia,serif">tangente en P : y = −1</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle 𝒞 : (x−1)²+(y−2)²=9 ; droite d sécante en P et Q ; tangente en P.</text>
</svg>
