<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec un cercle centré à l'origine et trois points M, N, P placés à différentes positions par rapport au cercle">
  <!-- Origine SVG (200, 160), pas 30 px -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="300"/>
    <line x1="80"  y1="20" x2="80"  y2="300"/>
    <line x1="110" y1="20" x2="110" y2="300"/>
    <line x1="140" y1="20" x2="140" y2="300"/>
    <line x1="170" y1="20" x2="170" y2="300"/>
    <line x1="230" y1="20" x2="230" y2="300"/>
    <line x1="260" y1="20" x2="260" y2="300"/>
    <line x1="290" y1="20" x2="290" y2="300"/>
    <line x1="320" y1="20" x2="320" y2="300"/>
    <line x1="350" y1="20" x2="350" y2="300"/>

    <line x1="40" y1="40"  x2="360" y2="40"/>
    <line x1="40" y1="70"  x2="360" y2="70"/>
    <line x1="40" y1="100" x2="360" y2="100"/>
    <line x1="40" y1="130" x2="360" y2="130"/>
    <line x1="40" y1="190" x2="360" y2="190"/>
    <line x1="40" y1="220" x2="360" y2="220"/>
    <line x1="40" y1="250" x2="360" y2="250"/>
    <line x1="40" y1="280" x2="360" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="160" x2="380" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,160 374,157 374,163" fill="#334155"/>
  <text x="375" y="176" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="200" y1="315" x2="200" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,10 197,16 203,16" fill="#334155"/>
  <text x="185" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="188" y="176" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="157" x2="50"  y2="163"/><text x="50"  y="176" text-anchor="middle">-5</text>
    <line x1="80"  y1="157" x2="80"  y2="163"/><text x="80"  y="176" text-anchor="middle">-4</text>
    <line x1="110" y1="157" x2="110" y2="163"/><text x="110" y="176" text-anchor="middle">-3</text>
    <line x1="140" y1="157" x2="140" y2="163"/><text x="140" y="176" text-anchor="middle">-2</text>
    <line x1="170" y1="157" x2="170" y2="163"/><text x="170" y="176" text-anchor="middle">-1</text>
    <line x1="230" y1="157" x2="230" y2="163"/><text x="230" y="176" text-anchor="middle">1</text>
    <line x1="260" y1="157" x2="260" y2="163"/><text x="260" y="176" text-anchor="middle">2</text>
    <line x1="290" y1="157" x2="290" y2="163"/><text x="290" y="176" text-anchor="middle">3</text>
    <line x1="320" y1="157" x2="320" y2="163"/><text x="320" y="176" text-anchor="middle">4</text>
    <line x1="350" y1="157" x2="350" y2="163"/><text x="350" y="176" text-anchor="middle">5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="40"  x2="203" y2="40"/><text x="194" y="44" text-anchor="end">4</text>
    <line x1="197" y1="70"  x2="203" y2="70"/><text x="194" y="74" text-anchor="end">3</text>
    <line x1="197" y1="100" x2="203" y2="100"/><text x="194" y="104" text-anchor="end">2</text>
    <line x1="197" y1="130" x2="203" y2="130"/><text x="194" y="134" text-anchor="end">1</text>
    <line x1="197" y1="190" x2="203" y2="190"/><text x="194" y="194" text-anchor="end">-1</text>
    <line x1="197" y1="220" x2="203" y2="220"/><text x="194" y="224" text-anchor="end">-2</text>
    <line x1="197" y1="250" x2="203" y2="250"/><text x="194" y="254" text-anchor="end">-3</text>
    <line x1="197" y1="280" x2="203" y2="280"/><text x="194" y="284" text-anchor="end">-4</text>
  </g>

  <!-- Cercle : centre O(0,0) SVG (200, 160), rayon 3 -> 90 px -->
  <circle cx="200" cy="160" r="90" fill="none" stroke="#334155" stroke-width="1.8"/>

  <!-- Point M(1, 1) -> SVG (230, 130) — intérieur -->
  <circle cx="230" cy="130" r="3.5" fill="#334155"/>
  <text x="236" y="126" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">M</text>

  <!-- Point N(0, 3) -> SVG (200, 70) — sur le cercle -->
  <circle cx="200" cy="70" r="3.5" fill="#334155"/>
  <text x="206" y="66" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">N</text>

  <!-- Point P(4, 2) -> SVG (320, 100) — extérieur -->
  <circle cx="320" cy="100" r="3.5" fill="#334155"/>
  <text x="326" y="96" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">P</text>
</svg>
