<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Configuration avec A(0;0), B(4;0), C(4;4), cercle de diamètre [BC] centre Omega(4;2) rayon 2, point D(2;2) sur le cercle, droite (AB) tangente au cercle en B">
  <!-- Repère : 1 unité = 50 px ; origine (60, 260) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="110" y1="20" x2="110" y2="290"/>
    <line x1="160" y1="20" x2="160" y2="290"/>
    <line x1="210" y1="20" x2="210" y2="290"/>
    <line x1="260" y1="20" x2="260" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="360" y1="20" x2="360" y2="290"/>
    <line x1="40" y1="210" x2="385" y2="210"/>
    <line x1="40" y1="160" x2="385" y2="160"/>
    <line x1="40" y1="110" x2="385" y2="110"/>
    <line x1="40" y1="60"  x2="385" y2="60"/>
  </g>

  <!-- Axe Ox -->
  <line x1="35" y1="260" x2="390" y2="260" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,260 384,257 384,263" fill="#334155"/>
  <text x="388" y="275" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="60" y1="305" x2="60" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="60,15 57,21 63,21" fill="#334155"/>
  <text x="45" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="46" y="275" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="110" y1="257" x2="110" y2="263"/>
    <text x="110" y="275" text-anchor="middle">1</text>
    <line x1="160" y1="257" x2="160" y2="263"/>
    <text x="160" y="275" text-anchor="middle">2</text>
    <line x1="210" y1="257" x2="210" y2="263"/>
    <text x="210" y="275" text-anchor="middle">3</text>
    <line x1="260" y1="257" x2="260" y2="263"/>
    <text x="260" y="275" text-anchor="middle">4</text>
    <line x1="310" y1="257" x2="310" y2="263"/>
    <text x="310" y="275" text-anchor="middle">5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="57" y1="210" x2="63" y2="210"/>
    <text x="52" y="214" text-anchor="end">1</text>
    <line x1="57" y1="160" x2="63" y2="160"/>
    <text x="52" y="164" text-anchor="end">2</text>
    <line x1="57" y1="110" x2="63" y2="110"/>
    <text x="52" y="114" text-anchor="end">3</text>
    <line x1="57" y1="60" x2="63" y2="60"/>
    <text x="52" y="64" text-anchor="end">4</text>
  </g>

  <!-- Cercle centre Omega(4;2) → (260, 160), rayon 2 → 100 px -->
  <circle cx="260" cy="160" r="100" fill="none" stroke="#2563eb" stroke-width="1.8"/>
  <circle cx="260" cy="160" r="3" fill="#2563eb"/>
  <text x="266" y="156" font-size="11" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω</text>

  <!-- A(0;0) → (60, 260) -->
  <circle cx="60" cy="260" r="3.5" fill="#334155"/>
  <text x="46" y="252" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- B(4;0) → (260, 260) -->
  <circle cx="260" cy="260" r="3.5" fill="#dc2626"/>
  <text x="265" y="275" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">B</text>

  <!-- C(4;4) → (260, 60) -->
  <circle cx="260" cy="60" r="3.5" fill="#334155"/>
  <text x="265" y="58" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <!-- D(2;2) sur le cercle → (160, 160) -->
  <circle cx="160" cy="160" r="3.5" fill="#059669"/>
  <text x="138" y="158" font-size="11" font-style="italic" fill="#059669" font-family="Georgia,serif">D(2;2)</text>

  <!-- Diamètre [BC] -->
  <line x1="260" y1="60" x2="260" y2="260" stroke="#7c3aed" stroke-width="1.4" stroke-dasharray="4,3"/>

  <!-- Droite (AB) : y=0 → tangente au cercle en B -->
  <line x1="35" y1="260" x2="390" y2="260" stroke="#dc2626" stroke-width="2"/>
  <text x="120" y="252" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">(AB) tangente en B</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">A(0;0), B(4;0), C(4;4) ; cercle de diamètre [BC] ; (AB) tangente en B ; D(2;2) sur 𝒞.</text>
</svg>
