<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec la droite d (2x-y+3=0) et la droite d' (x+2y-6=0) perpendiculaires, leur intersection H(0;3) marquée, et le point B(4;1) sur d'">
  <!-- Repère : 1 unité = 25 px ; origine (170, 200) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="45"  y1="20" x2="45"  y2="290"/>
    <line x1="70"  y1="20" x2="70"  y2="290"/>
    <line x1="95"  y1="20" x2="95"  y2="290"/>
    <line x1="120" y1="20" x2="120" y2="290"/>
    <line x1="145" y1="20" x2="145" y2="290"/>
    <line x1="195" y1="20" x2="195" y2="290"/>
    <line x1="220" y1="20" x2="220" y2="290"/>
    <line x1="245" y1="20" x2="245" y2="290"/>
    <line x1="270" y1="20" x2="270" y2="290"/>
    <line x1="295" y1="20" x2="295" y2="290"/>
    <line x1="320" y1="20" x2="320" y2="290"/>
    <line x1="345" y1="20" x2="345" y2="290"/>
    <line x1="370" y1="20" x2="370" y2="290"/>
    <line x1="35" y1="50"  x2="385" y2="50"/>
    <line x1="35" y1="75"  x2="385" y2="75"/>
    <line x1="35" y1="100" x2="385" y2="100"/>
    <line x1="35" y1="125" x2="385" y2="125"/>
    <line x1="35" y1="150" x2="385" y2="150"/>
    <line x1="35" y1="175" x2="385" y2="175"/>
    <line x1="35" y1="225" x2="385" y2="225"/>
    <line x1="35" y1="250" x2="385" y2="250"/>
    <line x1="35" y1="275" x2="385" y2="275"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="200" x2="390" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,200 384,197 384,203" fill="#334155"/>
  <text x="388" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="170" y1="305" x2="170" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="170,15 167,21 173,21" fill="#334155"/>
  <text x="155" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="156" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="195" y1="197" x2="195" y2="203"/>
    <text x="195" y="215" text-anchor="middle">1</text>
    <line x1="245" y1="197" x2="245" y2="203"/>
    <text x="245" y="215" text-anchor="middle">3</text>
    <line x1="270" y1="197" x2="270" y2="203"/>
    <text x="270" y="215" text-anchor="middle">4</text>
    <line x1="295" y1="197" x2="295" y2="203"/>
    <text x="295" y="215" text-anchor="middle">5</text>
    <line x1="145" y1="197" x2="145" y2="203"/>
    <text x="145" y="215" text-anchor="middle">-1</text>
    <line x1="95" y1="197" x2="95" y2="203"/>
    <text x="95" y="215" text-anchor="middle">-3</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="167" y1="175" x2="173" y2="175"/>
    <text x="162" y="179" text-anchor="end">1</text>
    <line x1="167" y1="125" x2="173" y2="125"/>
    <text x="162" y="129" text-anchor="end">3</text>
    <line x1="167" y1="75" x2="173" y2="75"/>
    <text x="162" y="79" text-anchor="end">5</text>
    <line x1="167" y1="225" x2="173" y2="225"/>
    <text x="162" y="229" text-anchor="end">-1</text>
    <line x1="167" y1="275" x2="173" y2="275"/>
    <text x="162" y="279" text-anchor="end">-3</text>
  </g>

  <!-- d : 2x - y + 3 = 0 → y = 2x + 3 ; x=-3→y=-3 (svg : 95, 275) ; x=2→y=7 (svg : 220, 25) -->
  <line x1="95" y1="275" x2="220" y2="25" stroke="#2563eb" stroke-width="1.8"/>
  <text x="208" y="42" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">d</text>

  <!-- d' : x + 2y - 6 = 0 → y = (6-x)/2 = 3 - x/2 ; x=-4→y=5 (svg : 70, 75) ; x=8→y=-1 (svg : 370, 225) -->
  <line x1="70" y1="75" x2="370" y2="225" stroke="#dc2626" stroke-width="1.8"/>
  <text x="345" y="245" font-size="12" font-style="italic" fill="#dc2626" font-family="Georgia,serif">d'</text>

  <!-- Point B(4;1) sur d' → (270, 175) -->
  <circle cx="270" cy="175" r="3.5" fill="#dc2626"/>
  <text x="275" y="170" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">B(4 ; 1)</text>

  <!-- Point H(0;3) intersection → (170, 125) -->
  <circle cx="170" cy="125" r="3.5" fill="#7c3aed"/>
  <text x="152" y="119" font-size="11" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">H(0;3)</text>

  <!-- Indicateur d'angle droit en H : petit carré -->
  <rect x="170" y="125" width="8" height="8" fill="none" stroke="#7c3aed" stroke-width="1"/>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Droites perpendiculaires d et d', se coupant en H(0 ; 3).</text>
</svg>
