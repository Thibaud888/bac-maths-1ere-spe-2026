<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Deux cercles sécants : C1 de centre O(0;0) rayon 3 et C2 de centre Omega(4;0) rayon 3, se coupant en deux points P et Q d'abscisse 2">
  <!-- Repère : 1 unité = 30 px ; origine (140, 160) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="290"/>
    <line x1="80"  y1="20" x2="80"  y2="290"/>
    <line x1="110" y1="20" x2="110" y2="290"/>
    <line x1="170" y1="20" x2="170" y2="290"/>
    <line x1="200" y1="20" x2="200" y2="290"/>
    <line x1="230" y1="20" x2="230" y2="290"/>
    <line x1="260" y1="20" x2="260" y2="290"/>
    <line x1="290" y1="20" x2="290" y2="290"/>
    <line x1="320" y1="20" x2="320" y2="290"/>
    <line x1="350" y1="20" x2="350" y2="290"/>
    <line x1="40" y1="40"  x2="385" y2="40"/>
    <line x1="40" y1="70"  x2="385" y2="70"/>
    <line x1="40" y1="100" x2="385" y2="100"/>
    <line x1="40" y1="130" x2="385" y2="130"/>
    <line x1="40" y1="190" x2="385" y2="190"/>
    <line x1="40" y1="220" x2="385" y2="220"/>
    <line x1="40" y1="250" x2="385" y2="250"/>
    <line x1="40" y1="280" x2="385" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="35" y1="160" x2="390" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,160 384,157 384,163" fill="#334155"/>
  <text x="388" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="140" y1="305" x2="140" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="140,15 137,21 143,21" fill="#334155"/>
  <text x="125" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="126" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="170" y1="157" x2="170" y2="163"/>
    <text x="170" y="175" text-anchor="middle">1</text>
    <line x1="200" y1="157" x2="200" y2="163"/>
    <text x="200" y="175" text-anchor="middle">2</text>
    <line x1="230" y1="157" x2="230" y2="163"/>
    <text x="230" y="175" text-anchor="middle">3</text>
    <line x1="260" y1="157" x2="260" y2="163"/>
    <text x="260" y="175" text-anchor="middle">4</text>
    <line x1="290" y1="157" x2="290" y2="163"/>
    <text x="290" y="175" text-anchor="middle">5</text>
    <line x1="110" y1="157" x2="110" y2="163"/>
    <text x="110" y="175" text-anchor="middle">-1</text>
    <line x1="80" y1="157" x2="80" y2="163"/>
    <text x="80" y="175" text-anchor="middle">-2</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="137" y1="130" x2="143" y2="130"/>
    <text x="132" y="134" text-anchor="end">1</text>
    <line x1="137" y1="100" x2="143" y2="100"/>
    <text x="132" y="104" text-anchor="end">2</text>
    <line x1="137" y1="70" x2="143" y2="70"/>
    <text x="132" y="74" text-anchor="end">3</text>
    <line x1="137" y1="190" x2="143" y2="190"/>
    <text x="132" y="194" text-anchor="end">-1</text>
    <line x1="137" y1="250" x2="143" y2="250"/>
    <text x="132" y="254" text-anchor="end">-3</text>
  </g>

  <!-- Cercle C1 : centre O(0;0) → (140,160), rayon 3 → 90 px -->
  <circle cx="140" cy="160" r="90" fill="none" stroke="#2563eb" stroke-width="1.8"/>
  <text x="50" y="100" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">𝒞₁</text>

  <!-- Cercle C2 : centre Omega(4;0) → (260,160), rayon 3 → 90 px -->
  <circle cx="260" cy="160" r="90" fill="none" stroke="#dc2626" stroke-width="1.8"/>
  <circle cx="260" cy="160" r="3" fill="#dc2626"/>
  <text x="265" y="156" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">Ω</text>
  <text x="345" y="100" font-size="12" font-style="italic" fill="#dc2626" font-family="Georgia,serif">𝒞₂</text>

  <!-- Origine O comme centre de C1 -->
  <circle cx="140" cy="160" r="3" fill="#2563eb"/>

  <!-- Intersections : P(2 ; √5) ≈ (2 ; 2.236) → (200, 92.92) ; Q(2 ; -√5) → (200, 227.08) -->
  <circle cx="200" cy="93" r="3.5" fill="#7c3aed"/>
  <text x="205" y="89" font-size="11" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">P</text>
  <circle cx="200" cy="227" r="3.5" fill="#7c3aed"/>
  <text x="205" y="237" font-size="11" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">Q</text>

  <!-- Droite des points communs x=2 en pointillé -->
  <line x1="200" y1="93" x2="200" y2="227" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Deux cercles sécants en P(2 ; √5) et Q(2 ; −√5).</text>
</svg>
