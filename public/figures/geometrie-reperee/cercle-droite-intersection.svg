<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec un cercle centré à l'origine et une droite horizontale tracée traversant le cercle">
  <!-- Origine SVG (200, 160), pas 40 px = 1 unité -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="300"/>
    <line x1="80"  y1="20" x2="80"  y2="300"/>
    <line x1="120" y1="20" x2="120" y2="300"/>
    <line x1="160" y1="20" x2="160" y2="300"/>
    <line x1="240" y1="20" x2="240" y2="300"/>
    <line x1="280" y1="20" x2="280" y2="300"/>
    <line x1="320" y1="20" x2="320" y2="300"/>
    <line x1="360" y1="20" x2="360" y2="300"/>

    <line x1="30" y1="40"  x2="370" y2="40"/>
    <line x1="30" y1="80"  x2="370" y2="80"/>
    <line x1="30" y1="120" x2="370" y2="120"/>
    <line x1="30" y1="200" x2="370" y2="200"/>
    <line x1="30" y1="240" x2="370" y2="240"/>
    <line x1="30" y1="280" x2="370" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="160" x2="380" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,160 374,157 374,163" fill="#334155"/>
  <text x="375" y="176" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="200" y1="315" x2="200" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,10 197,16 203,16" fill="#334155"/>
  <text x="185" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="188" y="176" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="40"  y1="157" x2="40"  y2="163"/><text x="40"  y="176" text-anchor="middle">-4</text>
    <line x1="80"  y1="157" x2="80"  y2="163"/><text x="80"  y="176" text-anchor="middle">-3</text>
    <line x1="120" y1="157" x2="120" y2="163"/><text x="120" y="176" text-anchor="middle">-2</text>
    <line x1="160" y1="157" x2="160" y2="163"/><text x="160" y="176" text-anchor="middle">-1</text>
    <line x1="240" y1="157" x2="240" y2="163"/><text x="240" y="176" text-anchor="middle">1</text>
    <line x1="280" y1="157" x2="280" y2="163"/><text x="280" y="176" text-anchor="middle">2</text>
    <line x1="320" y1="157" x2="320" y2="163"/><text x="320" y="176" text-anchor="middle">3</text>
    <line x1="360" y1="157" x2="360" y2="163"/><text x="360" y="176" text-anchor="middle">4</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="40"  x2="203" y2="40"/><text x="194" y="44" text-anchor="end">3</text>
    <line x1="197" y1="80"  x2="203" y2="80"/><text x="194" y="84" text-anchor="end">2</text>
    <line x1="197" y1="120" x2="203" y2="120"/><text x="194" y="124" text-anchor="end">1</text>
    <line x1="197" y1="200" x2="203" y2="200"/><text x="194" y="204" text-anchor="end">-1</text>
    <line x1="197" y1="240" x2="203" y2="240"/><text x="194" y="244" text-anchor="end">-2</text>
    <line x1="197" y1="280" x2="203" y2="280"/><text x="194" y="284" text-anchor="end">-3</text>
  </g>

  <!-- Cercle : centre O(0,0) SVG (200, 160), rayon 2 -> 80 px -->
  <circle cx="200" cy="160" r="80" fill="none" stroke="#334155" stroke-width="1.8"/>

  <!-- Droite horizontale y = 1 -> SVG y = 120 -->
  <line x1="30" y1="120" x2="370" y2="120" stroke="#334155" stroke-width="1.5"/>
  <text x="350" y="115" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">d</text>

  <!-- Légende cercle -->
  <text x="285" y="230" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
</svg>
