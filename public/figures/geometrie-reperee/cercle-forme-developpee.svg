<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle d'équation x²+y²-4x+6y-3=0 de centre Omega(2;-3) et rayon 4 dans un repère orthonormé">
  <!-- Repère : 1 unité = 25 px ; origine (160, 110) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="35"  y1="20" x2="35"  y2="290"/>
    <line x1="60"  y1="20" x2="60"  y2="290"/>
    <line x1="85"  y1="20" x2="85"  y2="290"/>
    <line x1="110" y1="20" x2="110" y2="290"/>
    <line x1="135" y1="20" x2="135" y2="290"/>
    <line x1="185" y1="20" x2="185" y2="290"/>
    <line x1="210" y1="20" x2="210" y2="290"/>
    <line x1="235" y1="20" x2="235" y2="290"/>
    <line x1="260" y1="20" x2="260" y2="290"/>
    <line x1="285" y1="20" x2="285" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="335" y1="20" x2="335" y2="290"/>
    <line x1="360" y1="20" x2="360" y2="290"/>
    <line x1="25" y1="35"  x2="380" y2="35"/>
    <line x1="25" y1="60"  x2="380" y2="60"/>
    <line x1="25" y1="85"  x2="380" y2="85"/>
    <line x1="25" y1="135" x2="380" y2="135"/>
    <line x1="25" y1="160" x2="380" y2="160"/>
    <line x1="25" y1="185" x2="380" y2="185"/>
    <line x1="25" y1="210" x2="380" y2="210"/>
    <line x1="25" y1="235" x2="380" y2="235"/>
    <line x1="25" y1="260" x2="380" y2="260"/>
    <line x1="25" y1="285" x2="380" y2="285"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="110" x2="390" y2="110" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,110 384,107 384,113" fill="#334155"/>
  <text x="388" y="125" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="160" y1="305" x2="160" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="160,15 157,21 163,21" fill="#334155"/>
  <text x="145" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="146" y="125" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="185" y1="107" x2="185" y2="113"/>
    <text x="185" y="125" text-anchor="middle">1</text>
    <line x1="210" y1="107" x2="210" y2="113"/>
    <text x="210" y="125" text-anchor="middle">2</text>
    <line x1="260" y1="107" x2="260" y2="113"/>
    <text x="260" y="125" text-anchor="middle">4</text>
    <line x1="310" y1="107" x2="310" y2="113"/>
    <text x="310" y="125" text-anchor="middle">6</text>
    <line x1="110" y1="107" x2="110" y2="113"/>
    <text x="110" y="125" text-anchor="middle">-2</text>
    <line x1="60" y1="107" x2="60" y2="113"/>
    <text x="60" y="125" text-anchor="middle">-4</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="157" y1="85" x2="163" y2="85"/>
    <text x="152" y="89" text-anchor="end">1</text>
    <line x1="157" y1="135" x2="163" y2="135"/>
    <text x="152" y="139" text-anchor="end">-1</text>
    <line x1="157" y1="185" x2="163" y2="185"/>
    <text x="152" y="189" text-anchor="end">-3</text>
    <line x1="157" y1="235" x2="163" y2="235"/>
    <text x="152" y="239" text-anchor="end">-5</text>
    <line x1="157" y1="285" x2="163" y2="285"/>
    <text x="152" y="289" text-anchor="end">-7</text>
  </g>

  <!-- Cercle : centre Omega(2;-3) → (210, 185), rayon 4 → 100 px -->
  <circle cx="210" cy="185" r="100" fill="none" stroke="#2563eb" stroke-width="1.8"/>
  <circle cx="210" cy="185" r="3.5" fill="#2563eb"/>
  <text x="217" y="182" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω(2;−3)</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle x² + y² − 4x + 6y − 3 = 0, soit (x−2)² + (y+3)² = 16.</text>
</svg>
