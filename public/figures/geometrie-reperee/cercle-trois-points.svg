<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle circonscrit aux trois points A(1;0), B(3;0) et C(2;2), de centre (2;3/4) et rayon 5/4">
  <!-- Repère : 1 unité = 50 px ; origine (100, 220) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="290"/>
    <line x1="150" y1="20" x2="150" y2="290"/>
    <line x1="200" y1="20" x2="200" y2="290"/>
    <line x1="250" y1="20" x2="250" y2="290"/>
    <line x1="300" y1="20" x2="300" y2="290"/>
    <line x1="350" y1="20" x2="350" y2="290"/>
    <line x1="40" y1="70"  x2="385" y2="70"/>
    <line x1="40" y1="120" x2="385" y2="120"/>
    <line x1="40" y1="170" x2="385" y2="170"/>
    <line x1="40" y1="270" x2="385" y2="270"/>
  </g>

  <!-- Axe Ox -->
  <line x1="35" y1="220" x2="390" y2="220" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,220 384,217 384,223" fill="#334155"/>
  <text x="388" y="235" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="100" y1="305" x2="100" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="100,15 97,21 103,21" fill="#334155"/>
  <text x="85" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="86" y="235" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="150" y1="217" x2="150" y2="223"/>
    <text x="150" y="235" text-anchor="middle">1</text>
    <line x1="200" y1="217" x2="200" y2="223"/>
    <text x="200" y="235" text-anchor="middle">2</text>
    <line x1="250" y1="217" x2="250" y2="223"/>
    <text x="250" y="235" text-anchor="middle">3</text>
    <line x1="300" y1="217" x2="300" y2="223"/>
    <text x="300" y="235" text-anchor="middle">4</text>
    <line x1="50" y1="217" x2="50" y2="223"/>
    <text x="50" y="235" text-anchor="middle">-1</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="97" y1="170" x2="103" y2="170"/>
    <text x="92" y="174" text-anchor="end">1</text>
    <line x1="97" y1="120" x2="103" y2="120"/>
    <text x="92" y="124" text-anchor="end">2</text>
    <line x1="97" y1="70" x2="103" y2="70"/>
    <text x="92" y="74" text-anchor="end">3</text>
    <line x1="97" y1="270" x2="103" y2="270"/>
    <text x="92" y="274" text-anchor="end">-1</text>
  </g>

  <!-- Cercle centre (2 ; 3/4) → (200, 182.5), rayon 5/4 = 1.25 → 62.5 px -->
  <circle cx="200" cy="182.5" r="62.5" fill="none" stroke="#2563eb" stroke-width="1.8"/>
  <circle cx="200" cy="182.5" r="3" fill="#2563eb"/>
  <text x="206" y="180" font-size="11" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω</text>

  <!-- A(1;0) → (150, 220) -->
  <circle cx="150" cy="220" r="3.5" fill="#dc2626"/>
  <text x="140" y="238" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">A</text>

  <!-- B(3;0) → (250, 220) -->
  <circle cx="250" cy="220" r="3.5" fill="#dc2626"/>
  <text x="252" y="238" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">B</text>

  <!-- C(2;2) → (200, 120) -->
  <circle cx="200" cy="120" r="3.5" fill="#dc2626"/>
  <text x="205" y="116" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">C</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle circonscrit aux points A(1 ; 0), B(3 ; 0), C(2 ; 2).</text>
</svg>
