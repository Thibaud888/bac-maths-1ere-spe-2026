<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec quatre points A, B, C, D placés sur des coordonnées entières">
  <!-- Grille légère : pas de 30 px = 1 unité -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="290"/>
    <line x1="70"  y1="20" x2="70"  y2="290"/>
    <line x1="100" y1="20" x2="100" y2="290"/>
    <line x1="130" y1="20" x2="130" y2="290"/>
    <line x1="160" y1="20" x2="160" y2="290"/>
    <line x1="190" y1="20" x2="190" y2="290"/>
    <line x1="220" y1="20" x2="220" y2="290"/>
    <line x1="250" y1="20" x2="250" y2="290"/>
    <line x1="280" y1="20" x2="280" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="340" y1="20" x2="340" y2="290"/>
    <line x1="370" y1="20" x2="370" y2="290"/>

    <line x1="30" y1="20"  x2="380" y2="20"/>
    <line x1="30" y1="50"  x2="380" y2="50"/>
    <line x1="30" y1="80"  x2="380" y2="80"/>
    <line x1="30" y1="110" x2="380" y2="110"/>
    <line x1="30" y1="140" x2="380" y2="140"/>
    <line x1="30" y1="170" x2="380" y2="170"/>
    <line x1="30" y1="200" x2="380" y2="200"/>
    <line x1="30" y1="230" x2="380" y2="230"/>
    <line x1="30" y1="260" x2="380" y2="260"/>
    <line x1="30" y1="290" x2="380" y2="290"/>
  </g>

  <!-- Axe Ox (y_math = 0 -> y_svg = 170) -->
  <line x1="20" y1="170" x2="390" y2="170" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,170 384,167 384,173" fill="#334155"/>
  <text x="385" y="186" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math = 0 -> x_svg = 190) -->
  <line x1="190" y1="305" x2="190" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="190,10 187,16 193,16" fill="#334155"/>
  <text x="175" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="180" y="186" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="40"  y1="167" x2="40"  y2="173"/><text x="40"  y="186" text-anchor="middle">-5</text>
    <line x1="70"  y1="167" x2="70"  y2="173"/><text x="70"  y="186" text-anchor="middle">-4</text>
    <line x1="100" y1="167" x2="100" y2="173"/><text x="100" y="186" text-anchor="middle">-3</text>
    <line x1="130" y1="167" x2="130" y2="173"/><text x="130" y="186" text-anchor="middle">-2</text>
    <line x1="160" y1="167" x2="160" y2="173"/><text x="160" y="186" text-anchor="middle">-1</text>
    <line x1="220" y1="167" x2="220" y2="173"/><text x="220" y="186" text-anchor="middle">1</text>
    <line x1="250" y1="167" x2="250" y2="173"/><text x="250" y="186" text-anchor="middle">2</text>
    <line x1="280" y1="167" x2="280" y2="173"/><text x="280" y="186" text-anchor="middle">3</text>
    <line x1="310" y1="167" x2="310" y2="173"/><text x="310" y="186" text-anchor="middle">4</text>
    <line x1="340" y1="167" x2="340" y2="173"/><text x="340" y="186" text-anchor="middle">5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="187" y1="20"  x2="193" y2="20"/><text x="184" y="24" text-anchor="end">5</text>
    <line x1="187" y1="50"  x2="193" y2="50"/><text x="184" y="54" text-anchor="end">4</text>
    <line x1="187" y1="80"  x2="193" y2="80"/><text x="184" y="84" text-anchor="end">3</text>
    <line x1="187" y1="110" x2="193" y2="110"/><text x="184" y="114" text-anchor="end">2</text>
    <line x1="187" y1="140" x2="193" y2="140"/><text x="184" y="144" text-anchor="end">1</text>
    <line x1="187" y1="200" x2="193" y2="200"/><text x="184" y="204" text-anchor="end">-1</text>
    <line x1="187" y1="230" x2="193" y2="230"/><text x="184" y="234" text-anchor="end">-2</text>
    <line x1="187" y1="260" x2="193" y2="260"/><text x="184" y="264" text-anchor="end">-3</text>
    <line x1="187" y1="290" x2="193" y2="290"/><text x="184" y="294" text-anchor="end">-4</text>
  </g>

  <!-- Point A(2, 3) -> svg (250, 80) -->
  <circle cx="250" cy="80" r="3.5" fill="#334155"/>
  <text x="256" y="76" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- Point B(-1, 2) -> svg (160, 110) -->
  <circle cx="160" cy="110" r="3.5" fill="#334155"/>
  <text x="142" y="106" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>

  <!-- Point C(3, -1) -> svg (280, 200) -->
  <circle cx="280" cy="200" r="3.5" fill="#334155"/>
  <text x="286" y="214" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <!-- Point D(-2, -2) -> svg (130, 230) -->
  <circle cx="130" cy="230" r="3.5" fill="#334155"/>
  <text x="114" y="234" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">D</text>
</svg>
