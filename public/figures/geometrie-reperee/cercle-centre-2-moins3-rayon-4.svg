<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle de centre Omega(2 ; -3) et rayon 4 dans un repère orthonormé">
  <!-- Repère : 1 unité = 25 px ; origine (160, 120) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="35"  y1="20" x2="35"  y2="290"/>
    <line x1="60"  y1="20" x2="60"  y2="290"/>
    <line x1="85"  y1="20" x2="85"  y2="290"/>
    <line x1="110" y1="20" x2="110" y2="290"/>
    <line x1="135" y1="20" x2="135" y2="290"/>
    <line x1="185" y1="20" x2="185" y2="290"/>
    <line x1="210" y1="20" x2="210" y2="290"/>
    <line x1="235" y1="20" x2="235" y2="290"/>
    <line x1="260" y1="20" x2="260" y2="290"/>
    <line x1="285" y1="20" x2="285" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="335" y1="20" x2="335" y2="290"/>
    <line x1="360" y1="20" x2="360" y2="290"/>
    <line x1="25" y1="45"  x2="380" y2="45"/>
    <line x1="25" y1="70"  x2="380" y2="70"/>
    <line x1="25" y1="95"  x2="380" y2="95"/>
    <line x1="25" y1="145" x2="380" y2="145"/>
    <line x1="25" y1="170" x2="380" y2="170"/>
    <line x1="25" y1="195" x2="380" y2="195"/>
    <line x1="25" y1="220" x2="380" y2="220"/>
    <line x1="25" y1="245" x2="380" y2="245"/>
    <line x1="25" y1="270" x2="380" y2="270"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="120" x2="390" y2="120" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,120 384,117 384,123" fill="#334155"/>
  <text x="388" y="135" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="160" y1="305" x2="160" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="160,15 157,21 163,21" fill="#334155"/>
  <text x="145" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="146" y="135" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="185" y1="117" x2="185" y2="123"/>
    <text x="185" y="135" text-anchor="middle">1</text>
    <line x1="210" y1="117" x2="210" y2="123"/>
    <text x="210" y="135" text-anchor="middle">2</text>
    <line x1="260" y1="117" x2="260" y2="123"/>
    <text x="260" y="135" text-anchor="middle">4</text>
    <line x1="310" y1="117" x2="310" y2="123"/>
    <text x="310" y="135" text-anchor="middle">6</text>
    <line x1="110" y1="117" x2="110" y2="123"/>
    <text x="110" y="135" text-anchor="middle">-2</text>
    <line x1="60" y1="117" x2="60" y2="123"/>
    <text x="60" y="135" text-anchor="middle">-4</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="157" y1="95" x2="163" y2="95"/>
    <text x="152" y="99" text-anchor="end">1</text>
    <line x1="157" y1="45" x2="163" y2="45"/>
    <text x="152" y="49" text-anchor="end">3</text>
    <line x1="157" y1="145" x2="163" y2="145"/>
    <text x="152" y="149" text-anchor="end">-1</text>
    <line x1="157" y1="195" x2="163" y2="195"/>
    <text x="152" y="199" text-anchor="end">-3</text>
    <line x1="157" y1="245" x2="163" y2="245"/>
    <text x="152" y="249" text-anchor="end">-5</text>
  </g>

  <!-- Cercle centre Omega(2;-3) → (210, 195), rayon 4 → 100 px -->
  <circle cx="210" cy="195" r="100" fill="none" stroke="#2563eb" stroke-width="1.8"/>

  <!-- Centre Omega -->
  <circle cx="210" cy="195" r="3.5" fill="#2563eb"/>
  <text x="218" y="192" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω(2 ; −3)</text>

  <!-- Rayon dessiné vers point (6;-3) sur cercle -->
  <line x1="210" y1="195" x2="310" y2="195" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="4,3"/>
  <text x="245" y="188" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">r = 4</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle de centre Ω(2 ; −3) et rayon 4.</text>
</svg>
