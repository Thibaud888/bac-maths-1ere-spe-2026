<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec deux droites parallèles d1 (4x-3y+6=0) et d2 (4x-3y-11=0) de même vecteur normal n(4;-3)">
  <!-- Repère : 1 unité = 25 px ; origine (200, 160) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="50"  y1="20" x2="50"  y2="300"/>
    <line x1="75"  y1="20" x2="75"  y2="300"/>
    <line x1="100" y1="20" x2="100" y2="300"/>
    <line x1="125" y1="20" x2="125" y2="300"/>
    <line x1="150" y1="20" x2="150" y2="300"/>
    <line x1="175" y1="20" x2="175" y2="300"/>
    <line x1="225" y1="20" x2="225" y2="300"/>
    <line x1="250" y1="20" x2="250" y2="300"/>
    <line x1="275" y1="20" x2="275" y2="300"/>
    <line x1="300" y1="20" x2="300" y2="300"/>
    <line x1="325" y1="20" x2="325" y2="300"/>
    <line x1="350" y1="20" x2="350" y2="300"/>
    <line x1="40" y1="35"  x2="380" y2="35"/>
    <line x1="40" y1="60"  x2="380" y2="60"/>
    <line x1="40" y1="85"  x2="380" y2="85"/>
    <line x1="40" y1="110" x2="380" y2="110"/>
    <line x1="40" y1="135" x2="380" y2="135"/>
    <line x1="40" y1="185" x2="380" y2="185"/>
    <line x1="40" y1="210" x2="380" y2="210"/>
    <line x1="40" y1="235" x2="380" y2="235"/>
    <line x1="40" y1="260" x2="380" y2="260"/>
    <line x1="40" y1="285" x2="380" y2="285"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="160" x2="390" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,160 384,157 384,163" fill="#334155"/>
  <text x="388" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="200" y1="310" x2="200" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,15 197,21 203,21" fill="#334155"/>
  <text x="185" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="186" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="225" y1="157" x2="225" y2="163"/>
    <text x="225" y="175" text-anchor="middle">1</text>
    <line x1="275" y1="157" x2="275" y2="163"/>
    <text x="275" y="175" text-anchor="middle">3</text>
    <line x1="325" y1="157" x2="325" y2="163"/>
    <text x="325" y="175" text-anchor="middle">5</text>
    <line x1="175" y1="157" x2="175" y2="163"/>
    <text x="175" y="175" text-anchor="middle">-1</text>
    <line x1="125" y1="157" x2="125" y2="163"/>
    <text x="125" y="175" text-anchor="middle">-3</text>
    <line x1="75" y1="157" x2="75" y2="163"/>
    <text x="75" y="175" text-anchor="middle">-5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="135" x2="203" y2="135"/>
    <text x="192" y="139" text-anchor="end">1</text>
    <line x1="197" y1="110" x2="203" y2="110"/>
    <text x="192" y="114" text-anchor="end">2</text>
    <line x1="197" y1="60" x2="203" y2="60"/>
    <text x="192" y="64" text-anchor="end">4</text>
    <line x1="197" y1="185" x2="203" y2="185"/>
    <text x="192" y="189" text-anchor="end">-1</text>
    <line x1="197" y1="235" x2="203" y2="235"/>
    <text x="192" y="239" text-anchor="end">-3</text>
    <line x1="197" y1="285" x2="203" y2="285"/>
    <text x="192" y="289" text-anchor="end">-5</text>
  </g>

  <!-- d1 : 4x - 3y + 6 = 0 → y = (4x+6)/3 ; pour x=-6→y=-6 (svg : 50, 310 hors zone) ; x=-3→y=-2 (svg : 125, 210) ; x=3→y=6 (svg: 275, 10) -->
  <!-- Tracer entre x=-4.5 (y=-4) → (svg 87.5, 260) et x=3 (y=6) → (svg 275, 10) -->
  <line x1="87" y1="260" x2="275" y2="10" stroke="#2563eb" stroke-width="1.8"/>
  <text x="100" y="252" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">d₁</text>

  <!-- d2 : 4x - 3y - 11 = 0 → y = (4x-11)/3 ; x=-4→y=-9 hors ; x=2→y=-1 (svg : 250, 185) ; x=8→y=7 hors ; x=-1→y=-5 (svg: 175, 285)→hors, prendre x=-1→y=-5 sortie; x=5→y=3 (svg: 325, 85) -->
  <line x1="175" y1="285" x2="362" y2="36" stroke="#dc2626" stroke-width="1.8"/>
  <text x="345" y="55" font-size="12" font-style="italic" fill="#dc2626" font-family="Georgia,serif">d₂</text>

  <!-- Vecteur normal n=(4;-3) commun, depuis (1;1) (svg 225, 135) vers (1+4 ; 1-3) = (5 ; -2) (svg 325, 210) -->
  <line x1="225" y1="135" x2="325" y2="210" stroke="#334155" stroke-width="1.6"/>
  <polygon points="325,210 317,205 320,213" fill="#334155"/>
  <text x="328" y="208" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">n</text>
  <circle cx="225" cy="135" r="2.5" fill="#334155"/>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Deux droites parallèles : d₁ : 4x − 3y + 6 = 0 et d₂ : 4x − 3y − 11 = 0.</text>
</svg>
