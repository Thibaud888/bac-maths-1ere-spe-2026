<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère orthonormé avec un cercle de centre Omega(3 ; -1) et de rayon 5, et un rayon tracé du centre vers un point du cercle">
  <!-- Repère : 1 unité = 25 px ; origine (160, 130) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="35"  y1="20" x2="35"  y2="305"/>
    <line x1="60"  y1="20" x2="60"  y2="305"/>
    <line x1="85"  y1="20" x2="85"  y2="305"/>
    <line x1="110" y1="20" x2="110" y2="305"/>
    <line x1="135" y1="20" x2="135" y2="305"/>
    <line x1="185" y1="20" x2="185" y2="305"/>
    <line x1="210" y1="20" x2="210" y2="305"/>
    <line x1="235" y1="20" x2="235" y2="305"/>
    <line x1="260" y1="20" x2="260" y2="305"/>
    <line x1="285" y1="20" x2="285" y2="305"/>
    <line x1="310" y1="20" x2="310" y2="305"/>
    <line x1="335" y1="20" x2="335" y2="305"/>
    <line x1="360" y1="20" x2="360" y2="305"/>
    <line x1="20" y1="30"  x2="380" y2="30"/>
    <line x1="20" y1="55"  x2="380" y2="55"/>
    <line x1="20" y1="80"  x2="380" y2="80"/>
    <line x1="20" y1="105" x2="380" y2="105"/>
    <line x1="20" y1="155" x2="380" y2="155"/>
    <line x1="20" y1="180" x2="380" y2="180"/>
    <line x1="20" y1="205" x2="380" y2="205"/>
    <line x1="20" y1="230" x2="380" y2="230"/>
    <line x1="20" y1="255" x2="380" y2="255"/>
    <line x1="20" y1="280" x2="380" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="15" y1="130" x2="390" y2="130" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,130 384,127 384,133" fill="#334155"/>
  <text x="388" y="145" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="160" y1="310" x2="160" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="160,15 157,21 163,21" fill="#334155"/>
  <text x="145" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="146" y="145" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="185" y1="127" x2="185" y2="133"/>
    <text x="185" y="145" text-anchor="middle">1</text>
    <line x1="235" y1="127" x2="235" y2="133"/>
    <text x="235" y="145" text-anchor="middle">3</text>
    <line x1="285" y1="127" x2="285" y2="133"/>
    <text x="285" y="145" text-anchor="middle">5</text>
    <line x1="335" y1="127" x2="335" y2="133"/>
    <text x="335" y="145" text-anchor="middle">7</text>
    <line x1="135" y1="127" x2="135" y2="133"/>
    <text x="135" y="145" text-anchor="middle">-1</text>
    <line x1="85" y1="127" x2="85" y2="133"/>
    <text x="85" y="145" text-anchor="middle">-3</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="157" y1="105" x2="163" y2="105"/>
    <text x="152" y="109" text-anchor="end">1</text>
    <line x1="157" y1="55" x2="163" y2="55"/>
    <text x="152" y="59" text-anchor="end">3</text>
    <line x1="157" y1="155" x2="163" y2="155"/>
    <text x="152" y="159" text-anchor="end">-1</text>
    <line x1="157" y1="205" x2="163" y2="205"/>
    <text x="152" y="209" text-anchor="end">-3</text>
    <line x1="157" y1="255" x2="163" y2="255"/>
    <text x="152" y="259" text-anchor="end">-5</text>
  </g>

  <!-- Cercle centre Omega(3;-1) → (235, 155), rayon 5 → 125 px -->
  <circle cx="235" cy="155" r="125" fill="none" stroke="#2563eb" stroke-width="1.8"/>

  <!-- Centre Omega -->
  <circle cx="235" cy="155" r="3.5" fill="#2563eb"/>
  <text x="242" y="151" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω(3 ; −1)</text>

  <!-- Rayon : Omega vers point (8 ; -1) sur le cercle → (360, 155) -->
  <line x1="235" y1="155" x2="360" y2="155" stroke="#dc2626" stroke-width="1.6" stroke-dasharray="4,3"/>
  <text x="285" y="148" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">r = 5</text>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle de centre Ω(3 ; −1) et de rayon 5.</text>
</svg>
