<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle de centre Omega(2 ; 1) et rayon 2, avec un point M(5 ; 1) situé à l'extérieur du cercle">
  <!-- Repère : 1 unité = 30 px ; origine (130, 200) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="290"/>
    <line x1="70"  y1="20" x2="70"  y2="290"/>
    <line x1="100" y1="20" x2="100" y2="290"/>
    <line x1="160" y1="20" x2="160" y2="290"/>
    <line x1="190" y1="20" x2="190" y2="290"/>
    <line x1="220" y1="20" x2="220" y2="290"/>
    <line x1="250" y1="20" x2="250" y2="290"/>
    <line x1="280" y1="20" x2="280" y2="290"/>
    <line x1="310" y1="20" x2="310" y2="290"/>
    <line x1="340" y1="20" x2="340" y2="290"/>
    <line x1="370" y1="20" x2="370" y2="290"/>
    <line x1="30" y1="50"  x2="380" y2="50"/>
    <line x1="30" y1="80"  x2="380" y2="80"/>
    <line x1="30" y1="110" x2="380" y2="110"/>
    <line x1="30" y1="140" x2="380" y2="140"/>
    <line x1="30" y1="170" x2="380" y2="170"/>
    <line x1="30" y1="230" x2="380" y2="230"/>
    <line x1="30" y1="260" x2="380" y2="260"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="200" x2="385" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,200 379,197 379,203" fill="#334155"/>
  <text x="383" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="130" y1="305" x2="130" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="130,15 127,21 133,21" fill="#334155"/>
  <text x="115" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="116" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="160" y1="197" x2="160" y2="203"/>
    <text x="160" y="215" text-anchor="middle">1</text>
    <line x1="190" y1="197" x2="190" y2="203"/>
    <text x="190" y="215" text-anchor="middle">2</text>
    <line x1="220" y1="197" x2="220" y2="203"/>
    <text x="220" y="215" text-anchor="middle">3</text>
    <line x1="250" y1="197" x2="250" y2="203"/>
    <text x="250" y="215" text-anchor="middle">4</text>
    <line x1="280" y1="197" x2="280" y2="203"/>
    <text x="280" y="215" text-anchor="middle">5</text>
    <line x1="100" y1="197" x2="100" y2="203"/>
    <text x="100" y="215" text-anchor="middle">-1</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="127" y1="170" x2="133" y2="170"/>
    <text x="122" y="174" text-anchor="end">1</text>
    <line x1="127" y1="140" x2="133" y2="140"/>
    <text x="122" y="144" text-anchor="end">2</text>
    <line x1="127" y1="110" x2="133" y2="110"/>
    <text x="122" y="114" text-anchor="end">3</text>
    <line x1="127" y1="230" x2="133" y2="230"/>
    <text x="122" y="234" text-anchor="end">-1</text>
  </g>

  <!-- Cercle centre Omega(2;1) → (190, 170), rayon 2 → 60 px -->
  <circle cx="190" cy="170" r="60" fill="none" stroke="#2563eb" stroke-width="1.8"/>

  <!-- Centre Omega -->
  <circle cx="190" cy="170" r="3" fill="#2563eb"/>
  <text x="178" y="164" font-size="11" font-style="italic" fill="#2563eb" font-family="Georgia,serif">Ω</text>

  <!-- Point M(5;1) → (280, 170) — extérieur car distance OmegaM=3 > 2 -->
  <circle cx="280" cy="170" r="3.5" fill="#dc2626"/>
  <text x="285" y="166" font-size="12" font-style="italic" fill="#dc2626" font-family="Georgia,serif">M(5 ; 1)</text>

  <!-- Pointillé Omega M -->
  <line x1="190" y1="170" x2="280" y2="170" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Caption -->
  <text x="200" y="310" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle de centre Ω(2 ; 1) et rayon 2. Position de M(5 ; 1) ?</text>
</svg>
