<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle de diamètre [AB] avec A(-2;0), B(2;0), centre O(0;0), rayon 2, et point M(0;2) montrant angle droit AMB">
  <!-- Repère : 1 unité = 40 px ; origine (200, 200) -->

  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="290"/>
    <line x1="80"  y1="20" x2="80"  y2="290"/>
    <line x1="120" y1="20" x2="120" y2="290"/>
    <line x1="160" y1="20" x2="160" y2="290"/>
    <line x1="240" y1="20" x2="240" y2="290"/>
    <line x1="280" y1="20" x2="280" y2="290"/>
    <line x1="320" y1="20" x2="320" y2="290"/>
    <line x1="360" y1="20" x2="360" y2="290"/>
    <line x1="30" y1="40"  x2="385" y2="40"/>
    <line x1="30" y1="80"  x2="385" y2="80"/>
    <line x1="30" y1="120" x2="385" y2="120"/>
    <line x1="30" y1="160" x2="385" y2="160"/>
    <line x1="30" y1="240" x2="385" y2="240"/>
    <line x1="30" y1="280" x2="385" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="25" y1="200" x2="390" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,200 384,197 384,203" fill="#334155"/>
  <text x="388" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="200" y1="305" x2="200" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,15 197,21 203,21" fill="#334155"/>
  <text x="185" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="186" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="240" y1="197" x2="240" y2="203"/>
    <text x="240" y="215" text-anchor="middle">1</text>
    <line x1="280" y1="197" x2="280" y2="203"/>
    <text x="280" y="215" text-anchor="middle">2</text>
    <line x1="320" y1="197" x2="320" y2="203"/>
    <text x="320" y="215" text-anchor="middle">3</text>
    <line x1="160" y1="197" x2="160" y2="203"/>
    <text x="160" y="215" text-anchor="middle">-1</text>
    <line x1="120" y1="197" x2="120" y2="203"/>
    <text x="120" y="215" text-anchor="middle">-2</text>
    <line x1="80" y1="197" x2="80" y2="203"/>
    <text x="80" y="215" text-anchor="middle">-3</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="160" x2="203" y2="160"/>
    <text x="192" y="164" text-anchor="end">1</text>
    <line x1="197" y1="120" x2="203" y2="120"/>
    <text x="192" y="124" text-anchor="end">2</text>
    <line x1="197" y1="240" x2="203" y2="240"/>
    <text x="192" y="244" text-anchor="end">-1</text>
    <line x1="197" y1="280" x2="203" y2="280"/>
    <text x="192" y="284" text-anchor="end">-2</text>
  </g>

  <!-- Cercle : centre O(0;0) → (200,200), rayon 2 → 80 px -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#2563eb" stroke-width="1.8"/>

  <!-- A(-2;0) → (120, 200) -->
  <circle cx="120" cy="200" r="3.5" fill="#334155"/>
  <text x="110" y="218" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- B(2;0) → (280, 200) -->
  <circle cx="280" cy="200" r="3.5" fill="#334155"/>
  <text x="285" y="218" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>

  <!-- M(0;2) → (200, 120) -->
  <circle cx="200" cy="120" r="3.5" fill="#dc2626"/>
  <text x="205" y="115" font-size="11" font-style="italic" fill="#dc2626" font-family="Georgia,serif">M(0;2)</text>

  <!-- Segments MA et MB -->
  <line x1="200" y1="120" x2="120" y2="200" stroke="#dc2626" stroke-width="1.4"/>
  <line x1="200" y1="120" x2="280" y2="200" stroke="#dc2626" stroke-width="1.4"/>

  <!-- Indication angle droit en M -->
  <polygon points="200,128 208,128 208,120" fill="none" stroke="#dc2626" stroke-width="1.2"/>
  <polygon points="200,128 192,128 192,120" fill="none" stroke="#dc2626" stroke-width="1.2"/>

  <!-- Diamètre AB -->
  <line x1="120" y1="200" x2="280" y2="200" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Caption -->
  <text x="200" y="315" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Cercle de diamètre [AB], A(−2 ; 0), B(2 ; 0). Angle ∠AMB droit en M(0 ; 2).</text>
</svg>
