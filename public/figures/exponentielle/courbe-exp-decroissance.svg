<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Schéma d'une suite géométrique décroissante modélisant la décroissance radioactive, niveau zéro indiqué en pointillés">
  <!-- ── Axes (sans graduations numériques pour ne pas révéler les valeurs) ── -->
  <line x1="50" y1="260" x2="370" y2="260" stroke="#334155" stroke-width="1.2"/>
  <polygon points="370,260 364,257 364,263" fill="#334155"/>
  <text x="368" y="275" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">n</text>

  <line x1="70" y1="290" x2="70" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="70,30 67,36 73,36" fill="#334155"/>
  <text x="55" y="40" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">u_n</text>

  <text x="55" y="275" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Ligne pointillée matérialisant le niveau zéro vers lequel la suite se rapproche ── -->
  <line x1="70" y1="260" x2="370" y2="260" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ── Courbe de décroissance géométrique : u_n = u_0 × (1/2)^n
       Valeurs (avec u_0 = 256, mais affichage sans graduations) :
       n=0 → 256, n=1 → 128, n=2 → 64, n=3 → 32, n=4 → 16, n=5 → 8, ...
       Conversion : X = 70 + 50*n (jusqu'à n=6), Y = 260 - (valeur_normalisée * 200)
       avec valeur_max = 256 → Y = 60 ; valeur 128 → Y = 160 ; 64 → 210 ; 32 → 235 ; 16 → 247 ; 8 → 253 -->

  <!-- Points marqués (style "suite", points discrets reliés par une courbe lisse) -->
  <polyline fill="none" stroke="#1d4ed8" stroke-width="2"
    points="70,60 90,90 110,130 130,170 150,200 170,222 195,238 225,248 260,254 300,257 340,259"/>

  <!-- Quelques points pour rappeler le caractère discret de la suite -->
  <circle cx="70"  cy="60"  r="3" fill="#dc2626"/>
  <circle cx="120" cy="160" r="3" fill="#dc2626"/>
  <circle cx="170" cy="222" r="3" fill="#dc2626"/>
  <circle cx="220" cy="247" r="3" fill="#dc2626"/>
  <circle cx="270" cy="255" r="3" fill="#dc2626"/>
  <circle cx="320" cy="258" r="3" fill="#dc2626"/>

  <!-- ── Label u_0 ── -->
  <text x="78" y="55" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">u₀</text>

  <!-- ── Légende courbe ── -->
  <text x="280" y="80" font-size="12" font-style="italic" fill="#1d4ed8" font-family="Georgia,serif">u_n = u₀ × (1/2)ⁿ</text>

  <!-- ── Note explicative ── -->
  <text x="200" y="305" text-anchor="middle" font-size="10" fill="#475569" font-family="Georgia,serif">Modèle de décroissance : la masse se rapproche du niveau zéro (ligne pointillée).</text>
</svg>
