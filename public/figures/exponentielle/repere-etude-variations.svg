<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Repère vide gradué pour l'étude des variations de la fonction f(x) = (x - 1) e^x, sans tracé de la courbe">
  <!-- Échelles : x_math = -3 → 60, x_math = 3 → 360 ; soit pas de 50 px par unité (origine en x=210)
       y_math = -2 → 240, y_math = 4 → 60 ; soit pas de 30 px par unité (origine en y=180) -->

  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales x = -3, -2, -1, 1, 2, 3 -->
    <line x1="60"  y1="40" x2="60"  y2="290"/>
    <line x1="110" y1="40" x2="110" y2="290"/>
    <line x1="160" y1="40" x2="160" y2="290"/>
    <line x1="260" y1="40" x2="260" y2="290"/>
    <line x1="310" y1="40" x2="310" y2="290"/>
    <line x1="360" y1="40" x2="360" y2="290"/>
    <!-- horizontales y = 4, 3, 2, 1, -1, -2 -->
    <line x1="50" y1="60"  x2="370" y2="60"/>
    <line x1="50" y1="90"  x2="370" y2="90"/>
    <line x1="50" y1="120" x2="370" y2="120"/>
    <line x1="50" y1="150" x2="370" y2="150"/>
    <line x1="50" y1="210" x2="370" y2="210"/>
    <line x1="50" y1="240" x2="370" y2="240"/>
  </g>

  <!-- ── Axes ── -->
  <line x1="50" y1="180" x2="380" y2="180" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,180 374,177 374,183" fill="#334155"/>
  <text x="378" y="195" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="210" y1="300" x2="210" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="210,30 207,36 213,36" fill="#334155"/>
  <text x="195" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="215" y="195" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="60"  y1="177" x2="60"  y2="183"/>
    <text x="60"  y="195" text-anchor="middle">-3</text>
    <line x1="110" y1="177" x2="110" y2="183"/>
    <text x="110" y="195" text-anchor="middle">-2</text>
    <line x1="160" y1="177" x2="160" y2="183"/>
    <text x="160" y="195" text-anchor="middle">-1</text>
    <line x1="260" y1="177" x2="260" y2="183"/>
    <text x="260" y="195" text-anchor="middle">1</text>
    <line x1="310" y1="177" x2="310" y2="183"/>
    <text x="310" y="195" text-anchor="middle">2</text>
    <line x1="360" y1="177" x2="360" y2="183"/>
    <text x="360" y="195" text-anchor="middle">3</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="207" y1="60"  x2="213" y2="60"/>
    <text x="202" y="64"  text-anchor="end">4</text>
    <line x1="207" y1="90"  x2="213" y2="90"/>
    <text x="202" y="94"  text-anchor="end">3</text>
    <line x1="207" y1="120" x2="213" y2="120"/>
    <text x="202" y="124" text-anchor="end">2</text>
    <line x1="207" y1="150" x2="213" y2="150"/>
    <text x="202" y="154" text-anchor="end">1</text>
    <line x1="207" y1="210" x2="213" y2="210"/>
    <text x="202" y="214" text-anchor="end">-1</text>
    <line x1="207" y1="240" x2="213" y2="240"/>
    <text x="202" y="244" text-anchor="end">-2</text>
  </g>

  <!-- ── Légende ── -->
  <text x="200" y="310" font-size="11" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Repère pour l'étude de f(x) = (x − 1) eˣ</text>
</svg>
