<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe de la fonction exponentielle f de x egal e puissance x et sa tangente au point A de coordonnees 0 et 1. La tangente, droite croissante de pente 1, passe par le point A et par le point B de coordonnees moins 1 et 0.">
  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="60"  y1="40" x2="60"  y2="295"/>
    <line x1="130" y1="40" x2="130" y2="295"/>
    <line x1="270" y1="40" x2="270" y2="295"/>
    <line x1="340" y1="40" x2="340" y2="295"/>
    <line x1="60" y1="206" x2="340" y2="206"/>
    <line x1="60" y1="174" x2="340" y2="174"/>
    <line x1="60" y1="142" x2="340" y2="142"/>
    <line x1="60" y1="110" x2="340" y2="110"/>
    <line x1="60" y1="78"  x2="340" y2="78"/>
    <line x1="60" y1="46"  x2="340" y2="46"/>
  </g>

  <!-- ── Axes ── -->
  <line x1="50" y1="270" x2="355" y2="270" stroke="#334155" stroke-width="1.2"/>
  <polygon points="355,270 349,267 349,273" fill="#334155"/>
  <text x="350" y="285" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="305" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="190" y="285" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="60"  y1="267" x2="60"  y2="273"/>
    <text x="60"  y="285" text-anchor="middle">-2</text>
    <line x1="130" y1="267" x2="130" y2="273"/>
    <text x="130" y="285" text-anchor="middle">-1</text>
    <line x1="270" y1="267" x2="270" y2="273"/>
    <text x="270" y="285" text-anchor="middle">1</text>
    <line x1="340" y1="267" x2="340" y2="273"/>
    <text x="340" y="285" text-anchor="middle">2</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="238" x2="203" y2="238"/>
    <text x="190" y="242" text-anchor="end">1</text>
    <line x1="197" y1="206" x2="203" y2="206"/>
    <text x="190" y="210" text-anchor="end">2</text>
    <line x1="197" y1="174" x2="203" y2="174"/>
    <text x="190" y="178" text-anchor="end">3</text>
    <line x1="197" y1="142" x2="203" y2="142"/>
    <text x="190" y="146" text-anchor="end">4</text>
    <line x1="197" y1="110" x2="203" y2="110"/>
    <text x="190" y="114" text-anchor="end">5</text>
    <line x1="197" y1="78"  x2="203" y2="78"/>
    <text x="190" y="82" text-anchor="end">6</text>
    <line x1="197" y1="46"  x2="203" y2="46"/>
    <text x="190" y="50" text-anchor="end">7</text>
  </g>

  <!-- ── Tangente T : y = x + 1, tracée en pointillés
       x=-1.5 → y=-0.5 → (95, 286)
       x=1.6  → y=2.6  → (312, 186.8)  -->
  <line x1="95" y1="286" x2="312" y2="186.8" stroke="#475569" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="315" y="195" font-size="12" font-style="italic" font-family="Georgia,serif" fill="#475569">T</text>

  <!-- ── Courbe f(x) = e^x ── -->
  <path fill="none" stroke="#334155" stroke-width="1.8"
        d="M 60,265.68 Q 95,262.86 130,258.22 Q 165,250.58 200,238 Q 235,217.23 270,183.02 Q 305,126.58 333,56"/>

  <!-- ── Point A(0, 1) ── -->
  <circle cx="200" cy="238" r="3.5" fill="#334155"/>
  <text x="207" y="232" font-size="11" font-family="Georgia,serif" fill="#334155">A(0 ; 1)</text>

  <!-- ── Point B(-1, 0) ── -->
  <circle cx="130" cy="270" r="3.5" fill="#334155"/>
  <text x="100" y="263" font-size="11" font-family="Georgia,serif" fill="#334155">B(-1 ; 0)</text>

  <!-- ── Légende courbe ── -->
  <g font-family="Georgia,serif" fill="#334155">
    <text x="280" y="100" font-size="14" font-style="italic">C</text>
    <text x="292" y="105" font-size="11" font-style="italic">f</text>
  </g>
</svg>
