<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Schéma de la courbe de f(x) = (x^2 - 2) e^x présentant un maximum local et un minimum local à déterminer">
  <!-- ── Axes (sans graduations numériques) ── -->
  <line x1="40" y1="190" x2="360" y2="190" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,190 354,187 354,193" fill="#334155"/>
  <text x="358" y="205" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="220" y1="290" x2="220" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="220,30 217,36 223,36" fill="#334155"/>
  <text x="205" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="227" y="205" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Courbe de f(x) = (x^2 - 2) e^x ──
       Étude :
       - α = -1 - √3 ≈ -2.73 (max local) : f(α) ≈ (7.46 - 2)e^(-2.73) ≈ 5.46 × 0.065 ≈ 0.36 → tout petit positif
       - x = -√2 ≈ -1.41 : f = 0 (axe Ox)
       - β = -1 + √3 ≈ 0.73 (min local) : f(β) ≈ (0.54 - 2)e^(0.73) ≈ -1.46 × 2.08 ≈ -3.03
       - x = √2 ≈ 1.41 : f = 0
       - x = 2 : f = 2 × e^2 ≈ 14.78 (très grand)
       Sur le schéma on positionne grossièrement.
       Échelle : centre (220, 190), 1 unité_x ≈ 35px, 1 unité_y ≈ 25px.
       Points approchés en coordonnées SVG :
       x=-4 → environ 0⁻, x=-2.73 → max légèrement positif, x=-2 → 0.27 (presque 0+),
       x=-1.41 → 0 (axe), x=0 → -2, x=0.73 → min ≈ -3,
       x=1.41 → 0, x=2 → +grand. -->
  <polyline fill="none" stroke="#1d4ed8" stroke-width="2"
    points="80,193 100,189 125,184 145,189 165,200 185,220 205,238 220,240 240,260 255,265 270,260 285,240 300,200 315,140 325,80 332,40"/>

  <!-- ── Maximum local marqué (sans valeur) ── -->
  <circle cx="125" cy="184" r="3.5" fill="#dc2626"/>
  <text x="55" y="170" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">max. local</text>
  <line x1="100" y1="184" x2="155" y2="184" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Minimum local marqué (sans valeur) ── -->
  <circle cx="255" cy="265" r="3.5" fill="#dc2626"/>
  <text x="260" y="282" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">min. local</text>
  <line x1="230" y1="265" x2="285" y2="265" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Légende courbe ── -->
  <text x="330" y="55" font-size="12" font-style="italic" fill="#1d4ed8" font-family="Georgia,serif">𝒞_f</text>

  <!-- ── Note explicative ── -->
  <text x="200" y="310" text-anchor="middle" font-size="10" fill="#475569" font-family="Georgia,serif">Allure de la courbe de f(x) = (x² − 2) eˣ (valeurs des extremums à déterminer)</text>
</svg>
