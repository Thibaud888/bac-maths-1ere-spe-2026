<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe de la fonction f(x) = e^(2x) avec le point d'abscisse 0 marqué, sans tracé de la tangente">
  <!-- Échelles : x_math = -2 → 60, x_math = 2 → 340 ; pas de 70 px par unité (origine x=200)
       y_math = 0 → 270, y_math = 8 → 30 ; pas de 30 px par unité (origine y=270) -->

  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="60"  y1="30" x2="60"  y2="280"/>
    <line x1="130" y1="30" x2="130" y2="280"/>
    <line x1="270" y1="30" x2="270" y2="280"/>
    <line x1="340" y1="30" x2="340" y2="280"/>
    <line x1="50" y1="60"  x2="350" y2="60"/>
    <line x1="50" y1="90"  x2="350" y2="90"/>
    <line x1="50" y1="120" x2="350" y2="120"/>
    <line x1="50" y1="150" x2="350" y2="150"/>
    <line x1="50" y1="180" x2="350" y2="180"/>
    <line x1="50" y1="210" x2="350" y2="210"/>
    <line x1="50" y1="240" x2="350" y2="240"/>
  </g>

  <!-- ── Axes ── -->
  <line x1="50" y1="270" x2="360" y2="270" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,270 354,267 354,273" fill="#334155"/>
  <text x="358" y="285" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="290" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="205" y="285" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="60"  y1="267" x2="60"  y2="273"/>
    <text x="60"  y="285" text-anchor="middle">-2</text>
    <line x1="130" y1="267" x2="130" y2="273"/>
    <text x="130" y="285" text-anchor="middle">-1</text>
    <line x1="270" y1="267" x2="270" y2="273"/>
    <text x="270" y="285" text-anchor="middle">1</text>
    <line x1="340" y1="267" x2="340" y2="273"/>
    <text x="340" y="285" text-anchor="middle">2</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="197" y1="60"  x2="203" y2="60"/>
    <text x="192" y="64"  text-anchor="end">7</text>
    <line x1="197" y1="120" x2="203" y2="120"/>
    <text x="192" y="124" text-anchor="end">5</text>
    <line x1="197" y1="180" x2="203" y2="180"/>
    <text x="192" y="184" text-anchor="end">3</text>
    <line x1="197" y1="240" x2="203" y2="240"/>
    <text x="192" y="244" text-anchor="end">1</text>
  </g>

  <!-- ── Courbe y = e^(2x) ──
       Points calculés : x=-1 → e^-2 ≈ 0.135, x=-0.5 → e^-1 ≈ 0.37, x=0 → 1, x=0.5 → e ≈ 2.72, x=0.7 → 4.05, x=0.9 → 6.05, x=1 → e^2 ≈ 7.39
       Conversion : X_svg = 200 + 70*x_math ; Y_svg = 270 - 30*y_math (clampé à 30 mini) -->
  <polyline fill="none" stroke="#1d4ed8" stroke-width="2"
    points="60,266 95,265 130,264 165,260 200,240 235,189 250,164 270,109 285,55 295,30"/>

  <!-- ── Point d'abscisse 0 marqué ── -->
  <circle cx="200" cy="240" r="4" fill="#dc2626"/>
  <text x="208" y="235" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">A(0 ; 1)</text>

  <!-- ── Légende ── -->
  <text x="80" y="80" font-size="13" font-style="italic" fill="#1d4ed8" font-family="Georgia,serif">𝒞 : y = e²ˣ</text>
  <text x="200" y="310" font-size="11" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Courbe 𝒞 et point A d'abscisse 0 (tangente à déterminer)</text>
</svg>
