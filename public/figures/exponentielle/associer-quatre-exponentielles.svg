<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 400" width="440" height="400" role="img" aria-label="Quatre courbes numerotees C1 a C4 dans quatre sous-reperes. C1 strictement croissante passant par 0 et 1 et tendant vers 0 a gauche. C2 strictement decroissante passant par 0 et 1. C3 strictement decroissante a valeurs negatives passant par 0 et moins 1. C4 strictement croissante passant par 0 et moins 1.">
  <style>
    .grid { stroke: #e2e8f0; stroke-width: 0.5; }
    .axis { stroke: #334155; stroke-width: 1; }
    .curve { fill: none; stroke: #334155; stroke-width: 1.6; }
    .lbl { font-family: Georgia,serif; font-size: 10px; fill: #475569; }
    .title { font-family: Georgia,serif; font-size: 13px; fill: #334155; font-weight: bold; }
    .small { font-family: Georgia,serif; font-size: 9px; fill: #475569; }
  </style>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ── Vignette 1 (haut-gauche) : Courbe C1            ── -->
  <!-- ════════════════════════════════════════════════════ -->
  <!-- Origine math (0,0) : x_svg=110, y_svg=130 ; 1 unite x=35 px ; 1 unite y=23 px -->
  <text x="110" y="22" text-anchor="middle" class="title">C₁</text>
  <g class="grid">
    <line x1="40"  y1="60" x2="40"  y2="200"/>
    <line x1="75"  y1="60" x2="75"  y2="200"/>
    <line x1="145" y1="60" x2="145" y2="200"/>
    <line x1="180" y1="60" x2="180" y2="200"/>
    <line x1="40" y1="61"  x2="180" y2="61"/>
    <line x1="40" y1="84"  x2="180" y2="84"/>
    <line x1="40" y1="107" x2="180" y2="107"/>
    <line x1="40" y1="153" x2="180" y2="153"/>
    <line x1="40" y1="176" x2="180" y2="176"/>
    <line x1="40" y1="199" x2="180" y2="199"/>
  </g>
  <line x1="30" y1="130" x2="190" y2="130" class="axis"/>
  <polygon points="190,130 185,128 185,132" fill="#334155"/>
  <line x1="110" y1="205" x2="110" y2="55" class="axis"/>
  <polygon points="110,55 108,60 112,60" fill="#334155"/>
  <text x="186" y="142" class="small" font-style="italic">x</text>
  <text x="100" y="60" class="small" font-style="italic">y</text>
  <text x="103" y="141" class="small">O</text>
  <g class="lbl">
    <text x="40"  y="142" text-anchor="middle">-2</text>
    <text x="75"  y="142" text-anchor="middle">-1</text>
    <text x="145" y="142" text-anchor="middle">1</text>
    <text x="180" y="142" text-anchor="middle">2</text>
    <text x="106" y="111" text-anchor="end">1</text>
    <text x="106" y="156" text-anchor="end">-1</text>
  </g>
  <!-- C1 : e^x sur [-2, 1.1] -->
  <polyline class="curve"
    points="40,126.9 75,121.5 92.5,116 110,107 127.5,92.07 145,67.5 148.5,60.9"/>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ── Vignette 2 (haut-droit) : Courbe C2             ── -->
  <!-- ════════════════════════════════════════════════════ -->
  <!-- Origine : x_svg=330, y_svg=130 -->
  <text x="330" y="22" text-anchor="middle" class="title">C₂</text>
  <g class="grid">
    <line x1="260" y1="60" x2="260" y2="200"/>
    <line x1="295" y1="60" x2="295" y2="200"/>
    <line x1="365" y1="60" x2="365" y2="200"/>
    <line x1="400" y1="60" x2="400" y2="200"/>
    <line x1="260" y1="61"  x2="400" y2="61"/>
    <line x1="260" y1="84"  x2="400" y2="84"/>
    <line x1="260" y1="107" x2="400" y2="107"/>
    <line x1="260" y1="153" x2="400" y2="153"/>
    <line x1="260" y1="176" x2="400" y2="176"/>
    <line x1="260" y1="199" x2="400" y2="199"/>
  </g>
  <line x1="250" y1="130" x2="410" y2="130" class="axis"/>
  <polygon points="410,130 405,128 405,132" fill="#334155"/>
  <line x1="330" y1="205" x2="330" y2="55" class="axis"/>
  <polygon points="330,55 328,60 332,60" fill="#334155"/>
  <text x="406" y="142" class="small" font-style="italic">x</text>
  <text x="320" y="60" class="small" font-style="italic">y</text>
  <text x="323" y="141" class="small">O</text>
  <g class="lbl">
    <text x="260" y="142" text-anchor="middle">-2</text>
    <text x="295" y="142" text-anchor="middle">-1</text>
    <text x="365" y="142" text-anchor="middle">1</text>
    <text x="400" y="142" text-anchor="middle">2</text>
    <text x="326" y="111" text-anchor="end">1</text>
    <text x="326" y="156" text-anchor="end">-1</text>
  </g>
  <!-- C2 : e^(-x) sur [-1.1, 2] -->
  <polyline class="curve"
    points="291.5,60.9 295,67.5 312.5,92.07 330,107 347.5,116 365,121.5 400,126.9"/>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ── Vignette 3 (bas-gauche) : Courbe C3             ── -->
  <!-- ════════════════════════════════════════════════════ -->
  <!-- Origine : x_svg=110, y_svg=320 -->
  <text x="110" y="212" text-anchor="middle" class="title">C₃</text>
  <g class="grid">
    <line x1="40"  y1="250" x2="40"  y2="390"/>
    <line x1="75"  y1="250" x2="75"  y2="390"/>
    <line x1="145" y1="250" x2="145" y2="390"/>
    <line x1="180" y1="250" x2="180" y2="390"/>
    <line x1="40" y1="251" x2="180" y2="251"/>
    <line x1="40" y1="274" x2="180" y2="274"/>
    <line x1="40" y1="297" x2="180" y2="297"/>
    <line x1="40" y1="343" x2="180" y2="343"/>
    <line x1="40" y1="366" x2="180" y2="366"/>
    <line x1="40" y1="389" x2="180" y2="389"/>
  </g>
  <line x1="30" y1="320" x2="190" y2="320" class="axis"/>
  <polygon points="190,320 185,318 185,322" fill="#334155"/>
  <line x1="110" y1="395" x2="110" y2="245" class="axis"/>
  <polygon points="110,245 108,250 112,250" fill="#334155"/>
  <text x="186" y="332" class="small" font-style="italic">x</text>
  <text x="100" y="250" class="small" font-style="italic">y</text>
  <text x="103" y="331" class="small">O</text>
  <g class="lbl">
    <text x="40"  y="332" text-anchor="middle">-2</text>
    <text x="75"  y="332" text-anchor="middle">-1</text>
    <text x="145" y="332" text-anchor="middle">1</text>
    <text x="180" y="332" text-anchor="middle">2</text>
    <text x="106" y="301" text-anchor="end">1</text>
    <text x="106" y="346" text-anchor="end">-1</text>
  </g>
  <!-- C3 : -e^x sur [-2, 1.1] -->
  <polyline class="curve"
    points="40,323.1 75,328.5 92.5,334 110,343 127.5,357.93 145,382.5 148.5,389.1"/>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- ── Vignette 4 (bas-droit) : Courbe C4              ── -->
  <!-- ════════════════════════════════════════════════════ -->
  <!-- Origine : x_svg=330, y_svg=320 -->
  <text x="330" y="212" text-anchor="middle" class="title">C₄</text>
  <g class="grid">
    <line x1="260" y1="250" x2="260" y2="390"/>
    <line x1="295" y1="250" x2="295" y2="390"/>
    <line x1="365" y1="250" x2="365" y2="390"/>
    <line x1="400" y1="250" x2="400" y2="390"/>
    <line x1="260" y1="251" x2="400" y2="251"/>
    <line x1="260" y1="274" x2="400" y2="274"/>
    <line x1="260" y1="297" x2="400" y2="297"/>
    <line x1="260" y1="343" x2="400" y2="343"/>
    <line x1="260" y1="366" x2="400" y2="366"/>
    <line x1="260" y1="389" x2="400" y2="389"/>
  </g>
  <line x1="250" y1="320" x2="410" y2="320" class="axis"/>
  <polygon points="410,320 405,318 405,322" fill="#334155"/>
  <line x1="330" y1="395" x2="330" y2="245" class="axis"/>
  <polygon points="330,245 328,250 332,250" fill="#334155"/>
  <text x="406" y="332" class="small" font-style="italic">x</text>
  <text x="320" y="250" class="small" font-style="italic">y</text>
  <text x="323" y="331" class="small">O</text>
  <g class="lbl">
    <text x="260" y="332" text-anchor="middle">-2</text>
    <text x="295" y="332" text-anchor="middle">-1</text>
    <text x="365" y="332" text-anchor="middle">1</text>
    <text x="400" y="332" text-anchor="middle">2</text>
    <text x="326" y="301" text-anchor="end">1</text>
    <text x="326" y="346" text-anchor="end">-1</text>
  </g>
  <!-- C4 : e^x - 2 sur [-2, 1.6] -->
  <polyline class="curve"
    points="260,362.9 295,357.5 312.5,352 330,343 347.5,328.07 365,303.5 382.5,263 386,252.08"/>
</svg>
