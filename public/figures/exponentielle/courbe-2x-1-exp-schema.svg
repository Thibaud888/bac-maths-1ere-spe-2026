<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Schéma de la courbe de f(x) = (2x - 1) e^x avec point de tangente horizontale marqué, sans valeurs précises">
  <!-- ── Axes (sans graduations numériques) ── -->
  <line x1="40" y1="200" x2="360" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="360,200 354,197 354,203" fill="#334155"/>
  <text x="358" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="290" x2="200" y2="30" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,30 197,36 203,36" fill="#334155"/>
  <text x="185" y="35" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="207" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Courbe de f(x) = (2x-1)e^x ──
       Comportement : tend vers 0⁻ pour x → -∞, minimum quelque part en x ≈ -1/2,
       passe par (0 ; -1), s'annule en x = 1/2, monte ensuite très vite.
       Conversion approximative : centre en (200, 200), 1 unité_x ≈ 50px, 1 unité_y ≈ 25px
       Points : x=-3 → 0⁻ ; x=-2 → -5e^-2≈-0.68 ; x=-1 → -3e^-1≈-1.1 ; x=-0.5 → min ≈ -2e^(-0.5)≈-1.21
                x=0 → -1 ; x=0.5 → 0 ; x=1 → e≈2.72 ; x=1.5 → 2e^1.5≈8.96 -->
  <polyline fill="none" stroke="#1d4ed8" stroke-width="2"
    points="50,200 75,205 100,212 125,222 150,228 175,230 187,230 200,225 225,200 250,162 270,110 285,60 295,35"/>

  <!-- ── Point de minimum (tangente horizontale) marqué ── -->
  <circle cx="175" cy="230" r="3.5" fill="#dc2626"/>
  <text x="100" y="252" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">extremum à déterminer</text>
  <!-- petit segment pointillé indiquant la tangente horizontale (très court, juste pour signaler) -->
  <line x1="155" y1="230" x2="195" y2="230" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Légende ── -->
  <text x="270" y="80" font-size="12" font-style="italic" fill="#1d4ed8" font-family="Georgia,serif">𝒞_f</text>
  <text x="200" y="310" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Allure de la courbe de f(x) = (2x − 1) eˣ (extremum à déterminer)</text>
</svg>
