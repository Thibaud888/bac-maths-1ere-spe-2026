<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Losange ABCD avec A à gauche, B en bas, C à droite et D en haut. Les diagonales AC et BD sont représentées en tirets. Les quatre côtés sont égaux.">
  <!-- Losange centré dans SVG : centre (200,160) -->
  <!-- Demi-diagonale horizontale 140px, demi-diagonale verticale 110px -->
  <!-- A=(60,160), B=(200,270), C=(340,160), D=(200,50) -->

  <!-- Diagonales en tirets -->
  <line x1="60" y1="160" x2="340" y2="160" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="200" y1="270" x2="200" y2="50" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Marque angle droit à l'intersection (200,160) -->
  <rect x="200" y="152" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <!-- Côtés du losange -->
  <line x1="60" y1="160" x2="200" y2="270" stroke="#334155" stroke-width="1.5"/>
  <line x1="200" y1="270" x2="340" y2="160" stroke="#334155" stroke-width="1.5"/>
  <line x1="340" y1="160" x2="200" y2="50" stroke="#334155" stroke-width="1.5"/>
  <line x1="200" y1="50" x2="60" y2="160" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="60" cy="160" r="3.5" fill="#334155"/>
  <circle cx="200" cy="270" r="3.5" fill="#334155"/>
  <circle cx="340" cy="160" r="3.5" fill="#334155"/>
  <circle cx="200" cy="50" r="3.5" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="38" y="165" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="195" y="290" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="346" y="165" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
  <text x="195" y="45" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">D</text>

  <!-- Marques de congruence sur les 4 côtés (une double barre perpendiculaire) -->
  <!-- Côté AB : milieu ≈ (130, 215), direction (140,110) normalisée -->
  <line x1="122" y1="210" x2="138" y2="220" stroke="#475569" stroke-width="1.8"/>
  <line x1="118" y1="217" x2="134" y2="213" stroke="#475569" stroke-width="1.2"/>

  <!-- Côté BC : milieu ≈ (270, 215) -->
  <line x1="262" y1="220" x2="278" y2="210" stroke="#475569" stroke-width="1.8"/>
  <line x1="266" y1="213" x2="282" y2="217" stroke="#475569" stroke-width="1.2"/>

  <!-- Côté CD : milieu ≈ (270, 105) -->
  <line x1="262" y1="110" x2="278" y2="100" stroke="#475569" stroke-width="1.8"/>
  <line x1="266" y1="103" x2="282" y2="107" stroke="#475569" stroke-width="1.2"/>

  <!-- Côté DA : milieu ≈ (130, 105) -->
  <line x1="122" y1="100" x2="138" y2="110" stroke="#475569" stroke-width="1.8"/>
  <line x1="118" y1="107" x2="134" y2="103" stroke="#475569" stroke-width="1.2"/>
</svg>
