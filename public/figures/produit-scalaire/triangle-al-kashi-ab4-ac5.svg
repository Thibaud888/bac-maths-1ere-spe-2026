<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Triangle ABC avec AB égal à 4, AC égal à 5 et angle A de 60 degrés. On cherche BC.">
  <!-- Figure géométrique pure — triangle ABC pour Al-Kashi -->
  <!-- A en bas à gauche, B en bas à droite, C en haut -->
  <!-- Échelle : AB = 4 → 160px, AC = 5 → 200px, angle A = 60° -->
  <!-- A=(80,250), B=(240,250), C = A + 200*(cos60°, -sin60°) = (80+100, 250-173) = (180, 77) -->

  <!-- Côtés du triangle -->
  <line x1="80" y1="250" x2="240" y2="250" stroke="#334155" stroke-width="1.5"/>
  <line x1="80" y1="250" x2="180" y2="77" stroke="#334155" stroke-width="1.5"/>
  <line x1="240" y1="250" x2="180" y2="77" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="80" cy="250" r="3" fill="#334155"/>
  <circle cx="240" cy="250" r="3" fill="#334155"/>
  <circle cx="180" cy="77" r="3" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="60" y="268" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="246" y="268" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="172" y="65" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <!-- Arc angle A (rayon 35px) -->
  <!-- Angle entre AB (direction 0°) et AC (direction -60° = 300° en SVG soit vers le haut-droit) -->
  <!-- L'arc va de 0° à -60° (en coordonnées mathématiques) -->
  <!-- En SVG : de 0° à -60° soit de la direction droite jusqu'à direction haut-droit -->
  <!-- arc d'angle 60° centré en A=(80,250), rayon 35 -->
  <!-- point1 = (80+35, 250) = (115, 250) ; point2 = A + 35*(cos60°, -sin60°) = (80+17.5, 250-30.3) = (97.5, 219.7) -->
  <path d="M 115 250 A 35 35 0 0 0 97.5 219.7" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- Étiquette angle A -->
  <text x="114" y="240" font-size="11" fill="#475569" font-family="Georgia,serif">60°</text>

  <!-- Étiquette AB = 4 (en bas du segment AB) -->
  <text x="150" y="270" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">4</text>

  <!-- Étiquette AC = 5 (sur le côté gauche) -->
  <text x="115" y="170" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">5</text>

  <!-- Étiquette BC = ? (côté droit) -->
  <text x="220" y="165" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">?</text>
</svg>
