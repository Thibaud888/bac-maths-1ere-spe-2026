<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Repère orthonormal avec le triangle ABC rectangle en B, A(1;1), B(4;1), C(4;5). L'angle droit en B est marqué.">
  <!-- Repère orthonormal : 1 unité = 30px, origine (100, 220) -->
  <!-- A(1,1) → SVG(100+30, 220-30) = (130, 190) -->
  <!-- B(4,1) → SVG(100+120, 220-30) = (220, 190) -->
  <!-- C(4,5) → SVG(100+120, 220-150) = (220, 70) -->

  <!-- Grille légère -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40" y1="40" x2="380" y2="40"/>
    <line x1="40" y1="70" x2="380" y2="70"/>
    <line x1="40" y1="100" x2="380" y2="100"/>
    <line x1="40" y1="130" x2="380" y2="130"/>
    <line x1="40" y1="160" x2="380" y2="160"/>
    <line x1="40" y1="190" x2="380" y2="190"/>
    <line x1="40" y1="250" x2="380" y2="250"/>
    <line x1="40" y1="280" x2="380" y2="280"/>
    <line x1="70" y1="20" x2="70" y2="300"/>
    <line x1="130" y1="20" x2="130" y2="300"/>
    <line x1="160" y1="20" x2="160" y2="300"/>
    <line x1="190" y1="20" x2="190" y2="300"/>
    <line x1="220" y1="20" x2="220" y2="300"/>
    <line x1="250" y1="20" x2="250" y2="300"/>
    <line x1="280" y1="20" x2="280" y2="300"/>
    <line x1="310" y1="20" x2="310" y2="300"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="220" x2="385" y2="220" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,220 379,217 379,223" fill="#334155"/>
  <text x="383" y="235" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="100" y1="305" x2="100" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="100,15 97,21 103,21" fill="#334155"/>
  <text x="85" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine O -->
  <text x="84" y="235" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="130" y1="217" x2="130" y2="223"/>
    <text x="130" y="235" text-anchor="middle">1</text>
    <line x1="160" y1="217" x2="160" y2="223"/>
    <text x="160" y="235" text-anchor="middle">2</text>
    <line x1="190" y1="217" x2="190" y2="223"/>
    <text x="190" y="235" text-anchor="middle">3</text>
    <line x1="220" y1="217" x2="220" y2="223"/>
    <text x="220" y="235" text-anchor="middle">4</text>
    <line x1="250" y1="217" x2="250" y2="223"/>
    <text x="250" y="235" text-anchor="middle">5</text>
    <line x1="70" y1="217" x2="70" y2="223"/>
    <text x="70" y="235" text-anchor="middle">-1</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="97" y1="190" x2="103" y2="190"/>
    <text x="92" y="194" text-anchor="end">1</text>
    <line x1="97" y1="160" x2="103" y2="160"/>
    <text x="92" y="164" text-anchor="end">2</text>
    <line x1="97" y1="130" x2="103" y2="130"/>
    <text x="92" y="134" text-anchor="end">3</text>
    <line x1="97" y1="100" x2="103" y2="100"/>
    <text x="92" y="104" text-anchor="end">4</text>
    <line x1="97" y1="70" x2="103" y2="70"/>
    <text x="92" y="74" text-anchor="end">5</text>
    <line x1="97" y1="250" x2="103" y2="250"/>
    <text x="92" y="254" text-anchor="end">-1</text>
  </g>

  <!-- Triangle ABC -->
  <line x1="130" y1="190" x2="220" y2="190" stroke="#334155" stroke-width="1.5"/>
  <line x1="220" y1="190" x2="220" y2="70" stroke="#334155" stroke-width="1.5"/>
  <line x1="130" y1="190" x2="220" y2="70" stroke="#334155" stroke-width="1.5"/>

  <!-- Angle droit en B (carré) -->
  <rect x="208" y="178" width="12" height="12" fill="none" stroke="#334155" stroke-width="1.2"/>

  <!-- Points -->
  <circle cx="130" cy="190" r="4" fill="#334155"/>
  <circle cx="220" cy="190" r="4" fill="#334155"/>
  <circle cx="220" cy="70" r="4" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="118" y="208" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="226" y="208" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="226" y="68" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
</svg>
