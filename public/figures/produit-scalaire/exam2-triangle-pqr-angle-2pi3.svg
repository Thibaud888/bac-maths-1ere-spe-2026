<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Triangle PQR avec PQ égal à 7, QR égal à 5 et angle PQR de 2pi sur 3 soit 120 degrés. PR est à calculer.">
  <!-- Triangle PQR : P en bas à gauche, Q en bas au milieu, R en haut -->
  <!-- Angle en Q = 120° (obtus) -->
  <!-- Echelle : PQ = 7 → 140px, QR = 5 → 100px -->
  <!-- Q=(160,260), P=(20,260) [à gauche de Q de 140px] -->
  <!-- R = Q + 100*(cos(180-120)°, -sin(180-120)°) dans le repère SVG -->
  <!-- L'angle en Q est de 120°. En SVG, la direction de QP est vers la gauche (180°) -->
  <!-- La direction de QR est à 120° de QP en sens anti-trigonométrique (sens horaire en SVG) -->
  <!-- Soit 180° - 120° = 60° depuis l'horizontale = direction angle 60° au-dessus de l'axe QP direction gauche -->
  <!-- Plus simple : direction QP = 180° (gauche). Angle PQR=120° donc direction QR = 180° - 120° = 60° depuis droite = haut-droite -->
  <!-- QR direction : angle de -60° depuis horizontal droit = cos(-60°)=0.5, sin(-60°)=-0.866 en coords SVG -->
  <!-- R = (160+100*cos(60°), 260-100*sin(60°)) = (160+50, 260-86.6) = (210, 173.4) ≈ (210, 173) -->

  <!-- Côtés -->
  <line x1="20" y1="260" x2="160" y2="260" stroke="#334155" stroke-width="1.5"/>
  <line x1="160" y1="260" x2="210" y2="173" stroke="#334155" stroke-width="1.5"/>
  <line x1="20" y1="260" x2="210" y2="173" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="20" cy="260" r="3.5" fill="#334155"/>
  <circle cx="160" cy="260" r="3.5" fill="#334155"/>
  <circle cx="210" cy="173" r="3.5" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="4" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">P</text>
  <text x="155" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">Q</text>
  <text x="216" y="172" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">R</text>

  <!-- Arc angle Q = 120° -->
  <!-- Centre Q=(160,260), rayon 35 -->
  <!-- De la direction QP (gauche, 180°) à direction QR (60° depuis droite) -->
  <!-- point sur QP à r=35 : (160-35, 260) = (125, 260) -->
  <!-- point sur QR à r=35 : (160+35*cos(-60°... en SVG -60° = haut-droit) = (160+17.5, 260-30.3) = (177.5, 229.7) -->
  <!-- arc grand (120° > 90°) dans sens anti-horaire SVG (0 0 1) de (177.5,229.7) à (125,260) -->
  <path d="M 177.5 229.7 A 35 35 0 0 0 125 260" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- Étiquette angle Q -->
  <text x="125" y="248" font-size="11" fill="#475569" font-family="Georgia,serif">2π/3</text>

  <!-- Étiquette PQ = 7 -->
  <text x="90" y="278" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">7</text>

  <!-- Étiquette QR = 5 -->
  <text x="196" y="224" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">5</text>

  <!-- Étiquette PR = ? -->
  <text x="95" y="200" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">?</text>
</svg>
