<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Triangle isocèle ABC avec AB égal à AC. A est au sommet, B et C à la base. M est le milieu de BC. La médiane AM est représentée en tirets.">
  <!-- Triangle isocèle : A en haut, BC horizontal en bas -->
  <!-- A=(200,60), B=(80,260), C=(320,260), M=(200,260) -->

  <!-- Médiane AM en tirets -->
  <line x1="200" y1="60" x2="200" y2="260" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Côtés du triangle -->
  <line x1="200" y1="60" x2="80" y2="260" stroke="#334155" stroke-width="1.5"/>
  <line x1="200" y1="60" x2="320" y2="260" stroke="#334155" stroke-width="1.5"/>
  <line x1="80" y1="260" x2="320" y2="260" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="200" cy="60" r="3.5" fill="#334155"/>
  <circle cx="80" cy="260" r="3.5" fill="#334155"/>
  <circle cx="320" cy="260" r="3.5" fill="#334155"/>
  <circle cx="200" cy="260" r="4" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="193" y="48" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="62" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="326" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
  <text x="193" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">M</text>

  <!-- Marques de congruence sur AB et AC (double trait) -->
  <!-- Milieu AB : ((200+80)/2, (60+260)/2) = (140, 160) ; direction (-120,200) normalisé -->
  <!-- Perpendiculaire à AB pour la marque -->
  <line x1="133" y1="157" x2="147" y2="163" stroke="#475569" stroke-width="1.8"/>
  <line x1="130" y1="163" x2="144" y2="169" stroke="#475569" stroke-width="1.4"/>

  <!-- Milieu AC : ((200+320)/2, (60+260)/2) = (260, 160) -->
  <line x1="253" y1="163" x2="267" y2="157" stroke="#475569" stroke-width="1.8"/>
  <line x1="256" y1="169" x2="270" y2="163" stroke="#475569" stroke-width="1.4"/>

  <!-- Marques BM = MC (une barre sur chaque demi-base) -->
  <!-- BM : milieu (140, 260) -->
  <line x1="137" y1="256" x2="143" y2="264" stroke="#475569" stroke-width="1.8"/>
  <!-- MC : milieu (260, 260) -->
  <line x1="257" y1="256" x2="263" y2="264" stroke="#475569" stroke-width="1.8"/>

  <!-- Étiquette AM -->
  <text x="206" y="168" font-size="11" font-style="italic" fill="#94a3b8" font-family="Georgia,serif">AM</text>
</svg>
