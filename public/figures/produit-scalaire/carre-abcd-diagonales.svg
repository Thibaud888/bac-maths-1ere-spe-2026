<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Carré ABCD de côté a avec ses deux diagonales AC et BD représentées en tirets.">
  <!-- Carré ABCD centré dans le SVG -->
  <!-- A bas-gauche, B bas-droite, C haut-droite, D haut-gauche -->
  <!-- Centre (200,160), côté = 160px -->
  <!-- A=(120,240), B=(280,240), C=(280,80), D=(120,80) -->

  <!-- Diagonales en tirets -->
  <line x1="120" y1="240" x2="280" y2="80" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="280" y1="240" x2="120" y2="80" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Marque angle droit à l'intersection E=(200,160) -->
  <!-- Intersection des diagonales d'un carré : milieu = (200,160) -->
  <rect x="193" y="153" width="10" height="10" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <!-- Côtés du carré -->
  <rect x="120" y="80" width="160" height="160" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="120" cy="240" r="3.5" fill="#334155"/>
  <circle cx="280" cy="240" r="3.5" fill="#334155"/>
  <circle cx="280" cy="80" r="3.5" fill="#334155"/>
  <circle cx="120" cy="80" r="3.5" fill="#334155"/>

  <!-- Étiquettes sommets -->
  <text x="102" y="258" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="284" y="258" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="284" y="78" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
  <text x="102" y="78" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">D</text>

  <!-- Étiquette côté a -->
  <text x="200" y="262" font-size="12" font-style="italic" fill="#475569" font-family="Georgia,serif" text-anchor="middle">a</text>

  <!-- Étiquette AC et BD -->
  <text x="270" y="106" font-size="11" font-style="italic" fill="#94a3b8" font-family="Georgia,serif">AC</text>
  <text x="270" y="216" font-size="11" font-style="italic" fill="#94a3b8" font-family="Georgia,serif">BD</text>

  <!-- Marques de congruence sur les 4 côtés (petite barre) -->
  <line x1="196" y1="240" x2="204" y2="240" stroke="#475569" stroke-width="1.8"/>
  <line x1="196" y1="80" x2="204" y2="80" stroke="#475569" stroke-width="1.8"/>
  <line x1="120" y1="156" x2="120" y2="164" stroke="#475569" stroke-width="1.8"/>
  <line x1="280" y1="156" x2="280" y2="164" stroke="#475569" stroke-width="1.8"/>
</svg>
