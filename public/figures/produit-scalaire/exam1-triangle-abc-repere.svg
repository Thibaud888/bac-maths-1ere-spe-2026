<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Repère orthonormal avec le triangle ABC, A(1;4), B(5;1), C(-2;0).">
  <!-- Repère orthonormal : 1 unité = 30px, origine (170, 200) -->
  <!-- A(1,4)  → SVG(170+30,  200-120) = (200, 80) -->
  <!-- B(5,1)  → SVG(170+150, 200-30)  = (320, 170) -->
  <!-- C(-2,0) → SVG(170-60,  200-0)   = (110, 200) -->

  <!-- Grille légère -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40" y1="50" x2="375" y2="50"/>
    <line x1="40" y1="80" x2="375" y2="80"/>
    <line x1="40" y1="110" x2="375" y2="110"/>
    <line x1="40" y1="140" x2="375" y2="140"/>
    <line x1="40" y1="170" x2="375" y2="170"/>
    <line x1="40" y1="230" x2="375" y2="230"/>
    <line x1="40" y1="260" x2="375" y2="260"/>
    <line x1="80" y1="20" x2="80" y2="280"/>
    <line x1="110" y1="20" x2="110" y2="280"/>
    <line x1="140" y1="20" x2="140" y2="280"/>
    <line x1="200" y1="20" x2="200" y2="280"/>
    <line x1="230" y1="20" x2="230" y2="280"/>
    <line x1="260" y1="20" x2="260" y2="280"/>
    <line x1="290" y1="20" x2="290" y2="280"/>
    <line x1="320" y1="20" x2="320" y2="280"/>
    <line x1="350" y1="20" x2="350" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="200" x2="385" y2="200" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,200 379,197 379,203" fill="#334155"/>
  <text x="383" y="215" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="170" y1="305" x2="170" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="170,15 167,21 173,21" fill="#334155"/>
  <text x="155" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine O -->
  <text x="155" y="215" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="200" y1="197" x2="200" y2="203"/>
    <text x="200" y="215" text-anchor="middle">1</text>
    <line x1="230" y1="197" x2="230" y2="203"/>
    <text x="230" y="215" text-anchor="middle">2</text>
    <line x1="260" y1="197" x2="260" y2="203"/>
    <text x="260" y="215" text-anchor="middle">3</text>
    <line x1="290" y1="197" x2="290" y2="203"/>
    <text x="290" y="215" text-anchor="middle">4</text>
    <line x1="320" y1="197" x2="320" y2="203"/>
    <text x="320" y="215" text-anchor="middle">5</text>
    <line x1="140" y1="197" x2="140" y2="203"/>
    <text x="140" y="215" text-anchor="middle">-1</text>
    <line x1="110" y1="197" x2="110" y2="203"/>
    <text x="110" y="215" text-anchor="middle">-2</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="167" y1="170" x2="173" y2="170"/>
    <text x="162" y="174" text-anchor="end">1</text>
    <line x1="167" y1="140" x2="173" y2="140"/>
    <text x="162" y="144" text-anchor="end">2</text>
    <line x1="167" y1="110" x2="173" y2="110"/>
    <text x="162" y="114" text-anchor="end">3</text>
    <line x1="167" y1="80" x2="173" y2="80"/>
    <text x="162" y="84" text-anchor="end">4</text>
    <line x1="167" y1="230" x2="173" y2="230"/>
    <text x="162" y="234" text-anchor="end">-1</text>
  </g>

  <!-- Triangle ABC -->
  <line x1="200" y1="80" x2="320" y2="170" stroke="#334155" stroke-width="1.5"/>
  <line x1="320" y1="170" x2="110" y2="200" stroke="#334155" stroke-width="1.5"/>
  <line x1="110" y1="200" x2="200" y2="80" stroke="#334155" stroke-width="1.5"/>

  <!-- Points -->
  <circle cx="200" cy="80" r="4" fill="#334155"/>
  <circle cx="320" cy="170" r="4" fill="#334155"/>
  <circle cx="110" cy="200" r="4" fill="#334155"/>

  <!-- Étiquettes -->
  <text x="206" y="78" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">A(1;4)</text>
  <text x="326" y="168" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">B(5;1)</text>
  <text x="60" y="198" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C(-2;0)</text>
</svg>
