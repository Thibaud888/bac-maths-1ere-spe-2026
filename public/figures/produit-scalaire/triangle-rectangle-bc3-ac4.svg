<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Triangle ABC rectangle en C, avec BC égal à 3, AC égal à 4, hypoténuse AB à calculer.">
  <!-- Triangle rectangle en C : C en bas à gauche, B en bas à droite, A en haut à gauche -->
  <!-- Échelle : BC = 3 → 120px, AC = 4 → 160px -->
  <!-- C=(100,260), B=(220,260), A=(100,100) -->

  <!-- Côtés du triangle -->
  <line x1="100" y1="260" x2="220" y2="260" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="100" y2="260" stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="220" y2="260" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="100" cy="260" r="3" fill="#334155"/>
  <circle cx="220" cy="260" r="3" fill="#334155"/>
  <circle cx="100" cy="100" r="3" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="80" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
  <text x="226" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="80" y="98" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <!-- Angle droit en C (carré) -->
  <rect x="100" y="244" width="14" height="14" fill="none" stroke="#334155" stroke-width="1.2"/>

  <!-- Étiquette BC = 3 (en bas) -->
  <text x="160" y="278" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">3</text>

  <!-- Étiquette AC = 4 (côté vertical gauche) -->
  <text x="82" y="185" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="end">4</text>

  <!-- Étiquette AB = ? (hypoténuse) -->
  <text x="180" y="172" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">AB = ?</text>
</svg>
