<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Triangle ABC avec AB égal à 6, AC égal à 8 et angle BAC de 60 degrés. Le côté BC est à calculer.">
  <!-- Triangle ABC : A en bas à gauche, angle A = 60° -->
  <!-- Échelle : AB = 6 → 130px, AC = 8 → 173px -->
  <!-- A=(60,250), B=(190,250) -->
  <!-- C = A + 173*(cos60°, -sin60°) = (60+86.5, 250-149.8) ≈ (147, 100) -->

  <!-- Côtés du triangle -->
  <line x1="60" y1="250" x2="190" y2="250" stroke="#334155" stroke-width="1.5"/>
  <line x1="60" y1="250" x2="147" y2="100" stroke="#334155" stroke-width="1.5"/>
  <line x1="190" y1="250" x2="147" y2="100" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="60" cy="250" r="3.5" fill="#334155"/>
  <circle cx="190" cy="250" r="3.5" fill="#334155"/>
  <circle cx="147" cy="100" r="3.5" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="42" y="268" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="196" y="268" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="140" y="90" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <!-- Arc angle A (rayon 40px) -->
  <!-- Direction AB : angle 0° (droite) ; direction AC : angle -60° (60° vers le haut) -->
  <!-- En SVG : start=(60+40,250), end=(60+40*cos60°, 250-40*sin60°)=(60+20,250-34.6)=(80,215.4) -->
  <path d="M 100 250 A 40 40 0 0 0 80 215.4" fill="none" stroke="#475569" stroke-width="1.2"/>

  <!-- Étiquette angle A -->
  <text x="100" y="242" font-size="11" fill="#475569" font-family="Georgia,serif">60°</text>

  <!-- Étiquette AB = 6 -->
  <text x="125" y="268" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">6</text>

  <!-- Étiquette AC = 8 -->
  <text x="90" y="178" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">8</text>

  <!-- Étiquette BC = ? -->
  <text x="178" y="177" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">?</text>
</svg>
