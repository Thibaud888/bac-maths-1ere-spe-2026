<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Triangle ABC rectangle en A, avec AB égal à 5 et AC égal à 12. L'hypoténuse BC est à calculer.">
  <!-- Triangle rectangle en A : A en bas à gauche, B en bas à droite, C en haut à gauche -->
  <!-- Échelle : AB = 5 → 130px, AC = 12 → 200px -->
  <!-- A=(90,280), B=(220,280), C=(90,80) -->

  <!-- Côtés du triangle -->
  <line x1="90" y1="280" x2="220" y2="280" stroke="#334155" stroke-width="1.5"/>
  <line x1="90" y1="80" x2="90" y2="280" stroke="#334155" stroke-width="1.5"/>
  <line x1="90" y1="80" x2="220" y2="280" stroke="#334155" stroke-width="1.5"/>

  <!-- Angle droit en A -->
  <rect x="90" y="264" width="14" height="14" fill="none" stroke="#334155" stroke-width="1.2"/>

  <!-- Sommets -->
  <circle cx="90" cy="280" r="3.5" fill="#334155"/>
  <circle cx="220" cy="280" r="3.5" fill="#334155"/>
  <circle cx="90" cy="80" r="3.5" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="70" y="298" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="226" y="298" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="70" y="78" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <!-- Étiquette AB = 5 -->
  <text x="155" y="298" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">5</text>

  <!-- Étiquette AC = 12 -->
  <text x="72" y="183" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="end">12</text>

  <!-- Étiquette BC = ? -->
  <text x="175" y="185" font-size="12" fill="#475569" font-family="Georgia,serif" text-anchor="middle">BC = ?</text>
</svg>
