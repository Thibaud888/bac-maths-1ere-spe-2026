<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Rectangle ABCD avec A en bas à gauche, B en bas à droite, C en haut à droite, D en haut à gauche. Les côtés AB égal p et BC égal q sont étiquetés. Les deux diagonales AC et BD sont représentées en tirets.">
  <!-- Rectangle ABCD centré dans le SVG -->
  <!-- A bas-gauche, B bas-droite, C haut-droite, D haut-gauche -->
  <!-- A=(70,250), B=(330,250), C=(330,90), D=(70,90) -->

  <!-- Diagonales en tirets -->
  <line x1="70" y1="250" x2="330" y2="90" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>
  <line x1="330" y1="250" x2="70" y2="90" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- Angles droits aux 4 coins (petits carrés) -->
  <rect x="70" y="234" width="12" height="12" fill="none" stroke="#334155" stroke-width="1"/>
  <rect x="318" y="234" width="12" height="12" fill="none" stroke="#334155" stroke-width="1"/>
  <rect x="318" y="90" width="12" height="12" fill="none" stroke="#334155" stroke-width="1"/>
  <rect x="70" y="90" width="12" height="12" fill="none" stroke="#334155" stroke-width="1"/>

  <!-- Côtés du rectangle -->
  <rect x="70" y="90" width="260" height="160" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Sommets -->
  <circle cx="70" cy="250" r="3.5" fill="#334155"/>
  <circle cx="330" cy="250" r="3.5" fill="#334155"/>
  <circle cx="330" cy="90" r="3.5" fill="#334155"/>
  <circle cx="70" cy="90" r="3.5" fill="#334155"/>

  <!-- Étiquettes des sommets -->
  <text x="52" y="268" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="336" y="268" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="336" y="88" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
  <text x="52" y="88" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">D</text>

  <!-- Étiquette AB = p -->
  <text x="200" y="270" font-size="13" font-style="italic" fill="#475569" font-family="Georgia,serif" text-anchor="middle">p</text>

  <!-- Étiquette BC = q -->
  <text x="350" y="172" font-size="13" font-style="italic" fill="#475569" font-family="Georgia,serif" text-anchor="start">q</text>

  <!-- Étiquettes diagonales -->
  <text x="108" y="118" font-size="11" font-style="italic" fill="#94a3b8" font-family="Georgia,serif">BD</text>
  <text x="290" y="118" font-size="11" font-style="italic" fill="#94a3b8" font-family="Georgia,serif">AC</text>
</svg>
