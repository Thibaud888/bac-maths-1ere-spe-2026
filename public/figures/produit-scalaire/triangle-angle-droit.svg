<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Triangle ABC tracé dans un repère orthonormé gradué">
  <!-- Origine SVG (190, 170), pas = 25 px = 1 unité. x : de -6 à 7, y : de -5 à 6 -->
  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40"  y1="20" x2="40"  y2="295"/>
    <line x1="65"  y1="20" x2="65"  y2="295"/>
    <line x1="90"  y1="20" x2="90"  y2="295"/>
    <line x1="115" y1="20" x2="115" y2="295"/>
    <line x1="140" y1="20" x2="140" y2="295"/>
    <line x1="165" y1="20" x2="165" y2="295"/>
    <line x1="215" y1="20" x2="215" y2="295"/>
    <line x1="240" y1="20" x2="240" y2="295"/>
    <line x1="265" y1="20" x2="265" y2="295"/>
    <line x1="290" y1="20" x2="290" y2="295"/>
    <line x1="315" y1="20" x2="315" y2="295"/>
    <line x1="340" y1="20" x2="340" y2="295"/>
    <line x1="365" y1="20" x2="365" y2="295"/>

    <line x1="30" y1="20"  x2="380" y2="20"/>
    <line x1="30" y1="45"  x2="380" y2="45"/>
    <line x1="30" y1="70"  x2="380" y2="70"/>
    <line x1="30" y1="95"  x2="380" y2="95"/>
    <line x1="30" y1="120" x2="380" y2="120"/>
    <line x1="30" y1="145" x2="380" y2="145"/>
    <line x1="30" y1="195" x2="380" y2="195"/>
    <line x1="30" y1="220" x2="380" y2="220"/>
    <line x1="30" y1="245" x2="380" y2="245"/>
    <line x1="30" y1="270" x2="380" y2="270"/>
    <line x1="30" y1="295" x2="380" y2="295"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="170" x2="390" y2="170" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,170 384,167 384,173" fill="#334155"/>
  <text x="385" y="186" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="190" y1="305" x2="190" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="190,10 187,16 193,16" fill="#334155"/>
  <text x="175" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="180" y="186" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="40"  y1="167" x2="40"  y2="173"/><text x="40"  y="186" text-anchor="middle">-6</text>
    <line x1="65"  y1="167" x2="65"  y2="173"/><text x="65"  y="186" text-anchor="middle">-5</text>
    <line x1="90"  y1="167" x2="90"  y2="173"/><text x="90"  y="186" text-anchor="middle">-4</text>
    <line x1="115" y1="167" x2="115" y2="173"/><text x="115" y="186" text-anchor="middle">-3</text>
    <line x1="140" y1="167" x2="140" y2="173"/><text x="140" y="186" text-anchor="middle">-2</text>
    <line x1="165" y1="167" x2="165" y2="173"/><text x="165" y="186" text-anchor="middle">-1</text>
    <line x1="215" y1="167" x2="215" y2="173"/><text x="215" y="186" text-anchor="middle">1</text>
    <line x1="240" y1="167" x2="240" y2="173"/><text x="240" y="186" text-anchor="middle">2</text>
    <line x1="265" y1="167" x2="265" y2="173"/><text x="265" y="186" text-anchor="middle">3</text>
    <line x1="290" y1="167" x2="290" y2="173"/><text x="290" y="186" text-anchor="middle">4</text>
    <line x1="315" y1="167" x2="315" y2="173"/><text x="315" y="186" text-anchor="middle">5</text>
    <line x1="340" y1="167" x2="340" y2="173"/><text x="340" y="186" text-anchor="middle">6</text>
    <line x1="365" y1="167" x2="365" y2="173"/><text x="365" y="186" text-anchor="middle">7</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="187" y1="20"  x2="193" y2="20"/><text x="184" y="24" text-anchor="end">6</text>
    <line x1="187" y1="45"  x2="193" y2="45"/><text x="184" y="49" text-anchor="end">5</text>
    <line x1="187" y1="70"  x2="193" y2="70"/><text x="184" y="74" text-anchor="end">4</text>
    <line x1="187" y1="95"  x2="193" y2="95"/><text x="184" y="99" text-anchor="end">3</text>
    <line x1="187" y1="120" x2="193" y2="120"/><text x="184" y="124" text-anchor="end">2</text>
    <line x1="187" y1="145" x2="193" y2="145"/><text x="184" y="149" text-anchor="end">1</text>
    <line x1="187" y1="195" x2="193" y2="195"/><text x="184" y="199" text-anchor="end">-1</text>
    <line x1="187" y1="220" x2="193" y2="220"/><text x="184" y="224" text-anchor="end">-2</text>
    <line x1="187" y1="245" x2="193" y2="245"/><text x="184" y="249" text-anchor="end">-3</text>
    <line x1="187" y1="270" x2="193" y2="270"/><text x="184" y="274" text-anchor="end">-4</text>
    <line x1="187" y1="295" x2="193" y2="295"/><text x="184" y="299" text-anchor="end">-5</text>
  </g>

  <!-- Triangle ABC : A(-1, 2) -> (165, 120) ; B(3, 1) -> (265, 145) ; C(-2, -2) -> (140, 220) -->
  <polygon points="165,120 265,145 140,220" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Points -->
  <circle cx="165" cy="120" r="3.5" fill="#334155"/>
  <text x="150" y="115" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <circle cx="265" cy="145" r="3.5" fill="#334155"/>
  <text x="272" y="142" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>

  <circle cx="140" cy="220" r="3.5" fill="#334155"/>
  <text x="123" y="225" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
</svg>
