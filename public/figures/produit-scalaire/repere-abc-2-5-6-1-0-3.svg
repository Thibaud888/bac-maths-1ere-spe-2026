<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Repère orthonormal avec les points A(2;5), B(6;1) et C(0;3). Le triangle ABC est tracé.">
  <!-- Repère orthonormal : 1 unité = 40px, origine (60, 260) -->
  <!-- A(2,5) → SVG(60+80, 260-200) = (140, 60) -->
  <!-- B(6,1) → SVG(60+240, 260-40) = (300, 220) -->
  <!-- C(0,3) → SVG(60+0, 260-120) = (60, 140) -->

  <!-- Grille légère -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40" y1="20" x2="380" y2="20"/>
    <line x1="40" y1="60" x2="380" y2="60"/>
    <line x1="40" y1="100" x2="380" y2="100"/>
    <line x1="40" y1="140" x2="380" y2="140"/>
    <line x1="40" y1="180" x2="380" y2="180"/>
    <line x1="40" y1="220" x2="380" y2="220"/>
    <line x1="100" y1="10" x2="100" y2="300"/>
    <line x1="140" y1="10" x2="140" y2="300"/>
    <line x1="180" y1="10" x2="180" y2="300"/>
    <line x1="220" y1="10" x2="220" y2="300"/>
    <line x1="260" y1="10" x2="260" y2="300"/>
    <line x1="300" y1="10" x2="300" y2="300"/>
    <line x1="340" y1="10" x2="340" y2="300"/>
  </g>

  <!-- Axe Ox -->
  <line x1="25" y1="260" x2="385" y2="260" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,260 379,257 379,263" fill="#334155"/>
  <text x="383" y="275" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="60" y1="305" x2="60" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="60,10 57,16 63,16" fill="#334155"/>
  <text x="45" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine O -->
  <text x="44" y="275" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="100" y1="257" x2="100" y2="263"/>
    <text x="100" y="275" text-anchor="middle">1</text>
    <line x1="140" y1="257" x2="140" y2="263"/>
    <text x="140" y="275" text-anchor="middle">2</text>
    <line x1="180" y1="257" x2="180" y2="263"/>
    <text x="180" y="275" text-anchor="middle">3</text>
    <line x1="220" y1="257" x2="220" y2="263"/>
    <text x="220" y="275" text-anchor="middle">4</text>
    <line x1="260" y1="257" x2="260" y2="263"/>
    <text x="260" y="275" text-anchor="middle">5</text>
    <line x1="300" y1="257" x2="300" y2="263"/>
    <text x="300" y="275" text-anchor="middle">6</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="57" y1="220" x2="63" y2="220"/>
    <text x="52" y="224" text-anchor="end">1</text>
    <line x1="57" y1="180" x2="63" y2="180"/>
    <text x="52" y="184" text-anchor="end">2</text>
    <line x1="57" y1="140" x2="63" y2="140"/>
    <text x="52" y="144" text-anchor="end">3</text>
    <line x1="57" y1="100" x2="63" y2="100"/>
    <text x="52" y="104" text-anchor="end">4</text>
    <line x1="57" y1="60" x2="63" y2="60"/>
    <text x="52" y="64" text-anchor="end">5</text>
  </g>

  <!-- Triangle ABC -->
  <line x1="140" y1="60" x2="300" y2="220" stroke="#334155" stroke-width="1.3"/>
  <line x1="300" y1="220" x2="60" y2="140" stroke="#334155" stroke-width="1.3"/>
  <line x1="60" y1="140" x2="140" y2="60" stroke="#334155" stroke-width="1.3"/>

  <!-- Points -->
  <circle cx="140" cy="60" r="4" fill="#334155"/>
  <circle cx="300" cy="220" r="4" fill="#334155"/>
  <circle cx="60" cy="140" r="4" fill="#334155"/>

  <!-- Étiquettes des points -->
  <text x="146" y="57" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">A(2;5)</text>
  <text x="306" y="220" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">B(6;1)</text>
  <text x="24" y="140" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C(0;3)</text>
</svg>
