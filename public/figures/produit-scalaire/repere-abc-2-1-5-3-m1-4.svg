<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Repère orthonormal avec les points A(2;1), B(5;3) et C(-1;4). Les vecteurs AB et AC sont représentés par des flèches.">
  <!-- Repère orthonormal : 1 unité = 30px, origine (150, 190) -->
  <!-- A(2,1) → SVG(150+60, 190-30) = (210, 160) -->
  <!-- B(5,3) → SVG(150+150, 190-90) = (300, 100) -->
  <!-- C(-1,4) → SVG(150-30, 190-120) = (120, 70) -->

  <!-- Grille légère -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="30" y1="40" x2="380" y2="40"/>
    <line x1="30" y1="70" x2="380" y2="70"/>
    <line x1="30" y1="100" x2="380" y2="100"/>
    <line x1="30" y1="130" x2="380" y2="130"/>
    <line x1="30" y1="160" x2="380" y2="160"/>
    <line x1="30" y1="220" x2="380" y2="220"/>
    <line x1="30" y1="250" x2="380" y2="250"/>
    <line x1="30" y1="280" x2="380" y2="280"/>
    <line x1="60" y1="20" x2="60" y2="300"/>
    <line x1="90" y1="20" x2="90" y2="300"/>
    <line x1="120" y1="20" x2="120" y2="300"/>
    <line x1="180" y1="20" x2="180" y2="300"/>
    <line x1="210" y1="20" x2="210" y2="300"/>
    <line x1="240" y1="20" x2="240" y2="300"/>
    <line x1="270" y1="20" x2="270" y2="300"/>
    <line x1="300" y1="20" x2="300" y2="300"/>
    <line x1="330" y1="20" x2="330" y2="300"/>
  </g>

  <!-- Axe Ox -->
  <line x1="25" y1="190" x2="385" y2="190" stroke="#334155" stroke-width="1.2"/>
  <polygon points="385,190 379,187 379,193" fill="#334155"/>
  <text x="383" y="205" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="150" y1="305" x2="150" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="150,15 147,21 153,21" fill="#334155"/>
  <text x="135" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine O -->
  <text x="136" y="205" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="180" y1="187" x2="180" y2="193"/>
    <text x="180" y="205" text-anchor="middle">1</text>
    <line x1="210" y1="187" x2="210" y2="193"/>
    <text x="210" y="205" text-anchor="middle">2</text>
    <line x1="240" y1="187" x2="240" y2="193"/>
    <text x="240" y="205" text-anchor="middle">3</text>
    <line x1="270" y1="187" x2="270" y2="193"/>
    <text x="270" y="205" text-anchor="middle">4</text>
    <line x1="300" y1="187" x2="300" y2="193"/>
    <text x="300" y="205" text-anchor="middle">5</text>
    <line x1="120" y1="187" x2="120" y2="193"/>
    <text x="120" y="205" text-anchor="middle">-1</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="147" y1="160" x2="153" y2="160"/>
    <text x="142" y="164" text-anchor="end">1</text>
    <line x1="147" y1="130" x2="153" y2="130"/>
    <text x="142" y="134" text-anchor="end">2</text>
    <line x1="147" y1="100" x2="153" y2="100"/>
    <text x="142" y="104" text-anchor="end">3</text>
    <line x1="147" y1="70" x2="153" y2="70"/>
    <text x="142" y="74" text-anchor="end">4</text>
    <line x1="147" y1="220" x2="153" y2="220"/>
    <text x="142" y="224" text-anchor="end">-1</text>
  </g>

  <!-- Vecteur AB : A(210,160) → B(300,100) -->
  <line x1="210" y1="160" x2="296" y2="104" stroke="#2563eb" stroke-width="1.8"/>
  <polygon points="300,100 293,104 298,111" fill="#2563eb"/>

  <!-- Vecteur AC : A(210,160) → C(120,70) -->
  <line x1="210" y1="160" x2="124" y2="74" stroke="#7c3aed" stroke-width="1.8"/>
  <polygon points="120,70 127,74 122,81" fill="#7c3aed"/>

  <!-- Point A -->
  <circle cx="210" cy="160" r="4" fill="#334155"/>
  <text x="215" y="157" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">A(2;1)</text>

  <!-- Point B -->
  <circle cx="300" cy="100" r="4" fill="#2563eb"/>
  <text x="306" y="98" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">B(5;3)</text>

  <!-- Point C -->
  <circle cx="120" cy="70" r="4" fill="#7c3aed"/>
  <text x="125" y="67" font-size="12" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">C(-1;4)</text>

  <!-- Étiquettes vecteurs -->
  <text x="262" y="120" font-size="11" font-style="italic" fill="#2563eb" font-family="Georgia,serif">AB</text>
  <text x="152" y="118" font-size="11" font-style="italic" fill="#7c3aed" font-family="Georgia,serif">AC</text>
</svg>
