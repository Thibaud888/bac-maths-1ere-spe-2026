<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320"
     role="img" aria-label="Repère orthonormal avec le triangle ABC, A(0;0), B(4;0), C(1;3). M est le milieu de BC, H est le pied de la hauteur depuis C sur AB.">
  <!-- Repère orthonormal : 1 unité = 40px, origine (80, 220) -->
  <!-- A(0,0) → SVG(80, 220) -->
  <!-- B(4,0) → SVG(80+160, 220) = (240, 220) -->
  <!-- C(1,3) → SVG(80+40, 220-120) = (120, 100) -->
  <!-- M = milieu BC = ((4+1)/2, (0+3)/2) = (2.5, 1.5) → SVG(80+100, 220-60) = (180, 160) -->
  <!-- H = pied hauteur depuis C sur AB = (1, 0) → SVG(80+40, 220) = (120, 220) -->

  <!-- Grille légère -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="40" y1="60" x2="370" y2="60"/>
    <line x1="40" y1="100" x2="370" y2="100"/>
    <line x1="40" y1="140" x2="370" y2="140"/>
    <line x1="40" y1="180" x2="370" y2="180"/>
    <line x1="120" y1="20" x2="120" y2="280"/>
    <line x1="160" y1="20" x2="160" y2="280"/>
    <line x1="200" y1="20" x2="200" y2="280"/>
    <line x1="240" y1="20" x2="240" y2="280"/>
    <line x1="280" y1="20" x2="280" y2="280"/>
    <line x1="320" y1="20" x2="320" y2="280"/>
  </g>

  <!-- Axe Ox -->
  <line x1="30" y1="220" x2="380" y2="220" stroke="#334155" stroke-width="1.2"/>
  <polygon points="380,220 374,217 374,223" fill="#334155"/>
  <text x="378" y="235" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="80" y1="295" x2="80" y2="15" stroke="#334155" stroke-width="1.2"/>
  <polygon points="80,15 77,21 83,21" fill="#334155"/>
  <text x="65" y="20" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine O -->
  <text x="62" y="235" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="120" y1="217" x2="120" y2="223"/>
    <text x="120" y="235" text-anchor="middle">1</text>
    <line x1="160" y1="217" x2="160" y2="223"/>
    <text x="160" y="235" text-anchor="middle">2</text>
    <line x1="200" y1="217" x2="200" y2="223"/>
    <text x="200" y="235" text-anchor="middle">3</text>
    <line x1="240" y1="217" x2="240" y2="223"/>
    <text x="240" y="235" text-anchor="middle">4</text>
    <line x1="280" y1="217" x2="280" y2="223"/>
    <text x="280" y="235" text-anchor="middle">5</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="77" y1="180" x2="83" y2="180"/>
    <text x="72" y="184" text-anchor="end">1</text>
    <line x1="77" y1="140" x2="83" y2="140"/>
    <text x="72" y="144" text-anchor="end">2</text>
    <line x1="77" y1="100" x2="83" y2="100"/>
    <text x="72" y="104" text-anchor="end">3</text>
  </g>

  <!-- Triangle ABC -->
  <line x1="80" y1="220" x2="240" y2="220" stroke="#334155" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="120" y2="100" stroke="#334155" stroke-width="1.5"/>
  <line x1="240" y1="220" x2="120" y2="100" stroke="#334155" stroke-width="1.5"/>

  <!-- Médiane AM en tirets -->
  <line x1="80" y1="220" x2="180" y2="160" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Hauteur CH en tirets -->
  <line x1="120" y1="100" x2="120" y2="220" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="5,3"/>

  <!-- Angle droit en H (carré) -->
  <rect x="120" y="206" width="11" height="11" fill="none" stroke="#475569" stroke-width="1"/>

  <!-- Points principaux -->
  <circle cx="80" cy="220" r="4" fill="#334155"/>
  <circle cx="240" cy="220" r="4" fill="#334155"/>
  <circle cx="120" cy="100" r="4" fill="#334155"/>
  <circle cx="180" cy="160" r="3.5" fill="#475569"/>
  <circle cx="120" cy="220" r="3.5" fill="#475569"/>

  <!-- Étiquettes -->
  <text x="62" y="218" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>
  <text x="246" y="218" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>
  <text x="126" y="95" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>
  <text x="186" y="157" font-size="12" font-style="italic" fill="#475569" font-family="Georgia,serif">M</text>
  <text x="112" y="240" font-size="12" font-style="italic" fill="#475569" font-family="Georgia,serif">H</text>
</svg>
