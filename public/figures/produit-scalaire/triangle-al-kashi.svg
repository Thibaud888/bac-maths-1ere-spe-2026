<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Triangle géométrique avec deux côtés et un angle marqués au sommet A">
  <!-- Triangle ABC avec angle de 60° en A.
       A en (90, 230), AB le long d'une direction, AC formant 60° avec AB.
       Choix : AB horizontal (vers la droite) ; AC à 60° au-dessus.
       AB = 5 unités * 40 px = 200 px → B = (290, 230)
       AC = 8 unités * 28 px = 224 px ; à 60° : C = A + (224 cos60°, -224 sin60°) = A + (112, -194) ≈ (202, 36)
       (échelle différente pour AC pour cadrage ; figure non à l'échelle, ce qui est usuel) -->

  <!-- Côtés -->
  <line x1="90" y1="230" x2="290" y2="230" stroke="#334155" stroke-width="1.8"/>
  <line x1="90" y1="230" x2="202" y2="36" stroke="#334155" stroke-width="1.8"/>
  <line x1="290" y1="230" x2="202" y2="36" stroke="#334155" stroke-width="1.8"/>

  <!-- Arc marquant l'angle en A (60°) : rayon 30, de la direction AB (0°) vers la direction AC (60° au-dessus) -->
  <!-- Point de départ : A + (30, 0) = (120, 230) ; point d'arrivée : A + 30*(cos60°, -sin60°) = (90+15, 230-26) = (105, 204) -->
  <path d="M 120 230 A 30 30 0 0 0 105 204" fill="none" stroke="#475569" stroke-width="1.2"/>
  <text x="123" y="218" font-size="12" fill="#475569" font-family="Georgia,serif">60°</text>

  <!-- Étiquette des sommets -->
  <circle cx="90" cy="230" r="3" fill="#334155"/>
  <text x="74" y="240" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <circle cx="290" cy="230" r="3" fill="#334155"/>
  <text x="296" y="240" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>

  <circle cx="202" cy="36" r="3" fill="#334155"/>
  <text x="207" y="32" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <!-- Étiquettes des côtés -->
  <!-- AB = 5 : milieu de [AB] ≈ (190, 230), libellé en dessous -->
  <text x="183" y="252" font-size="13" fill="#334155" font-family="Georgia,serif">AB = 5</text>

  <!-- AC = 8 : milieu de [AC] ≈ (146, 133), libellé à gauche -->
  <text x="78" y="135" font-size="13" fill="#334155" font-family="Georgia,serif">AC = 8</text>

  <!-- BC : milieu ≈ (246, 133), libellé à droite -->
  <text x="252" y="135" font-size="13" fill="#334155" font-family="Georgia,serif">BC = ?</text>
</svg>
