<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Configuration géométrique avec trois points A, B, C et le projeté orthogonal H de B sur la droite AC">
  <!-- Origine SVG (60, 250), pas = 50 px = 1 unité. -->
  <!-- A(0,0)→(60,250) ; B(4,3)→(260,100) ; C(5,0)→(310,250) ; H(4,0)→(260,250) -->
  <!-- Grille légère -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="110" y1="20" x2="110" y2="295"/>
    <line x1="160" y1="20" x2="160" y2="295"/>
    <line x1="210" y1="20" x2="210" y2="295"/>
    <line x1="260" y1="20" x2="260" y2="295"/>
    <line x1="310" y1="20" x2="310" y2="295"/>
    <line x1="360" y1="20" x2="360" y2="295"/>

    <line x1="30" y1="50"  x2="380" y2="50"/>
    <line x1="30" y1="100" x2="380" y2="100"/>
    <line x1="30" y1="150" x2="380" y2="150"/>
    <line x1="30" y1="200" x2="380" y2="200"/>
  </g>

  <!-- Axe Ox -->
  <line x1="20" y1="250" x2="390" y2="250" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,250 384,247 384,253" fill="#334155"/>
  <text x="385" y="266" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="60" y1="305" x2="60" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="60,10 57,16 63,16" fill="#334155"/>
  <text x="45" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="110" y1="247" x2="110" y2="253"/><text x="110" y="266" text-anchor="middle">1</text>
    <line x1="160" y1="247" x2="160" y2="253"/><text x="160" y="266" text-anchor="middle">2</text>
    <line x1="210" y1="247" x2="210" y2="253"/><text x="210" y="266" text-anchor="middle">3</text>
    <line x1="260" y1="247" x2="260" y2="253"/><text x="260" y="266" text-anchor="middle">4</text>
    <line x1="310" y1="247" x2="310" y2="253"/><text x="310" y="266" text-anchor="middle">5</text>
    <line x1="360" y1="247" x2="360" y2="253"/><text x="360" y="266" text-anchor="middle">6</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="57" y1="50"  x2="63" y2="50"/><text x="54" y="54"  text-anchor="end">4</text>
    <line x1="57" y1="100" x2="63" y2="100"/><text x="54" y="104" text-anchor="end">3</text>
    <line x1="57" y1="150" x2="63" y2="150"/><text x="54" y="154" text-anchor="end">2</text>
    <line x1="57" y1="200" x2="63" y2="200"/><text x="54" y="204" text-anchor="end">1</text>
  </g>

  <text x="48" y="266" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Vecteur AC : de A(60,250) à C(310,250) — flèche -->
  <line x1="60" y1="250" x2="310" y2="250" stroke="#334155" stroke-width="1.8"/>
  <polygon points="310,250 302,246 302,254" fill="#334155"/>

  <!-- Vecteur AB : de A(60,250) à B(260,100) — flèche -->
  <line x1="60" y1="250" x2="260" y2="100" stroke="#334155" stroke-width="1.8"/>
  <polygon points="260,100 255,108 263,107" fill="#334155"/>

  <!-- Projection orthogonale de B sur (AC) : pointillés de B(260,100) à H(260,250) -->
  <line x1="260" y1="100" x2="260" y2="250" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Petit carré indiquant l'angle droit en H -->
  <polyline points="250,250 250,240 260,240" fill="none" stroke="#475569" stroke-width="1"/>

  <!-- Points -->
  <circle cx="60" cy="250" r="3.5" fill="#334155"/>
  <text x="45" y="245" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <circle cx="260" cy="100" r="3.5" fill="#334155"/>
  <text x="266" y="98" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>

  <circle cx="310" cy="250" r="3.5" fill="#334155"/>
  <text x="316" y="245" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <circle cx="260" cy="250" r="3.5" fill="#334155"/>
  <text x="254" y="278" font-size="14" font-style="italic" fill="#334155" font-family="Georgia,serif">H</text>
</svg>
