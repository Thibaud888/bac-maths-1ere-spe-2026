<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Quadrilatère ABCD tracé dans un repère orthonormé gradué, avec ses deux diagonales">
  <!-- Origine SVG (110, 280), pas = 35 px = 1 unité. x : de 0 à ~7, y : de 0 à ~7 -->
  <!-- Grille -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="145" y1="20" x2="145" y2="295"/>
    <line x1="180" y1="20" x2="180" y2="295"/>
    <line x1="215" y1="20" x2="215" y2="295"/>
    <line x1="250" y1="20" x2="250" y2="295"/>
    <line x1="285" y1="20" x2="285" y2="295"/>
    <line x1="320" y1="20" x2="320" y2="295"/>
    <line x1="355" y1="20" x2="355" y2="295"/>

    <line x1="30"  y1="20"  x2="380" y2="20"/>
    <line x1="30"  y1="55"  x2="380" y2="55"/>
    <line x1="30"  y1="90"  x2="380" y2="90"/>
    <line x1="30"  y1="125" x2="380" y2="125"/>
    <line x1="30"  y1="160" x2="380" y2="160"/>
    <line x1="30"  y1="195" x2="380" y2="195"/>
    <line x1="30"  y1="230" x2="380" y2="230"/>
    <line x1="30"  y1="265" x2="380" y2="265"/>
  </g>

  <!-- Axe Ox -->
  <line x1="80" y1="280" x2="390" y2="280" stroke="#334155" stroke-width="1.2"/>
  <polygon points="390,280 384,277 384,283" fill="#334155"/>
  <text x="385" y="295" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy -->
  <line x1="110" y1="305" x2="110" y2="10" stroke="#334155" stroke-width="1.2"/>
  <polygon points="110,10 107,16 113,16" fill="#334155"/>
  <text x="95" y="15" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="95" y="295" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- Graduations Ox -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="145" y1="277" x2="145" y2="283"/><text x="145" y="295" text-anchor="middle">1</text>
    <line x1="180" y1="277" x2="180" y2="283"/><text x="180" y="295" text-anchor="middle">2</text>
    <line x1="215" y1="277" x2="215" y2="283"/><text x="215" y="295" text-anchor="middle">3</text>
    <line x1="250" y1="277" x2="250" y2="283"/><text x="250" y="295" text-anchor="middle">4</text>
    <line x1="285" y1="277" x2="285" y2="283"/><text x="285" y="295" text-anchor="middle">5</text>
    <line x1="320" y1="277" x2="320" y2="283"/><text x="320" y="295" text-anchor="middle">6</text>
    <line x1="355" y1="277" x2="355" y2="283"/><text x="355" y="295" text-anchor="middle">7</text>
  </g>

  <!-- Graduations Oy -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="107" y1="20"  x2="113" y2="20"/><text x="104" y="24"  text-anchor="end">7</text>
    <line x1="107" y1="55"  x2="113" y2="55"/><text x="104" y="59"  text-anchor="end">6</text>
    <line x1="107" y1="90"  x2="113" y2="90"/><text x="104" y="94"  text-anchor="end">5</text>
    <line x1="107" y1="125" x2="113" y2="125"/><text x="104" y="129" text-anchor="end">4</text>
    <line x1="107" y1="160" x2="113" y2="160"/><text x="104" y="164" text-anchor="end">3</text>
    <line x1="107" y1="195" x2="113" y2="195"/><text x="104" y="199" text-anchor="end">2</text>
    <line x1="107" y1="230" x2="113" y2="230"/><text x="104" y="234" text-anchor="end">1</text>
  </g>

  <!-- A(0,0) -> (110, 280) ; B(3,1) -> (215, 245) ; C(4,4) -> (250, 140) ; D(1,3) -> (145, 175) -->
  <!-- Quadrilatère -->
  <polygon points="110,280 215,245 250,140 145,175" fill="none" stroke="#334155" stroke-width="1.8"/>

  <!-- Diagonales -->
  <line x1="110" y1="280" x2="250" y2="140" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="215" y1="245" x2="145" y2="175" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Sommets -->
  <circle cx="110" cy="280" r="3.5" fill="#334155"/>
  <text x="94" y="278" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">A</text>

  <circle cx="215" cy="245" r="3.5" fill="#334155"/>
  <text x="220" y="258" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">B</text>

  <circle cx="250" cy="140" r="3.5" fill="#334155"/>
  <text x="256" y="138" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">C</text>

  <circle cx="145" cy="175" r="3.5" fill="#334155"/>
  <text x="128" y="170" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">D</text>
</svg>
