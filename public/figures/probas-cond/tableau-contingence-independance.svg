<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Tableau de contingence à double entrée sur 200 personnes. Lignes : V (végétarien) et V barre. Colonnes : J (jeune) et J barre. Effectifs : V et J = 30 ; V et J barre = 30 ; V barre et J = 70 ; V barre et J barre = 70. Totaux ligne : 60 et 140. Totaux colonne : 100 et 100. Total général : 200.">
  <!-- Cadre extérieur -->
  <rect x="20" y="30" width="360" height="270" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- Titre -->
  <text x="200" y="20" text-anchor="middle" font-size="13" font-family="Georgia,serif" fill="#334155" font-style="italic">Répartition de 200 personnes</text>

  <!-- Coordonnées des colonnes : 20 | 110 | 200 | 290 | 380 (4 colonnes de 90 px) -->
  <!-- Lignes : 30 | 90 | 165 | 240 | 300 (4 lignes de 60/75/75/60 px) -->

  <!-- Lignes horizontales -->
  <line x1="20" y1="90"  x2="380" y2="90"  stroke="#334155" stroke-width="1.5"/>
  <line x1="20" y1="165" x2="380" y2="165" stroke="#475569" stroke-width="1"/>
  <line x1="20" y1="240" x2="380" y2="240" stroke="#334155" stroke-width="1.5"/>

  <!-- Lignes verticales -->
  <line x1="110" y1="30"  x2="110" y2="300" stroke="#334155" stroke-width="1.5"/>
  <line x1="200" y1="30"  x2="200" y2="300" stroke="#475569" stroke-width="1"/>
  <line x1="290" y1="30"  x2="290" y2="300" stroke="#334155" stroke-width="1.5"/>

  <!-- Cellule coin haut-gauche (vide ou diagonale) -->
  <line x1="20" y1="30" x2="110" y2="90" stroke="#94a3b8" stroke-width="1"/>

  <!-- En-têtes de colonnes (ligne 1, y=30 -> 90) -->
  <text x="155" y="67" text-anchor="middle" font-size="16" font-family="Georgia,serif" font-style="italic" fill="#334155">J</text>
  <text x="245" y="62" text-anchor="middle" font-size="16" font-family="Georgia,serif" font-style="italic" fill="#334155">J</text>
  <line x1="237" y1="49" x2="253" y2="49" stroke="#334155" stroke-width="1.2"/>
  <text x="335" y="67" text-anchor="middle" font-size="13" font-family="Georgia,serif" fill="#334155">Total</text>

  <!-- En-tête sous-titre colonnes (option : pas besoin) -->

  <!-- En-têtes de lignes (col 1, x=20 -> 110) -->
  <text x="65" y="132" text-anchor="middle" font-size="16" font-family="Georgia,serif" font-style="italic" fill="#334155">V</text>
  <text x="65" y="207" text-anchor="middle" font-size="16" font-family="Georgia,serif" font-style="italic" fill="#334155">V</text>
  <line x1="57" y1="194" x2="73" y2="194" stroke="#334155" stroke-width="1.2"/>
  <text x="65" y="275" text-anchor="middle" font-size="13" font-family="Georgia,serif" fill="#334155">Total</text>

  <!-- Cellules effectifs (ligne V) -->
  <text x="155" y="132" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#334155">30</text>
  <text x="245" y="132" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#334155">30</text>
  <text x="335" y="132" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#475569" font-weight="bold">60</text>

  <!-- Cellules effectifs (ligne V barre) -->
  <text x="155" y="207" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#334155">70</text>
  <text x="245" y="207" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#334155">70</text>
  <text x="335" y="207" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#475569" font-weight="bold">140</text>

  <!-- Cellules totaux (ligne Total) -->
  <text x="155" y="275" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#475569" font-weight="bold">100</text>
  <text x="245" y="275" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#475569" font-weight="bold">100</text>
  <text x="335" y="275" text-anchor="middle" font-size="15" font-family="Georgia,serif" fill="#334155" font-weight="bold">200</text>
</svg>
