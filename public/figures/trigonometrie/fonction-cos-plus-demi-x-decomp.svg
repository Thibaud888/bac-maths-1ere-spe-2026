<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Decomposition graphique : la courbe de la fonction cosinus en pointilles et la droite d'equation y = x sur 2 en tirets longs, sur l'intervalle de 0 a 2 pi. Ces deux fonctions sont les deux composantes de f(x) = cos(x) + x/2">
  <!-- Échelles : x_math = 0 → 60, 2π → 350 ; 1 unité math x = 46.15 px
       y_math = 0 → 160, 1 → 120, -1 → 200 ; 1 unité y = 40 px -->

  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="132.5" y1="40" x2="132.5" y2="280"/>
    <line x1="205"   y1="40" x2="205"   y2="280"/>
    <line x1="277.5" y1="40" x2="277.5" y2="280"/>
    <line x1="350"   y1="40" x2="350"   y2="280"/>
    <line x1="50" y1="80"  x2="360" y2="80"/>
    <line x1="50" y1="120" x2="360" y2="120"/>
    <line x1="50" y1="200" x2="360" y2="200"/>
    <line x1="50" y1="240" x2="360" y2="240"/>
  </g>

  <!-- ── Axes ── -->
  <line x1="40" y1="160" x2="375" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="375,160 369,157 369,163" fill="#334155"/>
  <text x="373" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="60" y1="305" x2="60" y2="25" stroke="#334155" stroke-width="1.2"/>
  <polygon points="60,25 57,31 63,31" fill="#334155"/>
  <text x="45" y="30" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="48" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" font-style="italic" fill="#475569" font-family="Georgia,serif">
    <line x1="132.5" y1="157" x2="132.5" y2="163"/>
    <text x="132.5" y="175" text-anchor="middle">π/2</text>
    <line x1="205"   y1="157" x2="205"   y2="163"/>
    <text x="205"   y="175" text-anchor="middle">π</text>
    <line x1="277.5" y1="157" x2="277.5" y2="163"/>
    <text x="277.5" y="175" text-anchor="middle">3π/2</text>
    <line x1="350"   y1="157" x2="350"   y2="163"/>
    <text x="350"   y="175" text-anchor="middle">2π</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="57" y1="80"  x2="63" y2="80"/>
    <text x="52" y="84"  text-anchor="end">2</text>
    <line x1="57" y1="120" x2="63" y2="120"/>
    <text x="52" y="124" text-anchor="end">1</text>
    <line x1="57" y1="200" x2="63" y2="200"/>
    <text x="52" y="204" text-anchor="end">-1</text>
  </g>

  <!-- ── Courbe y = cos(x) en pointillés (gris) ── -->
  <polyline fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="3,3"
    points="60,120 84.17,125.36 108.33,140 132.5,160 156.66,180 180.83,194.64 205,200 229.17,194.64 253.33,180 277.5,160 301.66,140 325.83,125.36 350,120"/>

  <!-- ── Droite y = x/2 en tirets longs ── -->
  <!-- De (0, 0) px = (60, 160) à (2π, π) px = (350, 34.34) -->
  <line x1="60" y1="160" x2="350" y2="34.34" stroke="#475569" stroke-width="1.4" stroke-dasharray="6,3"/>

  <!-- ── Étiquettes des deux fonctions ── -->
  <text x="135" y="115" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">y = cos(x)</text>
  <text x="300" y="78" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">y = x/2</text>

  <!-- ── Légende ── -->
  <text x="200" y="305" font-size="11" fill="#475569" font-family="Georgia,serif" text-anchor="middle">f(x) = cos(x) + x/2 est la somme de ces deux fonctions</text>
</svg>
