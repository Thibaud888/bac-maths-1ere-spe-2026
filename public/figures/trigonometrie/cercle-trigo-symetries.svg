<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle trigonométrique illustrant les symétries entre les points repérés par les angles theta, -theta, pi-theta et pi+theta">
  <!-- Centre (200,160), rayon 120 ; θ = π/4 pour la figure -->
  <!-- M(θ) = (200 + 120·√2/2, 160 - 120·√2/2) ≈ (285, 75)
       M(-θ) = (285, 245)
       M(π-θ) = (115, 75)
       M(π+θ) = (115, 245) -->

  <!-- ── Axes ── -->
  <line x1="40" y1="160" x2="370" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="370,160 364,157 364,163" fill="#334155"/>
  <text x="368" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="305" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="186" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Cercle ── -->
  <circle cx="200" cy="160" r="120" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Rayons vers les 4 points ── -->
  <g stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2">
    <line x1="200" y1="160" x2="285" y2="75"/>
    <line x1="200" y1="160" x2="285" y2="245"/>
    <line x1="200" y1="160" x2="115" y2="75"/>
    <line x1="200" y1="160" x2="115" y2="245"/>
  </g>

  <!-- ── Points ── -->
  <g fill="#334155">
    <circle cx="285" cy="75"  r="3.5"/>
    <circle cx="285" cy="245" r="3.5"/>
    <circle cx="115" cy="75"  r="3.5"/>
    <circle cx="115" cy="245" r="3.5"/>
  </g>

  <!-- ── Étiquettes ── -->
  <g font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">
    <text x="293" y="70">M(θ)</text>
    <text x="293" y="255">M(-θ)</text>
    <text x="78"  y="70">M(π-θ)</text>
    <text x="78"  y="255">M(π+θ)</text>
  </g>

  <!-- ── Légende des symétries ── -->
  <text x="200" y="305" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Symétries : cos(-θ) = cos(θ),  sin(-θ) = -sin(θ),  cos(π-θ) = -cos(θ),  sin(π-θ) = sin(θ)</text>
</svg>
