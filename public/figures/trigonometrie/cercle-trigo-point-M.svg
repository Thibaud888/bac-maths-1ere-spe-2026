<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle trigonométrique avec un point M placé à un angle de mesure 2pi/3, montrant les projections cos(2pi/3) = -1/2 sur l'axe Ox et sin(2pi/3) = racine de 3 sur 2 sur l'axe Oy">
  <!-- Centre du cercle (200,160), rayon 120 -->

  <!-- ── Axes ── -->
  <line x1="40" y1="160" x2="370" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="370,160 364,157 364,163" fill="#334155"/>
  <text x="368" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="200" y1="305" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="186" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations 1 et -1 ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="320" y1="157" x2="320" y2="163"/>
    <text x="320" y="175" text-anchor="middle">1</text>
    <line x1="80"  y1="157" x2="80"  y2="163"/>
    <text x="80"  y="175" text-anchor="middle">-1</text>
    <line x1="197" y1="40"  x2="203" y2="40"/>
    <text x="192" y="44"  text-anchor="end">1</text>
    <line x1="197" y1="280" x2="203" y2="280"/>
    <text x="192" y="284" text-anchor="end">-1</text>
  </g>

  <!-- ── Cercle unité ── -->
  <circle cx="200" cy="160" r="120" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Rayon OM ── -->
  <line x1="200" y1="160" x2="140" y2="56" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Projections en pointillés ── -->
  <line x1="140" y1="56" x2="140" y2="160" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="140" y1="56" x2="200" y2="56"  stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- ── Arc de l'angle (de Ox à OM) ── -->
  <!-- arc de rayon 28, de 0 à 2pi/3 (sens trigo) : début (228,160), fin (200 + 28*cos(2pi/3), 160 - 28*sin(2pi/3)) = (186, 136) -->
  <path d="M 228,160 A 28,28 0 0,0 186,136" fill="none" stroke="#475569" stroke-width="1.2"/>
  <text x="220" y="148" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">θ</text>

  <!-- ── Point M ── -->
  <circle cx="140" cy="56" r="4" fill="#334155"/>
  <text x="118" y="50" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">M(θ)</text>

  <!-- ── Étiquettes des projections ── -->
  <!-- Projection sur Ox : point (140, 160), étiquette cos θ -->
  <circle cx="140" cy="160" r="3" fill="#334155"/>
  <text x="140" y="180" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif" text-anchor="middle">cos θ</text>

  <!-- Projection sur Oy : point (200, 56), étiquette sin θ -->
  <circle cx="200" cy="56" r="3" fill="#334155"/>
  <text x="208" y="60" font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">sin θ</text>

  <!-- ── Note en bas ── -->
  <text x="200" y="305" font-size="10" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Le point M est repéré par l'angle θ : son abscisse est cos θ, son ordonnée est sin θ.</text>
</svg>
