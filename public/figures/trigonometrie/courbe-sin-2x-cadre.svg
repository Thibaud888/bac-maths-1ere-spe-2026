<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cadre vide pour l'etude de la fonction f(x) = sin(2x) sur l'intervalle de 0 a pi sur 2, avec graduations en x egales a 0, pi sur 8, pi sur 4, 3 pi sur 8, pi sur 2 et en y egales a -1 et 1">
  <!-- Échelles : x_math = 0 → 70, π/2 → 350 ; y_math = 0 → 160, 1 → 60, -1 → 260 -->

  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <line x1="140" y1="40" x2="140" y2="280"/>
    <line x1="210" y1="40" x2="210" y2="280"/>
    <line x1="280" y1="40" x2="280" y2="280"/>
    <line x1="350" y1="40" x2="350" y2="280"/>
    <line x1="60" y1="60"  x2="360" y2="60"/>
    <line x1="60" y1="110" x2="360" y2="110"/>
    <line x1="60" y1="210" x2="360" y2="210"/>
    <line x1="60" y1="260" x2="360" y2="260"/>
  </g>

  <!-- ── Axes ── -->
  <line x1="50" y1="160" x2="375" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="375,160 369,157 369,163" fill="#334155"/>
  <text x="373" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <line x1="70" y1="305" x2="70" y2="25" stroke="#334155" stroke-width="1.2"/>
  <polygon points="70,25 67,31 73,31" fill="#334155"/>
  <text x="55" y="30" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="58" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" font-style="italic" fill="#475569" font-family="Georgia,serif">
    <line x1="140" y1="157" x2="140" y2="163"/>
    <text x="140" y="175" text-anchor="middle">π/8</text>
    <line x1="210" y1="157" x2="210" y2="163"/>
    <text x="210" y="175" text-anchor="middle">π/4</text>
    <line x1="280" y1="157" x2="280" y2="163"/>
    <text x="280" y="175" text-anchor="middle">3π/8</text>
    <line x1="350" y1="157" x2="350" y2="163"/>
    <text x="350" y="175" text-anchor="middle">π/2</text>
  </g>

  <!-- ── Graduations Oy ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="67" y1="60"  x2="73" y2="60"/>
    <text x="62" y="64"  text-anchor="end">1</text>
    <line x1="67" y1="260" x2="73" y2="260"/>
    <text x="62" y="264" text-anchor="end">-1</text>
  </g>

  <!-- ── Légende ── -->
  <text x="200" y="305" font-size="11" fill="#475569" font-family="Georgia,serif" text-anchor="middle">Repère pour l'étude de f(x) = sin(2x) sur [0 ; π/2]</text>
</svg>
