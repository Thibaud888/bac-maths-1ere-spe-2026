<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Courbe représentative de la fonction sinus y = sin(x) sur l'intervalle de -pi à 2pi, montrant la périodicité 2pi et les valeurs particulières">
  <!-- Échelles : 1 unité x_math = π corresponds à 100 px ; x_math = -π → 50, 2π → 350.
       1 unité y_math = 1 → 80 px ; y_math = 0 → 160, y_math = 1 → 80, y_math = -1 → 240 -->

  <!-- ── Grille légère ── -->
  <g stroke="#e2e8f0" stroke-width="0.5">
    <!-- verticales (multiples de π/2 → tous les 50 px à partir de 50) -->
    <line x1="50"  y1="40" x2="50"  y2="280"/>
    <line x1="100" y1="40" x2="100" y2="280"/>
    <line x1="150" y1="40" x2="150" y2="280"/>
    <line x1="200" y1="40" x2="200" y2="280"/>
    <line x1="250" y1="40" x2="250" y2="280"/>
    <line x1="300" y1="40" x2="300" y2="280"/>
    <line x1="350" y1="40" x2="350" y2="280"/>
    <!-- horizontales (y = 1, 0.5, -0.5, -1) -->
    <line x1="40" y1="80"  x2="360" y2="80"/>
    <line x1="40" y1="120" x2="360" y2="120"/>
    <line x1="40" y1="200" x2="360" y2="200"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
  </g>

  <!-- ── Axes ── -->
  <!-- Ox (y_math = 0 → y_svg = 160) -->
  <line x1="30" y1="160" x2="375" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="375,160 369,157 369,163" fill="#334155"/>
  <text x="373" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Oy (x_math = 0 → x_svg = 150) -->
  <line x1="150" y1="305" x2="150" y2="25" stroke="#334155" stroke-width="1.2"/>
  <polygon points="150,25 147,31 153,31" fill="#334155"/>
  <text x="135" y="30" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <text x="138" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Graduations Ox ── -->
  <g stroke="#334155" stroke-width="1" font-size="11" font-style="italic" fill="#475569" font-family="Georgia,serif">
    <line x1="50"  y1="157" x2="50"  y2="163"/>
    <text x="50"  y="175" text-anchor="middle">-π</text>
    <line x1="100" y1="157" x2="100" y2="163"/>
    <text x="100" y="175" text-anchor="middle">-π/2</text>
    <line x1="200" y1="157" x2="200" y2="163"/>
    <text x="200" y="175" text-anchor="middle">π/2</text>
    <line x1="250" y1="157" x2="250" y2="163"/>
    <text x="250" y="175" text-anchor="middle">π</text>
    <line x1="300" y1="157" x2="300" y2="163"/>
    <text x="300" y="175" text-anchor="middle">3π/2</text>
    <line x1="350" y1="157" x2="350" y2="163"/>
    <text x="350" y="175" text-anchor="middle">2π</text>
  </g>

  <!-- ── Graduations Oy (1 et -1) ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="147" y1="80"  x2="153" y2="80"/>
    <text x="142" y="84"  text-anchor="end">1</text>
    <line x1="147" y1="240" x2="153" y2="240"/>
    <text x="142" y="244" text-anchor="end">-1</text>
  </g>

  <!-- ── Courbe y = sin(x) sur [-π ; 2π], pas π/12 ── -->
  <polyline fill="none" stroke="#334155" stroke-width="1.8"
    points="50,160 58.33,180.71 66.67,200 75,216.57 83.33,229.28 91.67,237.27 100,240 108.33,237.27 116.67,229.28 125,216.57 133.33,200 141.67,180.71 150,160 158.33,139.29 166.67,120 175,103.43 183.33,90.72 191.67,82.73 200,80 208.33,82.73 216.67,90.72 225,103.43 233.33,120 241.67,139.29 250,160 258.33,180.71 266.67,200 275,216.57 283.33,229.28 291.67,237.27 300,240 308.33,237.27 316.67,229.28 325,216.57 333.33,200 341.67,180.71 350,160"/>

  <!-- ── Points remarquables : maxima et minima ── -->
  <circle cx="200" cy="80" r="3" fill="#334155"/>
  <text x="205" y="76" font-size="10" font-style="italic" fill="#334155" font-family="Georgia,serif">max (π/2 ; 1)</text>

  <circle cx="100" cy="240" r="3" fill="#334155"/>
  <text x="50" y="258" font-size="10" font-style="italic" fill="#334155" font-family="Georgia,serif">min (-π/2 ; -1)</text>

  <circle cx="300" cy="240" r="3" fill="#334155"/>
  <text x="295" y="258" font-size="10" font-style="italic" fill="#334155" font-family="Georgia,serif">min (3π/2 ; -1)</text>

  <!-- ── Légende ── -->
  <text x="345" y="60" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif" text-anchor="end">y = sin(x)</text>
</svg>
