<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Quatre courbes sinusoidales numerotees C1, C2, C3, C4 disposees en grille deux fois deux. Chaque vignette comporte un axe horizontal des x avec graduations en pi sur 2, pi, 3pi sur 2, 2pi et un axe vertical avec graduations -2, -1, 1, 2. C1 (haut gauche) part de y=1 en x=0, descend a 0 en pi sur 2, -1 en pi, 0 en 3pi sur 2, 1 en 2pi. C2 (haut droite) part de 0 en x=0, monte a 1 en pi sur 2, redescend a 0 en pi, -1 en 3pi sur 2, 0 en 2pi. C3 (bas gauche) part de 0 en x=0, descend a -1 en pi sur 2, -2 en pi, -1 en 3pi sur 2, 0 en 2pi (entierement sous l axe). C4 (bas droite) part de 0 en x=0, descend a -1 en pi sur 2, remonte a 0 en pi, atteint 1 en 3pi sur 2, redescend a 0 en 2pi.">
  <!-- ============================================================ -->
  <!-- Échelles communes :                                          -->
  <!--   horizontal : 2π → 160 px (10 px par π/8)                   -->
  <!--   vertical   : 1 unité → 25 px                                -->
  <!-- Disposition 2×2 :                                             -->
  <!--   C1 origine (20,  80)   |   C2 origine (220,  80)            -->
  <!--   C3 origine (20, 240)   |   C4 origine (220, 240)            -->
  <!-- ============================================================ -->

  <!-- ============= C1 : haut-gauche ============================ -->
  <g>
    <!-- grille -->
    <g stroke="#e2e8f0" stroke-width="0.5">
      <line x1="60"  y1="30"  x2="60"  y2="130"/>
      <line x1="100" y1="30"  x2="100" y2="130"/>
      <line x1="140" y1="30"  x2="140" y2="130"/>
      <line x1="180" y1="30"  x2="180" y2="130"/>
      <line x1="20"  y1="55"  x2="180" y2="55"/>
      <line x1="20"  y1="105" x2="180" y2="105"/>
    </g>
    <!-- axe Ox -->
    <line x1="15" y1="80" x2="190" y2="80" stroke="#334155" stroke-width="1.1"/>
    <polygon points="190,80 185,77.5 185,82.5" fill="#334155"/>
    <!-- axe Oy -->
    <line x1="20" y1="145" x2="20" y2="25" stroke="#334155" stroke-width="1.1"/>
    <polygon points="20,25 17.5,30 22.5,30" fill="#334155"/>
    <text x="11" y="83" font-size="9" fill="#475569" font-family="Georgia,serif">O</text>
    <!-- graduations Ox -->
    <g stroke="#334155" stroke-width="0.9" font-size="8" font-style="italic" fill="#475569" font-family="Georgia,serif">
      <line x1="60"  y1="78" x2="60"  y2="82"/>
      <text x="60"  y="92" text-anchor="middle">π/2</text>
      <line x1="100" y1="78" x2="100" y2="82"/>
      <text x="100" y="92" text-anchor="middle">π</text>
      <line x1="140" y1="78" x2="140" y2="82"/>
      <text x="140" y="92" text-anchor="middle">3π/2</text>
      <line x1="180" y1="78" x2="180" y2="82"/>
      <text x="180" y="92" text-anchor="middle">2π</text>
    </g>
    <!-- graduations Oy -->
    <g stroke="#334155" stroke-width="0.9" font-size="8" fill="#475569" font-family="Georgia,serif">
      <line x1="18" y1="55"  x2="22" y2="55"/>
      <text x="15" y="58" text-anchor="end">1</text>
      <line x1="18" y1="105" x2="22" y2="105"/>
      <text x="15" y="108" text-anchor="end">-1</text>
    </g>
    <!-- courbe cos(x) -->
    <polyline fill="none" stroke="#334155" stroke-width="1.6"
      points="20,55 30,56.9 40,62.32 50,70.43 60,80 70,89.57 80,97.68 90,103.1 100,105 110,103.1 120,97.68 130,89.57 140,80 150,70.43 160,62.32 170,56.9 180,55"/>
    <!-- numéro de vignette -->
    <text x="28" y="42" font-size="13" font-weight="bold" fill="#334155" font-family="Georgia,serif">C₁</text>
  </g>

  <!-- ============= C2 : haut-droite ============================ -->
  <g>
    <g stroke="#e2e8f0" stroke-width="0.5">
      <line x1="260" y1="30"  x2="260" y2="130"/>
      <line x1="300" y1="30"  x2="300" y2="130"/>
      <line x1="340" y1="30"  x2="340" y2="130"/>
      <line x1="380" y1="30"  x2="380" y2="130"/>
      <line x1="220" y1="55"  x2="380" y2="55"/>
      <line x1="220" y1="105" x2="380" y2="105"/>
    </g>
    <line x1="215" y1="80" x2="390" y2="80" stroke="#334155" stroke-width="1.1"/>
    <polygon points="390,80 385,77.5 385,82.5" fill="#334155"/>
    <line x1="220" y1="145" x2="220" y2="25" stroke="#334155" stroke-width="1.1"/>
    <polygon points="220,25 217.5,30 222.5,30" fill="#334155"/>
    <text x="211" y="83" font-size="9" fill="#475569" font-family="Georgia,serif">O</text>
    <g stroke="#334155" stroke-width="0.9" font-size="8" font-style="italic" fill="#475569" font-family="Georgia,serif">
      <line x1="260" y1="78" x2="260" y2="82"/>
      <text x="260" y="92" text-anchor="middle">π/2</text>
      <line x1="300" y1="78" x2="300" y2="82"/>
      <text x="300" y="92" text-anchor="middle">π</text>
      <line x1="340" y1="78" x2="340" y2="82"/>
      <text x="340" y="92" text-anchor="middle">3π/2</text>
      <line x1="380" y1="78" x2="380" y2="82"/>
      <text x="380" y="92" text-anchor="middle">2π</text>
    </g>
    <g stroke="#334155" stroke-width="0.9" font-size="8" fill="#475569" font-family="Georgia,serif">
      <line x1="218" y1="55"  x2="222" y2="55"/>
      <text x="215" y="58" text-anchor="end">1</text>
      <line x1="218" y1="105" x2="222" y2="105"/>
      <text x="215" y="108" text-anchor="end">-1</text>
    </g>
    <!-- courbe sin(x) -->
    <polyline fill="none" stroke="#334155" stroke-width="1.6"
      points="220,80 230,70.43 240,62.32 250,56.9 260,55 270,56.9 280,62.32 290,70.43 300,80 310,89.57 320,97.68 330,103.1 340,105 350,103.1 360,97.68 370,89.57 380,80"/>
    <text x="228" y="42" font-size="13" font-weight="bold" fill="#334155" font-family="Georgia,serif">C₂</text>
  </g>

  <!-- ============= C3 : bas-gauche ============================= -->
  <g>
    <g stroke="#e2e8f0" stroke-width="0.5">
      <line x1="60"  y1="190" x2="60"  y2="290"/>
      <line x1="100" y1="190" x2="100" y2="290"/>
      <line x1="140" y1="190" x2="140" y2="290"/>
      <line x1="180" y1="190" x2="180" y2="290"/>
      <line x1="20"  y1="215" x2="180" y2="215"/>
      <line x1="20"  y1="265" x2="180" y2="265"/>
      <line x1="20"  y1="290" x2="180" y2="290"/>
    </g>
    <line x1="15" y1="240" x2="190" y2="240" stroke="#334155" stroke-width="1.1"/>
    <polygon points="190,240 185,237.5 185,242.5" fill="#334155"/>
    <line x1="20" y1="305" x2="20" y2="185" stroke="#334155" stroke-width="1.1"/>
    <polygon points="20,185 17.5,190 22.5,190" fill="#334155"/>
    <text x="11" y="243" font-size="9" fill="#475569" font-family="Georgia,serif">O</text>
    <g stroke="#334155" stroke-width="0.9" font-size="8" font-style="italic" fill="#475569" font-family="Georgia,serif">
      <line x1="60"  y1="238" x2="60"  y2="242"/>
      <text x="60"  y="252" text-anchor="middle">π/2</text>
      <line x1="100" y1="238" x2="100" y2="242"/>
      <text x="100" y="252" text-anchor="middle">π</text>
      <line x1="140" y1="238" x2="140" y2="242"/>
      <text x="140" y="252" text-anchor="middle">3π/2</text>
      <line x1="180" y1="238" x2="180" y2="242"/>
      <text x="180" y="252" text-anchor="middle">2π</text>
    </g>
    <g stroke="#334155" stroke-width="0.9" font-size="8" fill="#475569" font-family="Georgia,serif">
      <line x1="18" y1="215" x2="22" y2="215"/>
      <text x="15" y="218" text-anchor="end">1</text>
      <line x1="18" y1="265" x2="22" y2="265"/>
      <text x="15" y="268" text-anchor="end">-1</text>
      <line x1="18" y1="290" x2="22" y2="290"/>
      <text x="15" y="293" text-anchor="end">-2</text>
    </g>
    <!-- courbe cos(x) - 1 -->
    <polyline fill="none" stroke="#334155" stroke-width="1.6"
      points="20,240 30,241.9 40,247.32 50,255.43 60,265 70,274.57 80,282.68 90,288.1 100,290 110,288.1 120,282.68 130,274.57 140,265 150,255.43 160,247.32 170,241.9 180,240"/>
    <text x="28" y="202" font-size="13" font-weight="bold" fill="#334155" font-family="Georgia,serif">C₃</text>
  </g>

  <!-- ============= C4 : bas-droite ============================= -->
  <g>
    <g stroke="#e2e8f0" stroke-width="0.5">
      <line x1="260" y1="190" x2="260" y2="290"/>
      <line x1="300" y1="190" x2="300" y2="290"/>
      <line x1="340" y1="190" x2="340" y2="290"/>
      <line x1="380" y1="190" x2="380" y2="290"/>
      <line x1="220" y1="215" x2="380" y2="215"/>
      <line x1="220" y1="265" x2="380" y2="265"/>
    </g>
    <line x1="215" y1="240" x2="390" y2="240" stroke="#334155" stroke-width="1.1"/>
    <polygon points="390,240 385,237.5 385,242.5" fill="#334155"/>
    <line x1="220" y1="305" x2="220" y2="185" stroke="#334155" stroke-width="1.1"/>
    <polygon points="220,185 217.5,190 222.5,190" fill="#334155"/>
    <text x="211" y="243" font-size="9" fill="#475569" font-family="Georgia,serif">O</text>
    <g stroke="#334155" stroke-width="0.9" font-size="8" font-style="italic" fill="#475569" font-family="Georgia,serif">
      <line x1="260" y1="238" x2="260" y2="242"/>
      <text x="260" y="252" text-anchor="middle">π/2</text>
      <line x1="300" y1="238" x2="300" y2="242"/>
      <text x="300" y="252" text-anchor="middle">π</text>
      <line x1="340" y1="238" x2="340" y2="242"/>
      <text x="340" y="252" text-anchor="middle">3π/2</text>
      <line x1="380" y1="238" x2="380" y2="242"/>
      <text x="380" y="252" text-anchor="middle">2π</text>
    </g>
    <g stroke="#334155" stroke-width="0.9" font-size="8" fill="#475569" font-family="Georgia,serif">
      <line x1="218" y1="215" x2="222" y2="215"/>
      <text x="215" y="218" text-anchor="end">1</text>
      <line x1="218" y1="265" x2="222" y2="265"/>
      <text x="215" y="268" text-anchor="end">-1</text>
    </g>
    <!-- courbe -sin(x) -->
    <polyline fill="none" stroke="#334155" stroke-width="1.6"
      points="220,240 230,249.57 240,257.68 250,263.1 260,265 270,263.1 280,257.68 290,249.57 300,240 310,230.43 320,222.32 330,216.9 340,215 350,216.9 360,222.32 370,230.43 380,240"/>
    <text x="228" y="202" font-size="13" font-weight="bold" fill="#334155" font-family="Georgia,serif">C₄</text>
  </g>
</svg>
