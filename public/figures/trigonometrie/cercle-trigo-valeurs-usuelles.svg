<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Cercle trigonométrique unité avec les valeurs usuelles d'angles entre 0 et pi : 0, pi/6, pi/4, pi/3, pi/2, 2pi/3, 3pi/4, 5pi/6, pi">
  <!-- Centre du cercle (200,160), rayon 120 -->

  <!-- ── Axes ── -->
  <!-- Axe Ox (y_math=0 -> y_svg=160) -->
  <line x1="40" y1="160" x2="370" y2="160" stroke="#334155" stroke-width="1.2"/>
  <polygon points="370,160 364,157 364,163" fill="#334155"/>
  <text x="368" y="175" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>

  <!-- Axe Oy (x_math=0 -> x_svg=200) -->
  <line x1="200" y1="305" x2="200" y2="20" stroke="#334155" stroke-width="1.2"/>
  <polygon points="200,20 197,26 203,26" fill="#334155"/>
  <text x="185" y="25" font-size="12" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Origine -->
  <text x="186" y="175" font-size="11" fill="#475569" font-family="Georgia,serif">O</text>

  <!-- ── Cercle unité ── -->
  <circle cx="200" cy="160" r="120" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- ── Graduations 1 et -1 sur les axes ── -->
  <g stroke="#334155" stroke-width="1" font-size="10" fill="#475569" font-family="Georgia,serif">
    <line x1="320" y1="157" x2="320" y2="163"/>
    <text x="320" y="175" text-anchor="middle">1</text>
    <line x1="80"  y1="157" x2="80"  y2="163"/>
    <text x="80"  y="175" text-anchor="middle">-1</text>
    <line x1="197" y1="40"  x2="203" y2="40"/>
    <text x="192" y="44"  text-anchor="end">1</text>
    <line x1="197" y1="280" x2="203" y2="280"/>
    <text x="192" y="284" text-anchor="end">-1</text>
  </g>

  <!-- ── Points usuels avec rayons en pointillés ── -->
  <g stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3,2">
    <line x1="200" y1="160" x2="304" y2="100"/>
    <line x1="200" y1="160" x2="285" y2="75"/>
    <line x1="200" y1="160" x2="260" y2="56"/>
    <line x1="200" y1="160" x2="200" y2="40"/>
    <line x1="200" y1="160" x2="140" y2="56"/>
    <line x1="200" y1="160" x2="115" y2="75"/>
    <line x1="200" y1="160" x2="96"  y2="100"/>
  </g>

  <!-- ── Points sur le cercle ── -->
  <g fill="#334155">
    <circle cx="320" cy="160" r="3"/>
    <circle cx="304" cy="100" r="3"/>
    <circle cx="285" cy="75"  r="3"/>
    <circle cx="260" cy="56"  r="3"/>
    <circle cx="200" cy="40"  r="3"/>
    <circle cx="140" cy="56"  r="3"/>
    <circle cx="115" cy="75"  r="3"/>
    <circle cx="96"  cy="100" r="3"/>
    <circle cx="80"  cy="160" r="3"/>
  </g>

  <!-- ── Étiquettes d'angles ── -->
  <g font-size="11" font-style="italic" fill="#334155" font-family="Georgia,serif">
    <text x="328" y="158" text-anchor="start">0</text>
    <text x="312" y="95"  text-anchor="start">π/6</text>
    <text x="293" y="68"  text-anchor="start">π/4</text>
    <text x="266" y="50"  text-anchor="start">π/3</text>
    <text x="208" y="34"  text-anchor="start">π/2</text>
    <text x="132" y="50"  text-anchor="end">2π/3</text>
    <text x="107" y="68"  text-anchor="end">3π/4</text>
    <text x="88"  y="95"  text-anchor="end">5π/6</text>
    <text x="72"  y="158" text-anchor="end">π</text>
  </g>

  <!-- ── Coordonnées-clés (π/3 et π/4) en bas ── -->
  <g font-size="10" fill="#475569" font-family="Georgia,serif">
    <text x="200" y="300" text-anchor="middle">cos(π/3) = 1/2 ;  sin(π/3) = √3/2     cos(π/4) = sin(π/4) = √2/2     cos(π/6) = √3/2 ;  sin(π/6) = 1/2</text>
  </g>
</svg>
