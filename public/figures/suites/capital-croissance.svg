<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 210" width="270" height="210" role="img" aria-label="Représentation discrète du capital C_n = 1000 × 1,05^n pour n de 0 à 4">
  <!-- ── Axes ── -->
  <!-- x-axis -->
  <line x1="45" y1="168" x2="255" y2="168" stroke="#334155" stroke-width="1.5"/>
  <!-- y-axis -->
  <line x1="45" y1="168" x2="45" y2="18" stroke="#334155" stroke-width="1.5"/>
  <!-- x-axis arrow -->
  <polygon points="255,164 263,168 255,172" fill="#334155"/>
  <!-- y-axis arrow -->
  <polygon points="41,18 45,10 49,18" fill="#334155"/>

  <!-- ── Axis labels ── -->
  <text x="260" y="172" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">n</text>
  <text x="32"  y="13"  font-size="12" fill="#334155" font-family="Georgia,serif">C_n</text>

  <!-- ── x-axis ticks and labels ── -->
  <!-- n = 0 to 4, spacing = 40px, starting at x=85 -->
  <line x1="85"  y1="165" x2="85"  y2="171" stroke="#334155" stroke-width="1"/>
  <line x1="125" y1="165" x2="125" y2="171" stroke="#334155" stroke-width="1"/>
  <line x1="165" y1="165" x2="165" y2="171" stroke="#334155" stroke-width="1"/>
  <line x1="205" y1="165" x2="205" y2="171" stroke="#334155" stroke-width="1"/>
  <line x1="245" y1="165" x2="245" y2="171" stroke="#334155" stroke-width="1"/>
  <text x="85"  y="182" text-anchor="middle" font-size="12" fill="#475569" font-family="Georgia,serif">0</text>
  <text x="125" y="182" text-anchor="middle" font-size="12" fill="#475569" font-family="Georgia,serif">1</text>
  <text x="165" y="182" text-anchor="middle" font-size="12" fill="#475569" font-family="Georgia,serif">2</text>
  <text x="205" y="182" text-anchor="middle" font-size="12" fill="#475569" font-family="Georgia,serif">3</text>
  <text x="245" y="182" text-anchor="middle" font-size="12" fill="#475569" font-family="Georgia,serif">4</text>

  <!-- ── y-axis reference lines and labels ── -->
  <!-- Scale: y-range 950 to 1250, chart-height = 140px
       py = 168 - (C_n - 950) / 300 * 140 -->
  <!-- 1000 → py = 168 - (1000-950)/300*140 = 168 - 23.3 ≈ 145 -->
  <!-- 1100 → py = 168 - (1100-950)/300*140 = 168 - 70 = 98 -->
  <!-- 1200 → py = 168 - (1200-950)/300*140 = 168 - 116.7 ≈ 51 -->
  <line x1="42" y1="145" x2="48" y2="145" stroke="#94a3b8" stroke-width="1"/>
  <line x1="42" y1="98"  x2="48" y2="98"  stroke="#94a3b8" stroke-width="1"/>
  <line x1="42" y1="51"  x2="48" y2="51"  stroke="#94a3b8" stroke-width="1"/>
  <line x1="45" y1="145" x2="255" y2="145" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="45" y1="98"  x2="255" y2="98"  stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="148" text-anchor="end" font-size="10" fill="#475569" font-family="Georgia,serif">1000</text>
  <text x="40" y="101" text-anchor="end" font-size="10" fill="#475569" font-family="Georgia,serif">1100</text>
  <text x="40" y="54"  text-anchor="end" font-size="10" fill="#475569" font-family="Georgia,serif">1200</text>

  <!-- ── Data points ──
    C_0 = 1000  → (85,  145)
    C_1 = 1050  → (125, 122)   (1050-950)/300*140 = 46.7 → 168-47=121
    C_2 = 1102.5→ (165, 98)    (1102.5-950)/300*140 = 71.2 → 168-71=97
    C_3 = 1157.6→ (205, 72)    (1157.6-950)/300*140 = 96.9 → 168-97=71
    C_4 = 1215.5→ (245, 45)    (1215.5-950)/300*140 = 123.9→ 168-124=44
  -->
  <!-- Dashed vertical lines from x-axis to point -->
  <line x1="85"  y1="145" x2="85"  y2="168" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="125" y1="121" x2="125" y2="168" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="165" y1="97"  x2="165" y2="168" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="205" y1="71"  x2="205" y2="168" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="245" y1="44"  x2="245" y2="168" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Dots -->
  <circle cx="85"  cy="145" r="4" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <circle cx="125" cy="121" r="4" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <circle cx="165" cy="97"  r="4" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <circle cx="205" cy="71"  r="4" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <circle cx="245" cy="44"  r="4" fill="#3b82f6" stroke="white" stroke-width="1.5"/>

  <!-- Value labels above dots -->
  <text x="85"  y="139" text-anchor="middle" font-size="9" fill="#334155" font-family="Georgia,serif">1000</text>
  <text x="125" y="115" text-anchor="middle" font-size="9" fill="#334155" font-family="Georgia,serif">1050</text>
  <text x="165" y="91"  text-anchor="middle" font-size="9" fill="#334155" font-family="Georgia,serif">1102,5</text>
</svg>
