<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Nuage de points discrets représentant les premiers termes d'une suite : (0,1), (1,3), (2,5), (3,7), (4,9), (5,11). Les six points apparaissent alignés.">
  <!-- Axes -->
  <line x1="55" y1="285" x2="380" y2="285" stroke="#334155" stroke-width="1.5"/>
  <line x1="55" y1="285" x2="55" y2="25" stroke="#334155" stroke-width="1.5"/>
  <polygon points="380,281 388,285 380,289" fill="#334155"/>
  <polygon points="51,25 55,17 59,25" fill="#334155"/>
  <text x="385" y="300" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">n</text>
  <text x="38" y="22" font-size="12" fill="#334155" font-family="Georgia,serif">u_n</text>

  <!-- Échelle x : 0 à 5 ; x_px = 55 + 55*n -->
  <!-- Échelle y : 0 à 12 ; y_px = 285 - 20*y (12*20=240, donc y=12 -> 45) -->

  <!-- x ticks 0..5 -->
  <line x1="55"  y1="282" x2="55"  y2="288" stroke="#334155" stroke-width="1"/>
  <line x1="110" y1="282" x2="110" y2="288" stroke="#334155" stroke-width="1"/>
  <line x1="165" y1="282" x2="165" y2="288" stroke="#334155" stroke-width="1"/>
  <line x1="220" y1="282" x2="220" y2="288" stroke="#334155" stroke-width="1"/>
  <line x1="275" y1="282" x2="275" y2="288" stroke="#334155" stroke-width="1"/>
  <line x1="330" y1="282" x2="330" y2="288" stroke="#334155" stroke-width="1"/>
  <text x="55"  y="302" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">0</text>
  <text x="110" y="302" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">1</text>
  <text x="165" y="302" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">2</text>
  <text x="220" y="302" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">3</text>
  <text x="275" y="302" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">4</text>
  <text x="330" y="302" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">5</text>

  <!-- y ticks at 1,3,5,7,9,11 -->
  <!-- y=1 -> 265 ; y=3 -> 225 ; y=5 -> 185 ; y=7 -> 145 ; y=9 -> 105 ; y=11 -> 65 -->
  <line x1="52" y1="265" x2="58" y2="265" stroke="#334155" stroke-width="1"/>
  <line x1="52" y1="225" x2="58" y2="225" stroke="#334155" stroke-width="1"/>
  <line x1="52" y1="185" x2="58" y2="185" stroke="#334155" stroke-width="1"/>
  <line x1="52" y1="145" x2="58" y2="145" stroke="#334155" stroke-width="1"/>
  <line x1="52" y1="105" x2="58" y2="105" stroke="#334155" stroke-width="1"/>
  <line x1="52" y1="65"  x2="58" y2="65"  stroke="#334155" stroke-width="1"/>
  <text x="48" y="269" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">1</text>
  <text x="48" y="229" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">3</text>
  <text x="48" y="189" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">5</text>
  <text x="48" y="149" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">7</text>
  <text x="48" y="109" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">9</text>
  <text x="48" y="69"  text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">11</text>

  <!-- Lignes horizontales repère léger -->
  <line x1="55" y1="265" x2="370" y2="265" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="55" y1="225" x2="370" y2="225" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="55" y1="185" x2="370" y2="185" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="55" y1="145" x2="370" y2="145" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="55" y1="105" x2="370" y2="105" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="55" y1="65"  x2="370" y2="65"  stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Pointillés verticaux des points vers l'axe -->
  <line x1="55"  y1="265" x2="55"  y2="285" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="110" y1="225" x2="110" y2="285" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="165" y1="185" x2="165" y2="285" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="220" y1="145" x2="220" y2="285" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="275" y1="105" x2="275" y2="285" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="330" y1="65"  x2="330" y2="285" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Points -->
  <circle cx="55"  cy="265" r="4.5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <circle cx="110" cy="225" r="4.5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <circle cx="165" cy="185" r="4.5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <circle cx="220" cy="145" r="4.5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <circle cx="275" cy="105" r="4.5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
  <circle cx="330" cy="65"  r="4.5" fill="#2563eb" stroke="white" stroke-width="1.5"/>
</svg>
