<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320" role="img" aria-label="Graphique en escalier d'une suite récurrente u_(n+1) = f(u_n) avec f(x) = (x+4)/2 et u_0 = 0. Courbe de f, droite y = x, et tracé en escalier des premiers termes u_0, u_1, u_2, u_3, u_4.">
  <!-- Axes -->
  <line x1="50" y1="290" x2="380" y2="290" stroke="#334155" stroke-width="1.5"/>
  <line x1="50" y1="290" x2="50" y2="20" stroke="#334155" stroke-width="1.5"/>
  <polygon points="380,286 388,290 380,294" fill="#334155"/>
  <polygon points="46,20 50,12 54,20" fill="#334155"/>
  <text x="385" y="305" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">x</text>
  <text x="35" y="18" font-size="13" font-style="italic" fill="#334155" font-family="Georgia,serif">y</text>

  <!-- Grid lines (horizontal) at y = 1,2,3,4,5 -->
  <line x1="50" y1="238" x2="370" y2="238" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="186" x2="370" y2="186" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="134" x2="370" y2="134" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="82"  x2="370" y2="82"  stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="50" y1="30"  x2="370" y2="30"  stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- x-axis ticks at 0,1,2,3,4,5 (x_px = 50 + 64*x) -->
  <line x1="50"  y1="287" x2="50"  y2="293" stroke="#334155" stroke-width="1"/>
  <line x1="114" y1="287" x2="114" y2="293" stroke="#334155" stroke-width="1"/>
  <line x1="178" y1="287" x2="178" y2="293" stroke="#334155" stroke-width="1"/>
  <line x1="242" y1="287" x2="242" y2="293" stroke="#334155" stroke-width="1"/>
  <line x1="306" y1="287" x2="306" y2="293" stroke="#334155" stroke-width="1"/>
  <line x1="370" y1="287" x2="370" y2="293" stroke="#334155" stroke-width="1"/>
  <text x="50"  y="307" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">0</text>
  <text x="114" y="307" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">1</text>
  <text x="178" y="307" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">2</text>
  <text x="242" y="307" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">3</text>
  <text x="306" y="307" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">4</text>
  <text x="370" y="307" text-anchor="middle" font-size="11" fill="#475569" font-family="Georgia,serif">5</text>

  <!-- y-axis ticks -->
  <line x1="47" y1="238" x2="53" y2="238" stroke="#334155" stroke-width="1"/>
  <line x1="47" y1="186" x2="53" y2="186" stroke="#334155" stroke-width="1"/>
  <line x1="47" y1="134" x2="53" y2="134" stroke="#334155" stroke-width="1"/>
  <line x1="47" y1="82"  x2="53" y2="82"  stroke="#334155" stroke-width="1"/>
  <line x1="47" y1="30"  x2="53" y2="30"  stroke="#334155" stroke-width="1"/>
  <text x="43" y="242" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">1</text>
  <text x="43" y="190" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">2</text>
  <text x="43" y="138" text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">3</text>
  <text x="43" y="86"  text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">4</text>
  <text x="43" y="34"  text-anchor="end" font-size="11" fill="#475569" font-family="Georgia,serif">5</text>

  <!-- Droite y = x  de (0,0)->(50,290) à (5,5)->(370,30) -->
  <line x1="50" y1="290" x2="370" y2="30" stroke="#475569" stroke-width="1.5"/>
  <text x="345" y="50" font-size="12" font-style="italic" fill="#475569" font-family="Georgia,serif">y = x</text>

  <!-- Courbe y = f(x) = (x+4)/2 : (0,2)->(50,186) à (5,4.5)->(370,56) -->
  <line x1="50" y1="186" x2="370" y2="56" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="80" font-size="12" font-style="italic" fill="#2563eb" font-family="Georgia,serif">y = f(x)</text>

  <!-- Tracé en escalier (pointillés gris foncé) -->
  <!-- (u_0, 0) -> (u_0, f(u_0)) = (0,0) -> (0,2) : (50,290) -> (50,186) -->
  <line x1="50" y1="290" x2="50" y2="186" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <!-- (0,2) -> (2,2) : (50,186) -> (178,186)  [reflet sur y=x] -->
  <line x1="50" y1="186" x2="178" y2="186" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <!-- (2,2) -> (2, f(2)=3) : (178,186) -> (178,134) -->
  <line x1="178" y1="186" x2="178" y2="134" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <!-- (2,3) -> (3,3) : (178,134) -> (242,134) -->
  <line x1="178" y1="134" x2="242" y2="134" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <!-- (3,3) -> (3, f(3)=3.5) : (242,134) -> (242,108) -->
  <line x1="242" y1="134" x2="242" y2="108" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <!-- (3, 3.5) -> (3.5, 3.5) : (242,108) -> (274,108) -->
  <line x1="242" y1="108" x2="274" y2="108" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>
  <!-- (3.5, 3.5) -> (3.5, f(3.5)=3.75) : (274,108) -> (274,95) -->
  <line x1="274" y1="108" x2="274" y2="95" stroke="#64748b" stroke-width="1.4" stroke-dasharray="4,3"/>

  <!-- Labels u_0, u_1, u_2, u_3, u_4 sur l'axe des abscisses -->
  <text x="50"  y="270" text-anchor="middle" font-size="11" fill="#dc2626" font-family="Georgia,serif" font-style="italic">u₀</text>
  <text x="178" y="270" text-anchor="middle" font-size="11" fill="#dc2626" font-family="Georgia,serif" font-style="italic">u₁</text>
  <text x="242" y="270" text-anchor="middle" font-size="11" fill="#dc2626" font-family="Georgia,serif" font-style="italic">u₂</text>
  <text x="274" y="270" text-anchor="end" font-size="11" fill="#dc2626" font-family="Georgia,serif" font-style="italic">u₃</text>
  <text x="294" y="278" text-anchor="middle" font-size="11" fill="#dc2626" font-family="Georgia,serif" font-style="italic">u₄</text>
  <!-- Petits ticks rouges indiquant u_3 et u_4 sur l'axe -->
  <line x1="274" y1="288" x2="274" y2="292" stroke="#dc2626" stroke-width="1.4"/>
  <line x1="290" y1="288" x2="290" y2="292" stroke="#dc2626" stroke-width="1.4"/>
</svg>
